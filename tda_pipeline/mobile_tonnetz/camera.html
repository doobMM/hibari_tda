<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0a0a12">
<title>Camera Color · hibari</title>
<link rel="stylesheet" href="css/mobile.css">
</head>
<body class="stage">
<div class="stage-root">
  <video id="video" playsinline muted style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.35;"></video>
  <canvas class="stage-canvas" id="canvas" style="position:absolute;inset:0;"></canvas>
  <div class="stage-hud">
    <a class="badge back" href="index.html">← back</a>
    <span class="badge" id="hudTime">30.0s</span>
  </div>
  <div class="stage-footer">
    <button class="btn secondary" id="btnFlip">flip</button>
    <button class="btn" id="btnStart">start (30s)</button>
  </div>
  <div class="overlay" id="perm">
    <h2>Camera Color</h2>
    <p>카메라 중앙의 색조가 스케일을 결정합니다. 붉은색 → <strong>프리지안</strong>, 초록 → <strong>장조</strong>, 파랑 → <strong>단조</strong>. 30초 즉흥.</p>
    <button class="btn" id="btnPerm">카메라 허용</button>
  </div>
</div>
<script type="module" src="js/camera-color.js"></script>
</body>
</html>
