 "filepath", "type": "str", "default": "'pipeline_cache.pkl'", "desc": ""}], "return_type": "", "returns_desc": "", "recently_modified": false}, {"name": "load_cache", "qual": "TDAMusicPipeline.load_cache", "class": "TDAMusicPipeline", "lineno": 749, "end_lineno": 755, "doc_short": "저장된 중간 결과를 로드합니다.", "description": "저장된 중간 결과를 로드합니다.", "params": [{"name": "filepath", "type": "str", "default": "'pipeline_cache.pkl'", "desc": ""}], "return_type": "", "returns_desc": "", "recently_modified": false}, {"name": "cache_keys", "qual": "TDAMusicPipeline.cache_keys", "class": "TDAMusicPipeline", "lineno": 758, "end_lineno": 759, "doc_short": "", "description": "", "params": [], "return_type": "", "returns_desc": "", "recently_modified": false}]}, "config": {"name": "config", "filename": "config.py", "exists": true, "source": "\"\"\"\nTDA Music Pipeline - Configuration\n===================================\n모든 하이퍼파라미터와 상수를 한 곳에서 관리합니다.\n\"\"\"\n\nfrom dataclasses import dataclass, field\nfrom typing import List, Optional\n\n\n@dataclass\nclass MIDIConfig:\n    \"\"\"MIDI 전처리 관련 설정\n\n    [일반화] auto_detect=True이면 MIDI 파일에서 파라미터를 자동 감지.\n    아래 값들은 hibari 기준 fallback으로만 사용됩니다.\n    \"\"\"\n    file_name: str = \"Ryuichi_Sakamoto_-_hibari.mid\"\n    auto_detect: bool = True     # True면 아래 값 대신 MIDI에서 자동 감지\n\n    # ── Fallback 값 (auto_detect=False일 때만 사용) ──\n    inst1_end_idx: int = 2006    # inst 1 끝 인덱스\n    solo_notes: int = 59         # 솔로 구간 note 수 (구: solo_bars)\n    solo_timepoints: int = 32    # 솔로 구간 시간 길이\n    num_chords: int = 17         # 고유 화음 수\n    num_notes: int = 23          # 고유 note (pitch, duration) 수\n    quantize_unit: Optional[float] = None  # None = 8분음표 자동\n\n\n@dataclass\nclass MetricConfig:\n    \"\"\"거리 함수 설정\n\n    metric: 사용할 거리 함수\n      - 'frequency': 기존 빈도 역수 (기본값, alpha=1.0과 동일)\n      - 'tonnetz': Tonnetz 격자 거리\n      - 'voice_leading': pitch 차이 (반음 수)\n      - 'dft': Fourier 공간 거리\n      - 'hybrid': 빈도 + 음악적 거리 혼합 (alpha로 비율 조절)\n\n    hybrid_metrics: hybrid 모드에서 섞을 metric 목록\n      예: ['tonnetz', 'dft'] → 빈도 + tonnetz + dft 3개를 혼합\n    hybrid_weights: 각 metric의 가중치 (빈도 포함)\n      예: [0.4, 0.3, 0.3] → 빈도 40%, tonnetz 30%, dft 30%\n    \"\"\"\n    metric: str = 'frequency'\n    alpha: float = 0.0                  # hybrid에서 빈도 거리 비중 (α grid search N=20 결과: α=0.0 최적)\n    octave_weight: float = 0.3          # Tonnetz note 거리의 옥타브 항 가중치 (튜닝 N=10: 0.3 최적, 기존 0.5)\n    duration_weight: float = 0.3        # Tonnetz/DFT/VL note 거리의 duration 항 가중치 (기본값 0.3)\n    hybrid_metrics: List[str] = field(default_factory=lambda: ['tonnetz'])\n    hybrid_weights: Optional[List[float]] = None  # None이면 균등 배분\n\n\n@dataclass\nclass HomologyConfig:\n    \"\"\"Persistent Homology 탐색 설정\"\"\"\n    max_lag: int = 4           # inter-weight lag 최대값\n    power: int = -2            # rate step = 10^power\n    rate_start: float = 0.0\n    rate_end: float = 1.5\n    dimensions: List[int] = field(default_factory=lambda: [1, 2])\n\n\n@dataclass\nclass OverlapConfig:\n    \"\"\"중첩행렬 구축 설정\"\"\"\n    threshold: float = 0.35    # ON 비율 목표치\n    lower_bound: Optional[float] = None  # None이면 max(0, threshold - 0.1)\n    total_length: int = 1088   # 전체 시퀀스 길이 (8분음표 단위)\n\n\n@dataclass\nclass GenerationConfig:\n    \"\"\"음악 생성(Algorithm 1 & 2) 설정\"\"\"\n    num_modules: int = 65      # 반복 모듈 수\n    tempo_bpm: int = 66\n    temperature: float = 3.0   # NodePool 샘플링 온도: w(n) ∝ freq(n)^(1/T). T>1=균등화, T<1=집중 (N=10 결과: T=3.0 최적)\n    # Algorithm 2 (Neural Network)\n    epochs: int = 100\n    lr: float = 0.001\n    dropout: float = 0.3\n    test_size: float = 0.3\n    random_state: int = 1\n    max_resample_attempts: int = 50  # 재샘플링 최대 시도 횟수\n    use_continuous_overlap: bool = True  # Algo2 입력: True=continuous, False=binary (N=5: +64.3% JS 개선)\n\n\n@dataclass\nclass PipelineConfig:\n    \"\"\"전체 파이프라인 설정\n\n    min_onset_gap: Algorithm 1/2 생성 시 onset 간 최소 간격(8분음표 단위).\n        0 = 제약 없음 (신규 기본). 3 = 1.5박 sustain (이전 `run_dft_gap3_suite.py` 기본).\n        pipeline.run_generation_algo1()이 이 필드를 자동으로 algorithm1_optimized에 전달.\n\n    post_bugfix: refine_connectedness + pipeline ow/dw 버그픽스(2026-04-15) 이후\n        생성된 결과임을 표기하는 스냅샷 태그. utils.result_meta에서 JSON 헤더에 주입.\n    \"\"\"\n    midi: MIDIConfig = field(default_factory=MIDIConfig)\n    metric: MetricConfig = field(default_factory=MetricConfig)\n    homology: HomologyConfig = field(default_factory=HomologyConfig)\n    overlap: OverlapConfig = field(default_factory=OverlapConfig)\n    generation: GenerationConfig = field(default_factory=GenerationConfig)\n    min_onset_gap: int = 0\n    post_bugfix: bool = True\n    output_dir: str = \"./output\"\n    pickle_dir: str = \"./pickle\"\n", "line_count": 107, "functions": []}, "preprocessing": {"name": "preprocessing", "filename": "preprocessing.py", "exists": true, "source": "\"\"\"\nTDA Music Pipeline - Preprocessing (최적화)\n=============================================\nMIDI → 화음 시퀀스 → note 레이블링까지의 전처리를 담당합니다.\n\n주요 최적화:\n1. group_notes_with_duration: dict comprehension + set 연산으로 O(N*D) → O(N) 수준 개선\n2. notes_label_n_counts: 정렬을 한 번만 수행\n3. chord_label_dict: frozenset 캐싱으로 중복 연산 제거\n\"\"\"\n\nimport pretty_midi\nimport numpy as np\nimport pandas as pd\nfrom collections import Counter\nfrom typing import Dict, List, Tuple, Optional, Set, FrozenSet\n\n\n# ─── MIDI 로드 및 양자화 ───────────────────────────────────────────────────\n\ndef detect_quantization_unit(midi_file: str) -> Tuple[float, str]:\n    \"\"\"\n    MIDI 파일의 최적 양자화 단위를 자동 감지합니다.\n\n    원리:\n    - 모든 note의 onset/offset 간격을 수집\n    - 가장 빈번한 최소 간격을 양자화 단위로 결정\n    - 8분음표, 16분음표, 4분음표 등 자동 판별\n\n    Returns:\n        (unit_duration_sec, unit_name)\n        예: (0.4545, '8th note') for hibari at tempo=66\n    \"\"\"\n    midi_data = pretty_midi.PrettyMIDI(midi_file)\n    tempo = midi_data.get_tempo_changes()[1][0]\n\n    # 기본 음표 길이 (초)\n    quarter = 60.0 / tempo\n    candidates = {\n        '32nd note': quarter / 8,\n        '16th note': quarter / 4,\n        '8th note':  quarter / 2,\n        'quarter':   quarter,\n    }\n\n    # 모든 note duration 수집\n    durations = []\n    for inst in midi_data.instruments:\n        for note in inst.notes:\n            durations.append(note.end - note.start)\n\n    if not durations:\n        return quarter / 2, '8th note'  # fallback\n\n    # 각 후보로 양자화했을 때 오차가 가장 적은 것 선택\n    best_unit = None\n    best_name = '8th note'\n    best_error = float('inf')\n\n    for name, unit in candidates.items():\n        errors = []\n        for d in durations:\n            quantized = round(d / unit) * unit\n            errors.append(abs(d - quantized))\n        avg_error = np.mean(errors)\n        if avg_error < best_error:\n            best_error = avg_error\n            best_unit = unit\n            best_name = name\n\n    return best_unit, best_name\n\n\ndef load_and_quantize(midi_file: str,\n                      quantize_unit: Optional[float] = None\n                      ) -> Tuple[List[Tuple[int, int, int]], float, List[int]]:\n    \"\"\"\n    MIDI 파일을 로드하여 양자화합니다.\n\n    [일반화] quantize_unit을 지정하지 않으면 자동 감지.\n    hibari처럼 8분음표 기반이 아닌 곡도 처리 가능.\n\n    Args:\n        midi_file: MIDI 파일 경로\n        quantize_unit: 양자화 단위 (초). None이면 자동 감지.\n\n    Returns:\n        (adjusted_notes, tempo, instrument_boundaries)\n        adjusted_notes: List of (start_quantized, pitch, end_quantized)\n    \"\"\"\n    midi_data = pretty_midi.PrettyMIDI(midi_file)\n    tempo = midi_data.get_tempo_changes()[1][0]\n\n    if quantize_unit is None:\n        quantize_unit = 60 / tempo / 2  # 기본: 8분음표\n\n    adjusted_notes = []\n    instrument_boundaries = []\n\n    for inst in midi_data.instruments:\n        for note in inst.notes:\n            s = round(note.start / quantize_unit)\n            e = round(note.end / quantize_unit)\n            if e > s:  # 0 길이 note 제거\n                adjusted_notes.append((s, note.pitch, e))\n        instrument_boundaries.append(len(adjusted_notes))\n\n    return adjusted_notes, tempo, instrument_boundaries\n\n\ndef split_instruments(adjusted_notes: list, boundary: int) -> Tuple[list, list]:\n    \"\"\"두 악기로 분리\"\"\"\n    return adjusted_notes[:boundary], adjusted_notes[boundary:]\n\n\ndef detect_solo_region(inst_notes: list) -> Tuple[int, int]:\n    \"\"\"\n    솔로 구간(한 악기만 연주하는 도입부/종결부)을 자동 감지합니다.\n\n    [일반화] hibari에서 solo_bars=59는 inst1 끝의 59개 note가\n    inst2 시작 전에 솔로로 연주되는 구간. 이를 자동으로 찾습니다.\n\n    원리:\n    - inst1의 note onset 시점과 inst2의 onset 시점을 비교\n    - inst1만 연주되는 마지막 구간 = solo_notes 수\n    - 그 구간의 시간 범위 = solo_timepoints\n\n    Args:\n        inst_notes: 악기 1의 note 리스트 [(start, pitch, end), ...]\n\n    Returns:\n        (solo_notes, solo_timepoints)\n        solo_notes: 솔로 구간의 note 개수 (hibari: 59)\n        solo_timepoints: 솔로 구간의 시간 길이 (hibari: 32)\n    \"\"\"\n    if not inst_notes:\n        return 0, 0\n\n    # 마지막 note부터 역순으로 onset 시점 수집\n    starts = [s for s, _, _ in inst_notes]\n    ends = [e for _, _, e in inst_notes]\n\n    # 전체 시간 범위\n    max_time = max(ends)\n\n    # 뒤에서부터 연속적인 solo 구간 찾기\n    # (다른 악기의 시작 시점 이후가 solo)\n    # 여기서는 단순히 마지막 구간의 note 수와 시간 길이를 반환\n    if len(starts) < 2:\n        return len(inst_notes), max_time - min(starts)\n\n    solo_notes = 0\n    solo_start_time = max_time\n\n    # 뒤에서부터 gap 찾기: 큰 gap이 있으면 그 이후가 solo\n    for i in range(len(starts) - 1, 0, -1):\n        gap = starts[i] - ends[i - 1] if i > 0 else 0\n        solo_notes += 1\n        solo_start_time = starts[i]\n        # 4 eighth notes 이상의 gap이 있으면 solo 시작으로 판단\n        if gap >= 4:\n            break\n\n    solo_timepoints = max_time - solo_start_time\n\n    return solo_notes, solo_timepoints\n\n\ndef analyze_midi(midi_file: str, quantize_unit: Optional[float] = None) -> dict:\n    \"\"\"\n    MIDI 파일을 분석하여 파이프라인에 필요한 모든 파라미터를 자동 감지합니다.\n\n    [일반화] config.py의 하드코딩 값 없이도 파이프라인을 실행 가능.\n\n    Solo 감지 원리:\n      두 악기의 시간 범위를 비교하여 겹치는 구간을 찾고,\n      겹치지 않는 양 끝이 solo 구간.\n\n      inst1: |=======실제=======|==solo==|\n      inst2:     |==solo==|=======실제=======|\n                          ^--- overlap start\n\n    Returns:\n        dict with all pipeline parameters\n    \"\"\"\n    # 로드 및 양자화 (기본: 8분음표)\n    adjusted, tempo, boundaries = load_and_quantize(midi_file, quantize_unit)\n\n    n_inst = len(boundaries)\n    inst1_end = boundaries[0] if boundaries else len(adjusted)\n\n    inst1 = adjusted[:inst1_end]\n    inst2 = adjusted[inst1_end:] if n_inst >= 2 else []\n\n    # ── Solo 감지: 시점별 활성화 비교 ──\n    # 각 시점에서 어떤 악기가 활성인지 확인하여\n    # inst2만 연주하는 앞부분 / inst1만 연주하는 뒷부분 = solo\n    if inst1 and inst2:\n        all_ends = [e for _, _, e in adjusted]\n        max_t = max(all_ends)\n\n        # 시점별 활성 여부\n        active1 = np.zeros(max_t + 1, dtype=bool)\n        active2 = np.zeros(max_t + 1, dtype=bool)\n\n        for s, _, e in inst1:\n            active1[s:e] = True\n        for s, _, e in inst2:\n            active2[s:e] = True\n\n        # inst2만 활성인 시점 = inst2 앞부분 solo\n        only2 = active2 & ~active1\n        # inst1만 활성인 시점 = inst1 뒷부분 solo\n        only1 = active1 & ~active2\n\n        # Solo 감지:\n        # only1/only2 시점 수를 힌트로 제공하지만,\n        # 실제 solo note 수는 악보 구조에 따라 달라서 자동 감지가 어려움.\n        # → solo_notes, solo_timepoints는 config fallback 사용 권장.\n        solo_n = 0  # 자동 감지 불가 → config fallback 사용\n        solo_tp = int(only1.sum())  # inst1만 활성인 시점 수 (힌트)\n        # 참고: only1={only1.sum()} tp, only2={only2.sum()} tp\n    else:\n        solo_n = 0\n        solo_tp = 0\n\n    # ── 실제 연주 구간 (solo 제외) ──\n    inst1_real = inst1[:-solo_n] if solo_n > 0 else inst1\n    inst2_real = inst2[solo_n:] if solo_n > 0 else inst2\n\n    # ── Note/Chord 수 자동 계산 ──\n    # 모듈 = inst1_real의 처음 solo_n개 note (또는 전체의 5%)\n    module_size = solo_n if solo_n > 0 else max(10, len(inst1_real) // 20)\n    module_notes = inst1_real[:module_size]\n\n    notes_label, _ = build_note_labels(module_notes)\n    active = group_notes_with_duration(inst1_real)\n    chord_map, _ = build_chord_labels(active)\n\n    # 전체 시간축 길이\n    all_ends = [e for _, _, e in adjusted]\n    total_tp = max(all_ends) if all_ends else 0\n\n    result = {\n        # ── 자동 감지 가능 (신뢰도 높음) ──\n        'tempo': tempo,\n        'quantize_unit': quantize_unit or (60 / tempo / 2),\n        'inst1_end_idx': inst1_end,       # 악기 경계 (MIDI 파싱에서 확정)\n        'n_instruments': n_inst,\n        'inst1_notes': len(inst1),\n        'inst2_notes': len(inst2),\n        'num_notes': len(notes_label),     # 고유 (pitch, dur) 수\n        'num_chords': len(chord_map),      # 고유 화음 수\n        'total_timepoints': total_tp,      # 전체 시간축 길이\n\n        # ── 수동 설정 필요 (자동 감지 어려움) ──\n        # solo_notes: 악보 구조에 따라 달라지므로 config에서 지정 권장\n        # solo_timepoints: solo_notes에 종속\n        'solo_notes': solo_n,              # 0 = 자동 감지 불가\n        'solo_timepoints': solo_tp,        # inst1만 활성인 시점 수 (힌트)\n        'only_inst1_timepoints': int(only1.sum()),  # 참고용 힌트\n        'only_inst2_timepoints': int(only2.sum()),\n    }\n\n    return result\n\n\n# ─── 활성 음 그룹화 (핵심 최적화) ──────────────────────────────────────────\n\ndef group_notes_with_duration(note_list: List[Tuple[int, int, int]]) -> Dict[int, Set[Tuple[int, int]]]:\n    \"\"\"\n    각 시점에서 활성화된 (pitch, duration) 집합을 구합니다.\n    \n    최적화: 이전 코드는 매 note마다 모든 시점을 순회(O(N*max_duration))했으나,\n    여기서는 이벤트 기반으로 처리하여 불필요한 반복을 줄입니다.\n    \"\"\"\n    if not note_list:\n        return {}\n\n    # 1) note별 duration 미리 계산\n    notes_with_dur = [(s, p, e, e - s) for s, p, e in note_list]\n    \n    # 2) 시간 범위 파악\n    max_time = max(e for _, _, e, _ in notes_with_dur)\n    \n    # 3) 각 시점별 활성 음 집합 구축\n    #    - 시작/종료 이벤트를 정렬하는 대신, \n    #      note가 짧으므로(최대 6 eighth) 직접 range로 삽입\n    result: Dict[int, Set[Tuple[int, int]]] = {}\n    \n    for s, p, e, d in notes_with_dur:\n        entry = (p, d)\n        for t in range(s, e):\n            if t not in result:\n                result[t] = set()\n            result[t].add(entry)\n    \n    # 4) 빈 시점 채우기 (기존 코드와 동일: min_start ~ max_active_time 범위)\n    if not result:\n        return {}\n    min_t = min(result.keys())\n    max_t = max(result.keys())\n    filled = {}\n    for t in range(min_t, max_t + 1):\n        filled[t] = result.get(t)  # None if not present\n\n    return filled\n\n\n# ─── 화음 / note 레이블링 ──────────────────────────────────────────────────\n\ndef build_chord_labels(active_notes_dict: Dict[int, Optional[Set]]) -> Tuple[Dict[FrozenSet, int], List[Optional[int]]]:\n    \"\"\"\n    활성 음 딕셔너리로부터 화음 레이블을 생성합니다.\n    \n    Returns:\n        chord_label_map: frozenset → label\n        chord_sequence: 시간순 화음 레이블 리스트\n    \"\"\"\n    chord_label_map: Dict[FrozenSet, int] = {}\n    chord_sequence: List[Optional[int]] = []\n    label_counter = 0\n\n    for t in sorted(active_notes_dict.keys()):\n        pitch_set = active_notes_dict[t]\n        if pitch_set is None:\n            chord_sequence.append(None)\n            continue\n        \n        fs = frozenset(pitch_set)\n        if fs not in chord_label_map:\n            chord_label_map[fs] = label_counter\n            label_counter += 1\n        chord_sequence.append(chord_label_map[fs])\n\n    return chord_label_map, chord_sequence\n\n\ndef build_note_labels(note_list: List[Tuple[int, int, int]]) -> Tuple[Dict[Tuple[int, int], int], Counter]:\n    \"\"\"\n    (pitch, duration) 쌍을 정렬 후 1부터 레이블링합니다.\n    \n    Returns:\n        notes_label: (pitch, duration) → label (1-indexed)\n        notes_counts: (pitch, duration) → count\n    \"\"\"\n    pitch_durations = [(p, e - s) for s, p, e in note_list]\n    counts = Counter(pitch_durations)\n    sorted_keys = sorted(counts.keys(), key=lambda x: (x[0], x[1]))\n    \n    labels = {k: i + 1 for i, k in enumerate(sorted_keys)}\n    return labels, counts\n\n\ndef chord_to_note_labels(chord_label_map: Dict[FrozenSet, int],\n                         notes_label: Dict[Tuple[int, int], int]) -> Dict[int, Set[int]]:\n    \"\"\"\n    화음 레이블 → 해당 화음에 속한 note 레이블 집합으로 매핑합니다.\n    \"\"\"\n    result = {}\n    for fs, chord_lbl in chord_label_map.items():\n        mapped = set()\n        for note_tuple in fs:\n            if note_tuple in notes_label:\n                mapped.add(notes_label[note_tuple])\n        result[chord_lbl] = mapped\n    return result\n\n\n# ─── 두 악기 시퀀스 정렬 (lag별) ───────────────────────────────────────────\n\ndef prepare_lag_sequences(chord_seq_1: list, chord_seq_2: list, \n                          solo_timepoints: int = 32, max_lag: int = 4,\n                          inst1_front_pad: int = 16) -> dict:\n    \"\"\"\n    두 악기의 화음 시퀀스를 lag별로 정렬하여 반환합니다.\n    기존 get_ready_with_lags를 정확히 재현합니다.\n    \n    Args:\n        chord_seq_1: inst 1의 화음 레이블 시퀀스 (시점당 1개)\n        chord_seq_2: inst 2의 화음 레이블 시퀀스 (시점당 1개)\n        solo_timepoints: 솔로 구간의 시점 수 (4마디 × 8 eighth = 32)\n                         ※ 음표 개수(59)가 아님에 주의\n        max_lag: 최대 lag 값 (기본 4)\n        inst1_front_pad: inst1 lag 시퀀스 앞쪽 패딩 값 (hibari에서는 16)\n    \n    Returns:\n        adn_i[1][0] = inst1 전체 화음 시퀀스\n        adn_i[1][1] = inst1 lag=1 시퀀스 (겹치는 구간만)\n        adn_i[1][2] = inst1 lag=2 시퀀스 (패딩 추가)\n        ...\n        adn_i[1][-1] = inst1 전체 (뒤에 None 패딩, 중첩행렬용)\n        adn_i[2] 도 동일 구조\n    \n    기존 코드 대응:\n        chord_1_1_132  → adn_i[1][0]\n        adn_1_chord_1  → adn_i[1][1]  (chord_seq_1[32:], 5~132마디)\n        adn_1_chord_2  → adn_i[1][2]  ([16, *lag1, None])\n        adn_1_whole_c  → adn_i[1][-1] ([*chord_seq_1, *([None]*32)])\n    \"\"\"\n    sp = solo_timepoints  # 32\n    \n    # ── index 0: 전체 시퀀스 ──\n    # 기존: chord_1_1_132 = adn_1_chord.copy()\n    # 기존: chord_2_5_136 = [None, *adn_2_chord]\n    full_1 = list(chord_seq_1)          # inst1: 1~132마디\n    full_2 = [None] + list(chord_seq_2) # inst2: 5~136마디 (앞에 None 추가)\n    \n    # ── index 1: lag=1 시퀀스 (겹치는 구간, 5~132마디) ──\n    # 기존: adn_1_chord_1 = chord_1_1_132[32:]\n    # 기존: adn_2_chord_1 = chord_2_5_136[:-32]\n    lag1_1 = full_1[sp:]    # inst1 앞 4마디 제거\n    lag1_2 = full_2[:-sp]   # inst2 뒤 4마디 제거\n    \n    # ── index 2~max_lag: 패딩 추가하며 확장 ──\n    # 기존 패턴:\n    #   adn_1_chord_k = [16, *adn_1_chord_{k-1}, None]\n    #   adn_2_chord_k = [None, *adn_2_chord_{k-1}, k-2]\n    seqs_1 = [full_1, lag1_1]\n    seqs_2 = [full_2, lag1_2]\n    \n    prev_1 = lag1_1\n    prev_2 = lag1_2\n    for lag in range(2, max_lag + 1):\n        curr_1 = [inst1_front_pad] + list(prev_1) + [None]\n        curr_2 = [None] + list(prev_2) + [lag - 2]  # 0, 1, 2 for lag 2, 3, 4\n        seqs_1.append(curr_1)\n        seqs_2.append(curr_2)\n        prev_1 = curr_1\n        prev_2 = curr_2\n    \n    # ── index -1 (마지막): 전체 시퀀스 + None 패딩 (중첩행렬용) ──\n    # 기존: adn_1_whole_c = [*adn_1_chord, *([None] * 32)]\n    # 기존: adn_2_whole_c = [*([None] * 32), *chord_2_5_136]\n    whole_1 = list(chord_seq_1) + [None] * sp\n    whole_2 = [None] * sp + list(full_2)  # full_2 = [None, *chord_seq_2]\n    \n    # 길이 맞추기\n    max_len = max(len(whole_1), len(whole_2))\n    whole_1.extend([None] * (max_len - len(whole_1)))\n    whole_2.extend([None] * (max_len - len(whole_2)))\n    \n    seqs_1.append(whole_1)\n    seqs_2.append(whole_2)\n    \n    return {1: seqs_1, 2: seqs_2}\n\n\n# ─── 유틸리티 ──────────────────────────────────────────────────────────────\n\ndef find_flexible_pitches(notes_counts: Counter, notes_label: dict) -> Dict[int, Tuple[int, int]]:\n    \"\"\"\n    같은 pitch에서 다른 duration으로 나타나는 note를 찾습니다.\n    \"\"\"\n    pitch_groups: Dict[int, list] = {}\n    for (p, d), count in notes_counts.items():\n        pitch_groups.setdefault(p, []).append((p, d))\n    \n    multi = {p: notes for p, notes in pitch_groups.items() if len(notes) >= 2}\n    \n    result = {}\n    for p, note_list in multi.items():\n        for note in note_list:\n            if note in notes_label:\n                result[notes_label[note]] = note\n    return result\n\n\ndef simul_chord_lists(list1: list, list2: list) -> List[list]:\n    \"\"\"두 inst의 화음 시퀀스를 시점별로 묶습니다.\"\"\"\n    result = []\n    for a, b in zip(list1, list2):\n        pair = [x for x in (a, b) if x is not None]\n        result.append(pair)\n    return result\n\n\ndef simul_union_by_dict(chord_pairs: List[list], notes_dict: dict) -> List[Set[int]]:\n    \"\"\"각 시점의 화음 쌍을 note label 집합으로 변환합니다.\"\"\"\n    result = []\n    for pair in chord_pairs:\n        combined = set()\n        for chord_lbl in pair:\n            if chord_lbl in notes_dict:\n                combined |= notes_dict[chord_lbl]\n        result.append(combined)\n    return result\n", "line_count": 487, "functions": [{"name": "detect_quantization_unit", "qual": "detect_quantization_unit", "class": "", "lineno": 21, "end_lineno": 71, "doc_short": "MIDI 파일의 최적 양자화 단위를 자동 감지합니다.", "description": "MIDI 파일의 최적 양자화 단위를 자동 감지합니다.\n원리:\n- 모든 note의 onset/offset 간격을 수집\n- 가장 빈번한 최소 간격을 양자화 단위로 결정\n- 8분음표, 16분음표, 4분음표 등 자동 판별", "params": [{"name": "midi_file", "type": "str", "default": "", "desc": ""}], "return_type": "Tuple[float, str]", "returns_desc": "(unit_duration_sec, unit_name) 예: (0.4545, '8th note') for hibari at tempo=66", "recently_modified": true}, {"name": "load_and_quantize", "qual": "load_and_quantize", "class": "", "lineno": 74, "end_lineno": 108, "doc_short": "MIDI 파일을 로드하여 양자화합니다.", "description": "MIDI 파일을 로드하여 양자화합니다.\n[일반화] quantize_unit을 지정하지 않으면 자동 감지.\nhibari처럼 8분음표 기반이 아닌 곡도 처리 가능.", "params": [{"name": "midi_file", "type": "str", "default": "", "desc": "MIDI 파일 경로"}, {"name": "quantize_unit", "type": "Optional[float]", "default": "None", "desc": "양자화 단위 (초). None이면 자동 감지."}], "return_type": "Tuple[List[Tuple[int, int, int]], float, List[int]]", "returns_desc": "(adjusted_notes, tempo, instrument_boundaries) adjusted_notes: List of (start_quantized, pitch, end_quantized)", "recently_modified": true}, {"name": "split_instruments", "qual": "split_instruments", "class": "", "lineno": 111, "end_lineno": 113, "doc_short": "두 악기로 분리", "description": "두 악기로 분리", "params": [{"name": "adjusted_notes", "type": "list", "default": "", "desc": ""}, {"name": "boundary", "type": "int", "default": "", "desc": ""}], "return_type": "Tuple[list, list]", "returns_desc": "", "recently_modified": true}, {"name": "detect_solo_region", "qual": "detect_solo_region", "class": "", "lineno": 116, "end_lineno": 166, "doc_short": "솔로 구간(한 악기만 연주하는 도입부/종결부)을 자동 감지합니다.", "description": "솔로 구간(한 악기만 연주하는 도입부/종결부)을 자동 감지합니다.\n[일반화] hibari에서 solo_bars=59는 inst1 끝의 59개 note가\ninst2 시작 전에 솔로로 연주되는 구간. 이를 자동으로 찾습니다.\n원리:\n- inst1의 note onset 시점과 inst2의 onset 시점을 비교\n- inst1만 연주되는 마지막 구간 = solo_notes 수\n- 그 구간의 시간 범위 = solo_timepoints", "params": [{"name": "inst_notes", "type": "list", "default": "", "desc": "악기 1의 note 리스트 [(start, pitch, end), ...]"}], "return_type": "Tuple[int, int]", "returns_desc": "(solo_notes, solo_timepoints) solo_notes: 솔로 구간의 note 개수 (hibari: 59) solo_timepoints: 솔로 구간의 시간 길이 (hibari: 32)", "recently_modified": true}, {"name": "analyze_midi", "qual": "analyze_midi", "class": "", "lineno": 169, "end_lineno": 265, "doc_short": "MIDI 파일을 분석하여 파이프라인에 필요한 모든 파라미터를 자동 감지합니다.", "description": "MIDI 파일을 분석하여 파이프라인에 필요한 모든 파라미터를 자동 감지합니다.\n[일반화] config.py의 하드코딩 값 없이도 파이프라인을 실행 가능.\nSolo 감지 원리:\n두 악기의 시간 범위를 비교하여 겹치는 구간을 찾고,\n겹치지 않는 양 끝이 solo 구간.\ninst1: |=======실제=======|==solo==|\ninst2:     |==solo==|=======실제=======|\n^--- overlap start", "params": [{"name": "midi_file", "type": "str", "default": "", "desc": ""}, {"name": "quantize_unit", "type": "Optional[float]", "default": "None", "desc": ""}], "return_type": "dict", "returns_desc": "dict with all pipeline parameters", "recently_modified": true}, {"name": "group_notes_with_duration", "qual": "group_notes_with_duration", "class": "", "lineno": 270, "end_lineno": 307, "doc_short": "각 시점에서 활성화된 (pitch, duration) 집합을 구합니다.", "description": "각 시점에서 활성화된 (pitch, duration) 집합을 구합니다.\n최적화: 이전 코드는 매 note마다 모든 시점을 순회(O(N*max_duration))했으나,\n여기서는 이벤트 기반으로 처리하여 불필요한 반복을 줄입니다.", "params": [{"name": "note_list", "type": "List[Tuple[int, int, int]]", "default": "", "desc": ""}], "return_type": "Dict[int, Set[Tuple[int, int]]]", "returns_desc": "", "recently_modified": true}, {"name": "build_chord_labels", "qual": "build_chord_labels", "class": "", "lineno": 312, "end_lineno": 336, "doc_short": "활성 음 딕셔너리로부터 화음 레이블을 생성합니다.", "description": "활성 음 딕셔너리로부터 화음 레이블을 생성합니다.", "params": [{"name": "active_notes_dict", "type": "Dict[int, Optional[Set]]", "default": "", "desc": ""}], "return_type": "Tuple[Dict[FrozenSet, int], List[Optional[int]]]", "returns_desc": "chord_label_map: frozenset → label chord_sequence: 시간순 화음 레이블 리스트", "recently_modified": false}, {"name": "build_note_labels", "qual": "build_note_labels", "class": "", "lineno": 339, "end_lineno": 352, "doc_short": "(pitch, duration) 쌍을 정렬 후 1부터 레이블링합니다.", "description": "(pitch, duration) 쌍을 정렬 후 1부터 레이블링합니다.", "params": [{"name": "note_list", "type": "List[Tuple[int, int, int]]", "default": "", "desc": ""}], "return_type": "Tuple[Dict[Tuple[int, int], int], Counter]", "returns_desc": "notes_label: (pitch, duration) → label (1-indexed) notes_counts: (pitch, duration) → count", "recently_modified": false}, {"name": "chord_to_note_labels", "qual": "chord_to_note_labels", "class": "", "lineno": 355, "end_lineno": 367, "doc_short": "화음 레이블 → 해당 화음에 속한 note 레이블 집합으로 매핑합니다.", "description": "화음 레이블 → 해당 화음에 속한 note 레이블 집합으로 매핑합니다.", "params": [{"name": "chord_label_map", "type": "Dict[FrozenSet, int]", "default": "", "desc": ""}, {"name": "notes_label", "type": "Dict[Tuple[int, int], int]", "default": "", "desc": ""}], "return_type": "Dict[int, Set[int]]", "returns_desc": "", "recently_modified": false}, {"name": "prepare_lag_sequences", "qual": "prepare_lag_sequences", "class": "", "lineno": 372, "end_lineno": 446, "doc_short": "두 악기의 화음 시퀀스를 lag별로 정렬하여 반환합니다.", "description": "두 악기의 화음 시퀀스를 lag별로 정렬하여 반환합니다.\n기존 get_ready_with_lags를 정확히 재현합니다.", "params": [{"name": "chord_seq_1", "type": "list", "default": "", "desc": "inst 1의 화음 레이블 시퀀스 (시점당 1개)"}, {"name": "chord_seq_2", "type": "list", "default": "", "desc": "inst 2의 화음 레이블 시퀀스 (시점당 1개)"}, {"name": "solo_timepoints", "type": "int", "default": "32", "desc": "솔로 구간의 시점 수 (4마디 × 8 eighth = 32) ※ 음표 개수(59)가 아님에 주의"}, {"name": "max_lag", "type": "int", "default": "4", "desc": "최대 lag 값 (기본 4)"}, {"name": "inst1_front_pad", "type": "int", "default": "16", "desc": "inst1 lag 시퀀스 앞쪽 패딩 값 (hibari에서는 16)"}], "return_type": "dict", "returns_desc": "adn_i[1][0] = inst1 전체 화음 시퀀스 adn_i[1][1] = inst1 lag=1 시퀀스 (겹치는 구간만) adn_i[1][2] = inst1 lag=2 시퀀스 (패딩 추가) ... adn_i[1][-1] = inst1 전체 (뒤에 None 패딩, 중첩행렬용) adn_i[2] 도 동일 구조 기존 코드 대응: chord_1_1_132  → adn_i[1][0] adn_1_chord_1  → adn_i[1][1]  (chord_seq_1[32:], 5~132마디) adn_1_chord_2  → adn_i[1][2]  ([16, *lag1, None]) adn_1_whole_c  → adn_i[1][-1] ([*chord_seq_1, *([None]*32)])", "recently_modified": false}, {"name": "find_flexible_pitches", "qual": "find_flexible_pitches", "class": "", "lineno": 451, "end_lineno": 466, "doc_short": "같은 pitch에서 다른 duration으로 나타나는 note를 찾습니다.", "description": "같은 pitch에서 다른 duration으로 나타나는 note를 찾습니다.", "params": [{"name": "notes_counts", "type": "Counter", "default": "", "desc": ""}, {"name": "notes_label", "type": "dict", "default": "", "desc": ""}], "return_type": "Dict[int, Tuple[int, int]]", "returns_desc": "", "recently_modified": false}, {"name": "simul_chord_lists", "qual": "simul_chord_lists", "class": "", "lineno": 469, "end_lineno": 475, "doc_short": "두 inst의 화음 시퀀스를 시점별로 묶습니다.", "description": "두 inst의 화음 시퀀스를 시점별로 묶습니다.", "params": [{"name": "list1", "type": "list", "default": "", "desc": ""}, {"name": "list2", "type": "list", "default": "", "desc": ""}], "return_type": "List[list]", "returns_desc": "", "recently_modified": false}, {"name": "simul_union_by_dict", "qual": "simul_union_by_dict", "class": "", "lineno": 478, "end_lineno": 487, "doc_short": "각 시점의 화음 쌍을 note label 집합으로 변환합니다.", "description": "각 시점의 화음 쌍을 note label 집합으로 변환합니다.", "params": [{"name": "chord_pairs", "type": "List[list]", "default": "", "desc": ""}, {"name": "notes_dict", "type": "dict", "default": "", "desc": ""}], "return_type": "List[Set[int]]", "returns_desc": "", "recently_modified": false}]}, "weights": {"name": "weights", "filename": "weights.py", "exists": true, "source": "\"\"\"\nTDA Music Pipeline - Weight & Distance Computation (핵심 최적화)\n================================================================\n가중치 행렬 → 거리 행렬 변환을 담당합니다.\n\n주요 최적화:\n1. refine_connectedness: numpy 벡터화 연산으로 4중 루프 제거\n   - 기존: O(17² × max_notes_per_chord²) Python 루프\n   - 개선: 사전 계산된 매핑 행렬을 이용한 행렬 연산\n2. get_UTMconnected: numpy 삼각 행렬 연산으로 대체\n3. 거리 행렬 변환: numpy 마스크 연산으로 일괄 처리\n\"\"\"\n\nimport numpy as np\nimport pandas as pd\nfrom typing import Dict, Set, Optional, Tuple\n\n\n# ─── Intra/Inter Weight 계산 ───────────────────────────────────────────────\n\ndef compute_intra_weights(chord_seq: list, num_chords: int = 17, lag: int = 1) -> pd.DataFrame:\n    \"\"\"\n    같은 악기 내 인접 화음 전이 빈도를 계산합니다.\n    \n    최적화: numpy 배열 인덱싱으로 루프 최소화\n    \"\"\"\n    weights = np.zeros((num_chords, num_chords), dtype=int)\n    n = len(chord_seq)\n    \n    for i in range(n - lag):\n        a, b = chord_seq[i], chord_seq[i + lag]\n        if a is not None and b is not None and a != b:\n            weights[a, b] += 1\n    \n    return pd.DataFrame(weights)\n\n\ndef compute_inter_weights(seq_a: list, seq_b: list, \n                          num_chords: int = 17, lag: int = 1) -> pd.DataFrame:\n    \"\"\"\n    두 악기 간 시차(lag)를 둔 화음 전이 빈도를 계산합니다.\n    \"\"\"\n    weights = np.zeros((num_chords, num_chords), dtype=int)\n    n = min(len(seq_a), len(seq_b)) - lag\n    if n <= 0:\n        return pd.DataFrame(weights)\n\n    for i in range(n):\n        a_i = seq_a[i]\n        b_i_lag = seq_b[i + lag]\n\n        # a[i] → b[i+lag]\n        if a_i is None or b_i_lag is None:\n            continue\n        if a_i < num_chords and b_i_lag < num_chords:\n            weights[a_i, b_i_lag] += 1\n\n        # b[i] → a[i+lag] (양방향)\n        b_i = seq_b[i]\n        a_i_lag = seq_a[i + lag]\n        if b_i is not None and a_i_lag is not None:\n            if b_i < num_chords and a_i_lag < num_chords:\n                weights[b_i, a_i_lag] += 1\n\n    return pd.DataFrame(weights)\n\n\ndef compute_inter_weights_decayed(adn_i: dict, max_lag: int = 4,\n                                   num_chords: int = 17) -> pd.DataFrame:\n    \"\"\"\n    lag 1~max_lag를 감쇄 가중치로 합산한 inter weight.\n\n    가중치 (사용자 임의 설정):\n      lag 1: 0.60,  lag 2: 0.30,  lag 3: 0.08,  lag 4: 0.02  (합계 = 1.0)\n    가까운 시차에 집중적으로 가중하되, 먼 시차의 기여를 급격히 줄인다.\n    \"\"\"\n    DECAY_WEIGHTS = [0.60, 0.30, 0.08, 0.02]\n\n    # 실제 사용 가능한 max_lag 결정 (adn_i[inst]는 list, index=lag)\n    actual_max = min(max_lag, len(adn_i[1]) - 1, len(adn_i[2]) - 1)\n    if actual_max < 1:\n        actual_max = 1\n\n    nc = num_chords\n    combined = np.zeros((nc, nc), dtype=float)\n\n    # 사용할 가중치 슬라이스 후 재정규화\n    ws = DECAY_WEIGHTS[:actual_max]\n    w_sum = sum(ws)\n\n    for lag in range(1, actual_max + 1):\n        w = ws[lag - 1] / w_sum\n        inter_lag = compute_inter_weights(\n            adn_i[1][lag], adn_i[2][lag],\n            num_chords=nc, lag=lag\n        )\n        combined += w * inter_lag.values\n\n    return pd.DataFrame(combined)\n\n\n# ─── 핵심 최적화: Refine Connectedness ─────────────────────────────────────\n\ndef _build_expansion_matrix(notes_dict: dict, num_notes: int) -> np.ndarray:\n    \"\"\"\n    화음→note 매핑을 위한 확장 행렬을 사전 계산합니다.\n    \n    expansion[chord_label, note_label] = 1 if note_label ∈ chord\n    \n    이 행렬을 한 번만 계산하면 refine_connectedness를 \n    행렬 연산으로 수행할 수 있습니다.\n    \"\"\"\n    num_chords = max(k for k in notes_dict.keys() if isinstance(k, int)) + 1\n    expansion = np.zeros((num_chords, num_notes), dtype=float)\n    \n    for chord_lbl, note_set in notes_dict.items():\n        if not isinstance(chord_lbl, int):\n            continue\n        for note_lbl in note_set:\n            expansion[chord_lbl, note_lbl - 1] = 1.0  # note labels are 1-indexed\n    \n    return expansion\n\n\ndef refine_connectedness_fast(weight_matrix: pd.DataFrame,\n                              notes_dict: dict,\n                              num_notes: int = 23,\n                              rounding_digits: int = 4) -> pd.DataFrame:\n    \"\"\"\n    화음 단위의 가중치를 note 단위로 분해합니다. (벡터화 버전)\n\n    원리:\n    - W[i,j] (화음 i→j 가중치)를 화음 i에 속한 모든 note와\n      화음 j에 속한 모든 note 쌍에 분배\n    - E = expansion matrix\n    - refined = E^T @ W_full @ E  (전체 행렬에서 연산 후 상삼각 추출)\n\n    [BUG FIX 2026-04-10]\n    기존 로직: W 를 먼저 upper triangular 로 변환한 뒤 E^T @ W_upper @ E.\n    문제: chord i→j 전이에서 note_a ∈ chord_i, note_b ∈ chord_j 일 때,\n    chord 번호 i < j 이지만 note 번호 note_a > note_b 인 경우\n    W_upper 에서 i→j 방향 값은 있지만 E 경로가 note_a→note_b 로\n    하삼각 위치를 요구하여 누락됨.\n    수정: W 를 대칭화(symmetric)한 전체 행렬로 refine 후 상삼각 추출.\n    원본 util.py:142 의 `if note_j >= note_i` 조건과 동일한 문제.\n    \"\"\"\n    W = weight_matrix.values.astype(float)\n\n    # W 를 대칭 행렬로 만듦: W_sym[i,j] = W[i,j] + W[j,i]\n    # (chord i→j 와 j→i 전이를 모두 하나의 undirected 연결로)\n    W_sym = W + W.T\n    # 대각선은 원본 유지 (중복 합산 방지)\n    np.fill_diagonal(W_sym, np.diag(W))\n\n    # 확장 행렬\n    E = _build_expansion_matrix(notes_dict, num_notes)\n\n    # 전체 행렬에서 refine: R = E^T @ W_sym @ E\n    refined = E.T @ W_sym @ E\n\n    # 부동소수점 오차 보정\n    if rounding_digits is not None:\n        refined = np.round(refined, rounding_digits)\n\n    # 상삼각만 유지 (distance 변환에 필요)\n    refined = np.triu(refined)\n\n    # DataFrame으로 변환 (1-indexed note labels)\n    idx = list(range(1, num_notes + 1))\n    return pd.DataFrame(refined, index=idx, columns=idx, dtype=float)\n\n\ndef refine_connectedness_precise(weight_matrix: pd.DataFrame,\n                                  notes_dict: dict,\n                                  num_notes: int = 23,\n                                  rounding_digits: int = 2) -> pd.DataFrame:\n    \"\"\"\n    부동소수점 정밀도가 중요한 경우 사용하는 정밀 버전.\n    별도의 반올림 자릿수를 지정할 수 있습니다.\n    \"\"\"\n    result = refine_connectedness_fast(weight_matrix, notes_dict, num_notes, rounding_digits=rounding_digits)\n    # 부동소수점 오차 보정 (이미 fast에서 처리됨)\n    result = result.round(rounding_digits)\n    return result\n\n\n# ─── 거리 행렬 변환 ────────────────────────────────────────────────────────\n\ndef weight_to_distance(weight_df: pd.DataFrame, \n                       out_of_reach: float) -> pd.DataFrame:\n    \"\"\"\n    가중치 행렬을 거리 행렬로 변환합니다. (역수 변환)\n    \n    최적화: numpy 마스크 연산으로 일괄 처리\n    \"\"\"\n    W = weight_df.values.astype(float)\n    D = np.full_like(W, out_of_reach, dtype=float)\n    \n    nonzero = W != 0\n    D[nonzero] = 1.0 / W[nonzero]\n    \n    return pd.DataFrame(D, index=weight_df.index, columns=weight_df.columns)\n\n\ndef symmetrize_upper_to_full(upper_df: pd.DataFrame) -> pd.DataFrame:\n    \"\"\"상삼각 행렬을 대칭 행렬로 변환합니다.\"\"\"\n    M = upper_df.values.copy()\n    # 하삼각을 0으로 만든 후 대칭화 (weight_to_distance 후 하삼각이 out_of_reach일 수 있음)\n    M = np.triu(M)\n    M = M + M.T - np.diag(np.diag(M))\n    return pd.DataFrame(M, index=upper_df.index, columns=upper_df.columns)\n\n\ndef to_upper_triangular(df: pd.DataFrame) -> pd.DataFrame:\n    \"\"\"하삼각 요소를 상삼각으로 옮기고 하삼각을 0으로 만듭니다.\"\"\"\n    M = df.values.astype(float)\n    result = np.triu(M) + np.triu(M.T, k=1)\n    return pd.DataFrame(result, index=df.index, columns=df.columns)\n\n\n# ─── 통합 거리 계산 함수 ───────────────────────────────────────────────────\n\ndef compute_distance_matrix(weight_matrix: pd.DataFrame,\n                            notes_dict: dict,\n                            out_of_reach: float,\n                            num_notes: int = 23,\n                            refine: bool = True) -> pd.DataFrame:\n    \"\"\"\n    가중치 행렬로부터 최종 거리 행렬을 계산합니다.\n    기존 is_distance_matrix_from의 최적화 + 통합 버전.\n    \n    파이프라인: \n    1. 상삼각 변환 \n    2. note 단위 refine (선택) \n    3. 역수 변환 \n    4. 대칭화\n    \"\"\"\n    # 1. 상삼각\n    W_upper = to_upper_triangular(weight_matrix)\n    \n    # 2. Refine\n    if refine:\n        W_refined = refine_connectedness_fast(W_upper, notes_dict, num_notes)\n    else:\n        W_refined = W_upper\n    \n    # 3. 역수 변환\n    D_upper = weight_to_distance(W_refined, out_of_reach)\n    \n    # 4. 대칭화\n    D_full = symmetrize_upper_to_full(D_upper)\n    \n    return D_full\n\n\ndef compute_out_of_reach(weight_df: pd.DataFrame, power: int = -2) -> float:\n    \"\"\"out_of_reach 값을 계산합니다.\"\"\"\n    step = 10 ** power\n    min_nonzero = weight_df.values[weight_df.values != 0].min()\n    return 1 + 2 / (min_nonzero * step)\n\n\n# ─── Simul 가중치 (동시 발음) ──────────────────────────────────────────────\n\ndef compute_simul_weights(inst1_seq: list, inst2_seq: list, \n                          notes_dict: dict) -> Tuple[pd.DataFrame, pd.DataFrame]:\n    \"\"\"\n    동시 발음 기반 intra/inter 가중치를 계산합니다.\n    \n    최적화: specify_chord_list를 인라인화하고 한 번의 순회로 처리\n    \"\"\"\n    # note label 집합 추출\n    all_labels = set()\n    for k, v in notes_dict.items():\n        if isinstance(k, int):\n            all_labels |= v\n    \n    labels_sorted = sorted(all_labels)\n    n = len(labels_sorted)\n    label_to_idx = {lbl: i for i, lbl in enumerate(labels_sorted)}\n    \n    intra = np.zeros((n, n), dtype=int)\n    inter = np.zeros((n, n), dtype=int)\n    \n    for t in range(len(inst1_seq)):\n        c1, c2 = inst1_seq[t], inst2_seq[t]\n        \n        set1 = notes_dict.get(c1) if c1 is not None else None\n        set2 = notes_dict.get(c2) if c2 is not None else None\n        \n        # Intra: 각 inst 내 조합 (union - intersection)\n        for s in [s for s in (set1, set2) if s is not None]:\n            sl = sorted(s)\n            for i_idx in range(len(sl)):\n                for j_idx in range(i_idx, len(sl)):\n                    ni, nj = label_to_idx[sl[i_idx]], label_to_idx[sl[j_idx]]\n                    intra[ni, nj] += 1\n        \n        # 교집합 보정 (중복 카운트 제거)\n        if set1 is not None and set2 is not None:\n            intersect = sorted(set1 & set2)\n            for i_idx in range(len(intersect)):\n                for j_idx in range(i_idx, len(intersect)):\n                    ni, nj = label_to_idx[intersect[i_idx]], label_to_idx[intersect[j_idx]]\n                    intra[ni, nj] -= 1\n            \n            # Inter: 차집합 간 bipartite 연결\n            diff1 = set1 - set2\n            diff2 = set2 - set1\n            for d1 in diff1:\n                for d2 in diff2:\n                    ni, nj = label_to_idx[d1], label_to_idx[d2]\n                    inter[ni, nj] += 1\n    \n    intra_df = pd.DataFrame(intra, index=labels_sorted, columns=labels_sorted)\n    inter_df = pd.DataFrame(inter, index=labels_sorted, columns=labels_sorted)\n    \n    return intra_df, inter_df\n", "line_count": 318, "functions": [{"name": "compute_intra_weights", "qual": "compute_intra_weights", "class": "", "lineno": 21, "end_lineno": 35, "doc_short": "같은 악기 내 인접 화음 전이 빈도를 계산합니다.", "description": "같은 악기 내 인접 화음 전이 빈도를 계산합니다.\n최적화: numpy 배열 인덱싱으로 루프 최소화", "params": [{"name": "chord_seq", "type": "list", "default": "", "desc": ""}, {"name": "num_chords", "type": "int", "default": "17", "desc": ""}, {"name": "lag", "type": "int", "default": "1", "desc": ""}], "return_type": "pd.DataFrame", "returns_desc": "", "recently_modified": true}, {"name": "compute_inter_weights", "qual": "compute_inter_weights", "class": "", "lineno": 38, "end_lineno": 65, "doc_short": "두 악기 간 시차(lag)를 둔 화음 전이 빈도를 계산합니다.", "description": "두 악기 간 시차(lag)를 둔 화음 전이 빈도를 계산합니다.", "params": [{"name": "seq_a", "type": "list", "default": "", "desc": ""}, {"name": "seq_b", "type": "list", "default": "", "desc": ""}, {"name": "num_chords", "type": "int", "default": "17", "desc": ""}, {"name": "lag", "type": "int", "default": "1", "desc": ""}], "return_type": "pd.DataFrame", "returns_desc": "", "recently_modified": true}, {"name": "compute_inter_weights_decayed", "qual": "compute_inter_weights_decayed", "class": "", "lineno": 68, "end_lineno": 99, "doc_short": "lag 1~max_lag를 감쇄 가중치로 합산한 inter weight.", "description": "lag 1~max_lag를 감쇄 가중치로 합산한 inter weight.\n가중치 (사용자 임의 설정
