, "doc_short": "가중치 행렬로부터 최종 거리 행렬을 계산합니다.", "description": "가중치 행렬로부터 최종 거리 행렬을 계산합니다.\n기존 is_distance_matrix_from의 최적화 + 통합 버전.\n파이프라인:\n1. 상삼각 변환\n2. note 단위 refine (선택)\n3. 역수 변환\n4. 대칭화", "params": [{"name": "weight_matrix", "type": "pd.DataFrame", "default": "", "desc": ""}, {"name": "notes_dict", "type": "dict", "default": "", "desc": ""}, {"name": "out_of_reach", "type": "float", "default": "", "desc": ""}, {"name": "num_notes", "type": "int", "default": "23", "desc": ""}, {"name": "refine", "type": "bool", "default": "True", "desc": ""}], "return_type": "pd.DataFrame", "returns_desc": "", "recently_modified": true}, {"name": "compute_out_of_reach", "qual": "compute_out_of_reach", "class": "", "lineno": 256, "end_lineno": 260, "doc_short": "out_of_reach 값을 계산합니다.", "description": "out_of_reach 값을 계산합니다.", "params": [{"name": "weight_df", "type": "pd.DataFrame", "default": "", "desc": ""}, {"name": "power", "type": "int", "default": "-2", "desc": ""}], "return_type": "float", "returns_desc": "", "recently_modified": true}, {"name": "compute_simul_weights", "qual": "compute_simul_weights", "class": "", "lineno": 265, "end_lineno": 318, "doc_short": "동시 발음 기반 intra/inter 가중치를 계산합니다.", "description": "동시 발음 기반 intra/inter 가중치를 계산합니다.\n최적화: specify_chord_list를 인라인화하고 한 번의 순회로 처리", "params": [{"name": "inst1_seq", "type": "list", "default": "", "desc": ""}, {"name": "inst2_seq", "type": "list", "default": "", "desc": ""}, {"name": "notes_dict", "type": "dict", "default": "", "desc": ""}], "return_type": "Tuple[pd.DataFrame, pd.DataFrame]", "returns_desc": "", "recently_modified": true}]}, "topology": {"name": "topology", "filename": "topology.py", "exists": true, "source": "\"\"\"\ntopology.py — professor.py의 generateBarcode 최적화 래퍼\n================================================================\n\n두 가지 방향의 최적화를 제공합니다:\n1. generate_barcode_numpy  : 기존 pHcol 알고리즘 + numpy 벡터화\n2. generate_barcode_ripser : ripser(C++) + cycle representative 추출\n\n둘 다 기존 generateBarcode와 동일한 출력 형식을 보장합니다:\n    [dimension, [birth_time, death_time], generator_string]\n\"\"\"\n\nimport numpy as np\nimport itertools as it\nfrom collections import defaultdict\nfrom typing import List, Tuple, Optional, Dict\n\n\n# ═══════════════════════════════════════════════════════════════════════════\n# 방향 1: Numpy 벡터화 버전\n# ═══════════════════════════════════════════════════════════════════════════\n\ndef generate_barcode_numpy(mat: np.ndarray,\n                           listOfDimension: list = [1],\n                           exactStep: bool = True,\n                           annotate: bool = True,\n                           onlyFiniteInterval: bool = False,\n                           birthDeathSimplex: bool = False,\n                           sortDimension: bool = False) -> list:\n    \"\"\"\n    기존 generateBarcode와 동일한 결과를 내는 numpy 최적화 버전.\n\n    최적화 포인트:\n    - filtration times: np.unique 벡터 연산\n    - VR complex: 행렬 인덱싱으로 diameter 일괄 계산\n    - pHcol: set 기반 column operation\n    \"\"\"\n    n = len(mat)\n    max_dim = max(listOfDimension)\n\n    # ══════════════════════════════════════════════════════\n    # 단계 1: Filtration times 추출 (벡터화)\n    # ══════════════════════════════════════════════════════\n    # 거리 행렬의 상삼각+대각선에서 고유한 양수 값들을 추출한다.\n    # 이 값들이 simplex가 등장하는 시점(filtration value)이 된다.\n    if exactStep:\n        # 상삼각 + 대각선에서 고유값 추출 (기존 distancesOfMatrix)\n        triu_idx = np.triu_indices(n)\n        vals = mat[triu_idx]\n        filt_times = np.unique(vals)\n        filt_times = filt_times[filt_times > 0]  # 0은 자기 자신과의 거리이므로 제외\n        filt_times = filt_times.tolist()\n    else:\n        raise NotImplementedError(\"exactStep=False는 미지원\")\n\n    if not filt_times:\n        return []\n\n    # ══════════════════════════════════════════════════════\n    # 단계 2: Vietoris-Rips 복합체 구축 (벡터화)\n    # ══════════════════════════════════════════════════════\n    # 각 filtration time마다 해당 시점에 등장하는 simplex들을 수집한다.\n    # simplex의 diameter = 구성 꼭짓점 쌍 중 최대 거리.\n    # diameter가 t인 simplex는 시점 t에 등장한다.\n\n    # 0-simplex(꼭짓점)는 항상 시점 0에 존재\n    simplices_by_step: Dict[float, list] = {0: [(i,) for i in range(n)]}\n    for t in filt_times:\n        simplices_by_step.setdefault(t, [])\n\n    # onlyFiniteInterval이면 필요한 차원만 계산하여 불필요한 조합 생성 방지\n    if onlyFiniteInterval:\n        dims_needed = set()\n        for d in listOfDimension:\n            dims_needed.add(d)       # cycle을 감지하려면 해당 차원 필요\n            dims_needed.add(d + 1)   # cycle을 \"죽이려면\" 한 차원 높은 simplex 필요\n        dims_needed = sorted(dims_needed)\n    else:\n        dims_needed = list(range(1, max_dim + 2))\n\n    filt_arr = np.array(filt_times)\n\n    for dim in dims_needed:\n        k = dim + 1  # simplex의 꼭짓점 개수 (예: 1-simplex=edge → k=2)\n        if k > n:\n            continue\n\n        if k == 2:\n            # Edge(1-simplex): 가장 빈번하므로 행렬 인덱싱으로 벡터화\n            # 상삼각의 모든 (i,j) 쌍이 edge 후보\n            ii, jj = np.triu_indices(n, k=1)\n            diameters = mat[ii, jj]  # edge의 diameter = 양 끝점 거리\n            for idx in range(len(ii)):\n                d = diameters[idx]\n                if d <= 0:\n                    continue\n                simplices_by_step.setdefault(d, []).append((int(ii[idx]), int(jj[idx])))\n        elif k == 3:\n            # Triangle(2-simplex): 세 변의 최대 길이가 diameter\n            combos = np.array(list(it.combinations(range(n), 3)))\n            if len(combos) == 0:\n                continue\n            i0, i1, i2 = combos[:, 0], combos[:, 1], combos[:, 2]\n            d01 = mat[i0, i1]  # 변 (0,1) 길이\n            d02 = mat[i0, i2]  # 변 (0,2) 길이\n            d12 = mat[i1, i2]  # 변 (1,2) 길이\n            diameters = np.maximum(np.maximum(d01, d02), d12)  # 세 변 중 최대\n\n            for idx in range(len(combos)):\n                d = diameters[idx]\n                if d <= 0:\n                    continue\n                simplices_by_step.setdefault(d, []).append(tuple(int(x) for x in combos[idx]))\n        else:\n            # 4-simplex 이상: 조합 수가 적으므로 itertools 사용\n            for tup in it.combinations(range(n), k):\n                d = max(mat[i, j] for (i, j) in it.combinations(tup, 2))\n                if d <= 0:\n                    continue\n                simplices_by_step.setdefault(d, []).append(tup)\n\n    # filtration 순서대로 정렬: 시점 0(꼭짓점) → 오름차순 filtration time\n    ordered_steps = [0] + filt_times\n    simplex_with_step = []\n    for step in ordered_steps:\n        slist = simplices_by_step.get(step, [])\n        if slist:\n            simplex_with_step.append((step, slist))\n\n    # ══════════════════════════════════════════════════════\n    # 단계 3: Column labels + Boundary matrix 구축\n    # ══════════════════════════════════════════════════════\n    # 각 simplex에 열 번호를 부여하고, 경계 연산자(boundary operator)를 구성한다.\n    # boundary(σ) = σ의 (dim-1)차 면(face)들의 교대합(alternating sum).\n    # 예: boundary(triangle ABC) = BC - AC + AB\n\n    col_labels = []       # [(filtration_time, simplex_tuple), ...] — 열 번호 → simplex 매핑\n    simplex_to_col = {}   # simplex_tuple → 열 번호 역매핑\n    col_idx = 0\n\n    for step, slist in simplex_with_step:\n        for s in slist:\n            col_labels.append((step, s))\n            simplex_to_col[s] = col_idx\n            col_idx += 1\n\n    total_cols = len(col_labels)\n\n    # Boundary matrix를 희소(sparse) 표현으로 구축\n    # D_rows[col] = 해당 열의 비제로 행 인덱스 리스트\n    # D_vals[col] = {행 인덱스: 계수(±1)} — 교대 부호\n    # None = 영벡터 열 (birth 후보), _SKIP = 관심 차원 밖 (무시)\n    _SKIP = \"SKIP\"\n    dim_filter = set(listOfDimension) if onlyFiniteInterval else set(range(max_dim + 2))\n\n    D_rows = [None] * total_cols\n    D_vals = [None] * total_cols\n\n    for c in range(total_cols):\n        _, simplex = col_labels[c]\n        sdim = len(simplex) - 2  # boundary의 homology 차원 (simplex 차원 - 1)\n        if sdim not in dim_filter:\n            D_rows[c] = _SKIP  # 관심 차원 밖이면 건너뜀\n            D_vals[c] = _SKIP\n            continue\n        if len(simplex) <= 1:\n            # 0-simplex(꼭짓점)는 경계가 없음 → 영벡터 → H0 birth 후보\n            D_rows[c] = None\n            D_vals[c] = None\n            continue\n\n        # 경계 연산자 계산: 각 면(face)에 교대 부호((-1)^e)를 부여\n        rows = []\n        vals = {}\n        for e, face in enumerate(it.combinations(simplex, len(simplex) - 1)):\n            if face in simplex_to_col:\n                r = simplex_to_col[face]\n                rows.append(r)\n                vals[r] = (-1) ** (e + 1)  # 교대 부호: +1, -1, +1, ...\n\n        if rows:\n            D_rows[c] = rows\n            D_vals[c] = vals\n        else:\n            D_rows[c] = None\n            D_vals[c] = None\n\n    # ══════════════════════════════════════════════════════\n    # 단계 4: pHcol 알고리즘 (Persistent Homology Column 축소)\n    # ══════════════════════════════════════════════════════\n    # 경계 행렬을 열 단위로 축소(reduce)하여 persistent interval을 추출한다.\n    # 핵심: 각 열의 \"pivot\" (최하단 비제로 원소)가 고유해질 때까지 열 덧셈 반복.\n    # - pivot이 없는 열(영벡터) → homology class 탄생 (birth)\n    # - pivot이 있는 열 → 해당 birth를 소멸시킴 (death)\n\n    births = []           # birth 열 인덱스 목록\n    finite_births = set() # death에 의해 소멸된 birth 열 인덱스 집합\n    low_R = {}            # low_R[pivot_row] = 해당 pivot을 가진 열 인덱스\n    low_R_val = {}        # low_R_val[pivot_row] = pivot 위치의 계수\n    barcode = []\n\n    col_simplex_list = [cl[1] for cl in col_labels]  # 열 번호 → simplex 빠른 조회용\n\n    for e in range(total_cols):\n        rows = D_rows[e]\n        vals = D_vals[e]\n\n        if rows is _SKIP:\n            # 관심 차원 밖의 열은 건너뜀\n            continue\n\n        if rows is None:\n            # 영벡터 열 → homology class 탄생 (birth)\n            births.append(e)\n            continue\n\n        # 현재 열의 pivot (가장 큰 행 인덱스) 찾기\n        pivot = max(rows)\n        coeff = vals[pivot]\n\n        # 열 축소(column reduction): 같은 pivot을 가진 기존 열이 있으면 빼서 제거\n        while pivot in low_R:\n            j = low_R[pivot]       # 같은 pivot을 가진 기존 열\n            jc = low_R_val[pivot]  # 기존 열의 pivot 계수\n            c = -coeff / jc        # pivot을 상쇄하기 위한 스칼라 배수\n\n            j_rows = D_rows[j]\n            j_vals = D_vals[j]\n\n            # 희소 열 덧셈: D[e] += c * D[j] (pivot 상쇄 목적)\n            new_vals = dict(vals)\n            for r in j_rows:\n                if r in new_vals:\n                    nv = new_vals[r] + c * j_vals[r]\n                    if nv == 0:\n                        del new_vals[r]  # 상쇄되어 0이 되면 제거\n                    else:\n                        new_vals[r] = nv\n                else:\n                    new_vals[r] = c * j_vals[r]\n\n            if not new_vals:\n                # 열이 완전히 영벡터가 됨 → birth로 전환\n                rows = None\n                vals = None\n                pivot = -1\n                break\n\n            # 새로운 pivot 계산 후 다시 검사\n            rows = list(new_vals.keys())\n            vals = new_vals\n            pivot = max(rows)\n            coeff = vals[pivot]\n\n        # 축소된 열 저장\n        D_rows[e] = rows\n        D_vals[e] = vals\n\n        if rows is None:\n            # 축소 결과 영벡터 → birth\n            births.append(e)\n            continue\n\n        # pivot이 남아있으면 → 이 열이 birth를 소멸시킴 (death)\n        low_R[pivot] = e\n        low_R_val[pivot] = coeff\n\n        # Finite interval(유한 구간) 추출: [birth_time, death_time]\n        finite_births.add(pivot)  # pivot 위치의 birth가 소멸됨을 기록\n        step_e, simplex_e = col_labels[e]\n        dim_e = len(simplex_e) - 2  # homology 차원 (death simplex 차원 - 1)\n\n        if dim_e not in listOfDimension:\n            continue\n\n        birth_simplex = col_labels[pivot][1]\n        birth_step = col_labels[pivot][0]\n        death_step = step_e\n\n        # 기존 코드의 두 가지 경우:\n        # 1) birth simplex가 vertex → birth time = 0 (H0의 connected component)\n        # 2) birth step != death step → 일반 finite interval\n        if len(birth_simplex) == 1:\n            # 꼭짓점에서 탄생 → birth time = 0\n            if annotate:\n                generator = _build_generator_string(rows, vals, col_simplex_list)\n            else:\n                generator = None\n            if birthDeathSimplex:\n                if annotate:\n                    entry = [dim_e, [0, birth_simplex], col_labels[e], generator]\n                else:\n                    entry = [dim_e, [0, birth_simplex], col_labels[e]]\n            else:\n                if annotate:\n                    entry = [dim_e, [0, death_step], generator]\n                else:\n                    entry = [dim_e, [0, death_step]]\n            barcode.append(entry)\n        elif birth_step != death_step:\n            # 일반 경우: birth와 death의 filtration time이 다른 유한 구간\n            if annotate:\n                generator = _build_generator_string(rows, vals, col_simplex_list)\n            else:\n                generator = None\n            if birthDeathSimplex:\n                if annotate:\n                    entry = [dim_e, col_labels[pivot], col_labels[e], generator]\n                else:\n                    entry = [dim_e, col_labels[pivot], col_labels[e]]\n            else:\n                if annotate:\n                    entry = [dim_e, [birth_step, death_step], generator]\n                else:\n                    entry = [dim_e, [birth_step, death_step]]\n            barcode.append(entry)\n\n    # 무한 구간(Infinite intervals): death 없이 끝까지 살아남은 homology class\n    if not onlyFiniteInterval:\n        for b in births:\n            if b in finite_births:\n                continue  # 이미 소멸된 birth는 제외\n            step_b, simplex_b = col_labels[b]\n            dim_b = len(simplex_b) - 1  # birth simplex의 homology 차원\n            if dim_b not in listOfDimension:\n                continue\n            if annotate:\n                generator = str(simplex_b)\n                if birthDeathSimplex:\n                    entry = [dim_b, [step_b, simplex_b], \"infty\", generator]\n                else:\n                    entry = [dim_b, [step_b, \"infty\"], generator]\n            else:\n                if birthDeathSimplex:\n                    entry = [dim_b, [step_b, simplex_b], \"infty\"]\n                else:\n                    entry = [dim_b, [step_b, \"infty\"]]\n            barcode.append(entry)\n\n    # 차원 기준 정렬 (요청 시)\n    if sortDimension:\n        barcode.sort(key=lambda x: x[0])\n\n    return barcode\n\n\ndef _build_generator_string(rows: list, vals: dict,\n                            col_simplex_list: list) -> str:\n    \"\"\"\n    pHcol의 축소된 열(reduced column)로부터 generator 문자열을 생성한다.\n\n    축소된 열의 비제로 원소들이 가리키는 simplex들의 선형결합이\n    곧 해당 homology class의 대표 cycle(representative cycle)이다.\n    부호를 반전(-1 곱)하여 기존 코드와 동일한 형식으로 출력한다.\n    예: \"(0, 1) + (1, 3) - (0, 3)\" → 꼭짓점 0-1-3을 잇는 삼각형 cycle\n    \"\"\"\n    parts = []\n    for i, r in enumerate(rows):\n        # 부호 반전: pHcol 축소 과정의 관례에 맞추기 위함\n        sign = int(vals[r]) * -1\n        simplex_str = str(col_simplex_list[r])\n        if i == 0:\n            # 첫 항: 양수면 부호 생략, 음수면 \" - \" 접두\n            if sign == -1:\n                parts.append(f\" - {simplex_str}\")\n            else:\n                parts.append(simplex_str)\n        else:\n            # 이후 항: \" + \" 또는 \" - \"로 연결\n            if sign == -1:\n                parts.append(f\" - {simplex_str}\")\n            elif sign == 1:\n                parts.append(f\" + {simplex_str}\")\n    return \"\".join(parts)\n\n\n# ═══════════════════════════════════════════════════════════════════════════\n# 방향 2: ripser 기반 버전\n# ═══════════════════════════════════════════════════════════════════════════\n\ndef _check_ripser():\n    \"\"\"ripser 설치 여부를 확인합니다.\"\"\"\n    try:\n        import ripser  # noqa: F401\n        return True\n    except ImportError:\n        return False\n\n\ndef _find_death_edge(mat: np.ndarray, death_val: float,\n                     birth_val: float) -> Optional[Tuple[int, int]]:\n    \"\"\"\n    death filtration value에서 추가되는 edge를 찾습니다.\n    birth 이후에 등장하는 edge 중 filtration value == death인 것.\n    \"\"\"\n    n = len(mat)\n    candidates = []\n    # 거리 행렬에서 death_val과 일치하는 모든 edge를 수집\n    for i in range(n):\n        for j in range(i + 1, n):\n            if abs(mat[i, j] - death_val) < 1e-8:\n                candidates.append((i, j))\n    return candidates\n\n\ndef _find_shortest_path_bfs(adj: Dict[int, list], src: int,\n                            dst: int) -> Optional[List[int]]:\n    \"\"\"BFS로 src → dst 최단 경로를 찾습니다.\"\"\"\n    from collections import deque as _deque\n    if src == dst:\n        return [src]\n    visited = {src}\n    queue = _deque([(src, [src])])\n    # 너비 우선 탐색: 최단 경로를 보장\n    while queue:\n        node, path = queue.popleft()\n        for neighbor in adj.get(node, []):\n            if neighbor == dst:\n                return path + [dst]\n            if neighbor not in visited:\n                visited.add(neighbor)\n                queue.append((neighbor, path + [neighbor]))\n    return None\n\n\ndef _extract_cycle_representative(mat: np.ndarray, birth: float,\n                                  death: float) -> Optional[List[Tuple[int, int]]]:\n    \"\"\"\n    H1 cycle representative를 추출합니다.\n\n    원리:\n    - death_val에서 추가되는 edge (u, v)가 cycle을 \"죽이는\" edge\n    - birth_val < filtration <= death_val인 graph에서\n      u→v 최단경로를 찾으면 그것이 cycle representative\n    \"\"\"\n    n = len(mat)\n\n    # 1단계: cycle을 소멸시키는 death edge 후보 찾기\n    # death 시점에 등장하는 edge가 기존 cycle을 채워서 소멸시킴\n    death_edges = _find_death_edge(mat, death, birth)\n    if not death_edges:\n        return None\n\n    # 2단계: death 직전까지의 그래프 구축 (filtration < death인 edge만 사용)\n    # 이 그래프에서 death edge의 양 끝점 사이에 경로가 있으면\n    # 그 경로 + death edge가 cycle을 이룸\n    adj: Dict[int, list] = defaultdict(list)\n    for i in range(n):\n        for j in range(i + 1, n):\n            if mat[i, j] < death - 1e-12:  # death 미만인 edge만 포함\n                adj[i].append(j)\n                adj[j].append(i)\n\n    # 3단계: 각 death edge (u, v)에 대해 BFS로 u→v 경로 탐색\n    # 경로가 존재하면 경로 + death edge = cycle representative\n    for u, v in death_edges:\n        path = _find_shortest_path_bfs(adj, u, v)\n        if path and len(path) >= 2:\n            # path = [u, ..., v] 형태의 경로\n            # cycle = 경로의 edge들 + 닫는 edge (v→u)\n            edges = []\n            for k in range(len(path) - 1):\n                a, b = path[k], path[k + 1]\n                edges.append((min(a, b), max(a, b)))  # 정규화: 작은 번호 먼저\n            edges.append((min(u, v), max(u, v)))  # cycle을 닫는 death edge\n            return edges\n\n    return None\n\n\ndef _edges_to_generator_string(edges: List[Tuple[int, int]]) -> str:\n    \"\"\"\n    edge 리스트를 기존 generator 문자열 형식으로 변환한다.\n    예: [(0,1), (1,3), (0,3)] → \"(0, 1) + (1, 3) + (0, 3)\"\n    \"\"\"\n    parts = []\n    for i, (a, b) in enumerate(edges):\n        s = f\"({a}, {b})\"\n        if i == 0:\n            parts.append(s)\n        else:\n            parts.append(f\" + {s}\")\n    return \"\".join(parts)\n\n\ndef generate_barcode_ripser(mat: np.ndarray,\n                            listOfDimension: list = [1],\n                            annotate: bool = True,\n                            birthDeathSimplex: bool = False,\n                            sortDimension: bool = False,\n                            onlyFiniteInterval: bool = False,\n                            **kwargs  # exactStep 등 numpy 버전 전용 인자 무시\n                            ) -> list:\n    \"\"\"\n    ripser(C++) 기반 persistent homology 계산.\n    기존 generateBarcode와 호환되는 출력 형식을 제공합니다.\n\n    주의: generator 추출은 BFS 기반 근사이므로,\n    기존 pHcol과 정확히 같은 generator가 아닐 수 있으나\n    동치인 cycle을 표현합니다.\n    \"\"\"\n    try:\n        from ripser import ripser\n    except ImportError:\n        raise ImportError(\n            \"ripser 패키지가 필요합니다: pip install ripser\"\n        )\n\n    max_dim = max(listOfDimension)\n\n    # ripser 실행: C++ 기반으로 매우 빠르지만 cycle representative를 직접 제공하지 않음\n    result = ripser(mat, maxdim=max_dim, distance_matrix=True)\n    diagrams = result['dgms']  # diagrams[dim] = Nx2 배열 (birth, death)\n\n    barcode = []\n\n    for dim in listOfDimension:\n        if dim >= len(diagrams):\n            continue\n        dgm = diagrams[dim]\n\n        for birth, death in dgm:\n            # 무한 구간: death = inf → 영원히 살아남는 homology class\n            if np.isinf(death):\n                if onlyFiniteInterval:\n                    continue\n                if annotate:\n                    entry = [dim, [float(birth), \"infty\"], \"\"]\n                else:\n                    entry = [dim, [float(birth), \"infty\"]]\n                barcode.append(entry)\n                continue\n\n            # 유한 구간: cycle이 탄생(birth)했다가 소멸(death)하는 경우\n            b_val = float(birth)\n            d_val = float(death)\n\n            if annotate and dim == 1:\n                # H1 cycle의 경우: BFS로 cycle representative 추출 시도\n                # ripser는 cycle 정보를 주지 않으므로 death edge + BFS로 근사\n                edges = _extract_cycle_representative(mat, b_val, d_val)\n                if edges:\n                    gen_str = _edges_to_generator_string(edges)\n                else:\n                    gen_str = \"\"  # cycle 추출 실패 시 빈 문자열\n\n                if birthDeathSimplex:\n                    entry = [dim, [b_val, None], [d_val, None], gen_str]\n                else:\n                    entry = [dim, [b_val, d_val], gen_str]\n            else:\n                if birthDeathSimplex:\n                    entry = [dim, [b_val, None], [d_val, None]]\n                else:\n                    entry = [dim, [b_val, d_val]]\n            barcode.append(entry)\n\n    if sortDimension:\n        barcode.sort(key=lambda x: x[0])\n\n    return barcode\n", "line_count": 561, "functions": [{"name": "generate_barcode_numpy", "qual": "generate_barcode_numpy", "class": "", "lineno": 23, "end_lineno": 344, "doc_short": "기존 generateBarcode와 동일한 결과를 내는 numpy 최적화 버전.", "description": "기존 generateBarcode와 동일한 결과를 내는 numpy 최적화 버전.\n최적화 포인트:\n- filtration times: np.unique 벡터 연산\n- VR complex: 행렬 인덱싱으로 diameter 일괄 계산\n- pHcol: set 기반 column operation", "params": [{"name": "mat", "type": "np.ndarray", "default": "", "desc": ""}, {"name": "listOfDimension", "type": "list", "default": "[1]", "desc": ""}, {"name": "exactStep", "type": "bool", "default": "True", "desc": ""}, {"name": "annotate", "type": "bool", "default": "True", "desc": ""}, {"name": "onlyFiniteInterval", "type": "bool", "default": "False", "desc": ""}, {"name": "birthDeathSimplex", "type": "bool", "default": "False", "desc": ""}, {"name": "sortDimension", "type": "bool", "default": "False", "desc": ""}], "return_type": "list", "returns_desc": "", "recently_modified": true}, {"name": "_build_generator_string", "qual": "_build_generator_string", "class": "", "lineno": 347, "end_lineno": 374, "doc_short": "pHcol의 축소된 열(reduced column)로부터 generator 문자열을 생성한다.", "description": "pHcol의 축소된 열(reduced column)로부터 generator 문자열을 생성한다.\n축소된 열의 비제로 원소들이 가리키는 simplex들의 선형결합이\n곧 해당 homology class의 대표 cycle(representative cycle)이다.\n부호를 반전(-1 곱)하여 기존 코드와 동일한 형식으로 출력한다.\n예: \"(0, 1) + (1, 3) - (0, 3)\" → 꼭짓점 0-1-3을 잇는 삼각형 cycle", "params": [{"name": "rows", "type": "list", "default": "", "desc": ""}, {"name": "vals", "type": "dict", "default": "", "desc": ""}, {"name": "col_simplex_list", "type": "list", "default": "", "desc": ""}], "return_type": "str", "returns_desc": "", "recently_modified": true}, {"name": "_check_ripser", "qual": "_check_ripser", "class": "", "lineno": 381, "end_lineno": 387, "doc_short": "ripser 설치 여부를 확인합니다.", "description": "ripser 설치 여부를 확인합니다.", "params": [], "return_type": "", "returns_desc": "", "recently_modified": true}, {"name": "_find_death_edge", "qual": "_find_death_edge", "class": "", "lineno": 390, "end_lineno": 403, "doc_short": "death filtration value에서 추가되는 edge를 찾습니다.", "description": "death filtration value에서 추가되는 edge를 찾습니다.\nbirth 이후에 등장하는 edge 중 filtration value == death인 것.", "params": [{"name": "mat", "type": "np.ndarray", "default": "", "desc": ""}, {"name": "death_val", "type": "float", "default": "", "desc": ""}, {"name": "birth_val", "type": "float", "default": "", "desc": ""}], "return_type": "Optional[Tuple[int, int]]", "returns_desc": "", "recently_modified": true}, {"name": "_find_shortest_path_bfs", "qual": "_find_shortest_path_bfs", "class": "", "lineno": 406, "end_lineno": 423, "doc_short": "BFS로 src → dst 최단 경로를 찾습니다.", "description": "BFS로 src → dst 최단 경로를 찾습니다.", "params": [{"name": "adj", "type": "Dict[int, list]", "default": "", "desc": ""}, {"name": "src", "type": "int", "default": "", "desc": ""}, {"name": "dst", "type": "int", "default": "", "desc": ""}], "return_type": "Optional[List[int]]", "returns_desc": "", "recently_modified": true}, {"name": "_extract_cycle_representative", "qual": "_extract_cycle_representative", "class": "", "lineno": 426, "end_lineno": 468, "doc_short": "H1 cycle representative를 추출합니다.", "description": "H1 cycle representative를 추출합니다.\n원리:\n- death_val에서 추가되는 edge (u, v)가 cycle을 \"죽이는\" edge\n- birth_val < filtration <= death_val인 graph에서\nu→v 최단경로를 찾으면 그것이 cycle representative", "params": [{"name": "mat", "type": "np.ndarray", "default": "", "desc": ""}, {"name": "birth", "type": "float", "default": "", "desc": ""}, {"name": "death", "type": "float", "default": "", "desc": ""}], "return_type": "Optional[List[Tuple[int, int]]]", "returns_desc": "", "recently_modified": true}, {"name": "_edges_to_generator_string", "qual": "_edges_to_generator_string", "class": "", "lineno": 471, "end_lineno": 483, "doc_short": "edge 리스트를 기존 generator 문자열 형식으로 변환한다.", "description": "edge 리스트를 기존 generator 문자열 형식으로 변환한다.\n예: [(0,1), (1,3), (0,3)] → \"(0, 1) + (1, 3) + (0, 3)\"", "params": [{"name": "edges", "type": "List[Tuple[int, int]]", "default": "", "desc": ""}], "return_type": "str", "returns_desc": "", "recently_modified": true}, {"name": "generate_barcode_ripser", "qual": "generate_barcode_ripser", "class": "", "lineno": 486, "end_lineno": 561, "doc_short": "ripser(C++) 기반 persistent homology 계산.", "description": "ripser(C++) 기반 persistent homology 계산.\n기존 generateBarcode와 호환되는 출력 형식을 제공합니다.\n주의: generator 추출은 BFS 기반 근사이므로,\n기존 pHcol과 정확히 같은 generator가 아닐 수 있으나\n동치인 cycle을 표현합니다.", "params": [{"name": "mat", "type": "np.ndarray", "default": "", "desc": ""}, {"name": "listOfDimension", "type": "list", "default": "[1]", "desc": ""}, {"name": "annotate", "type": "bool", "default": "True", "desc": ""}, {"name": "birthDeathSimplex", "type": "bool", "default": "False", "desc": ""}, {"name": "sortDimension", "type": "bool", "default": "False", "desc": ""}, {"name": "onlyFiniteInterval", "type": "bool", "default": "False", "desc": ""}], "return_type": "list", "returns_desc": "", "recently_modified": true}]}, "musical_metrics": {"name": "musical_metrics", "filename": "musical_metrics.py", "exists": true, "source": "\"\"\"\nmusical_metrics.py — 음악적 거리 함수 플러그인 시스템\n=====================================================\n\n기존 파이프라인의 빈도 역수 거리 외에\n음악 이론 기반 거리를 플러그인 방식으로 제공합니다.\n\n사용 가능한 거리:\n  1. 'frequency'  — 기존 (빈도 역수, 1/weight)\n  2. 'tonnetz'    — Tonnetz 격자 위 최단 경로 거리\n  3. 'voice_leading' — 두 note 간 최소 음 이동량\n  4. 'dft'        — Discrete Fourier Transform 거리\n\n사용법:\n  from musical_metrics import get_metric, compute_note_distance_matrix\n  dist = compute_note_distance_matrix(notes_label, metric='tonnetz')\n\"\"\"\n\nimport numpy as np\nfrom typing import Dict, Tuple, Optional\n\n\n# ═══════════════════════════════════════════════════════════════════════════\n# 1. Tonnetz 거리\n# ═══════════════════════════════════════════════════════════════════════════\n#\n# Tonnetz는 pitch class를 장3도(+4)와 완전5도(+7) 관계로 배열한 2D 격자.\n# 두 pitch class 사이의 Tonnetz 거리 = 격자 위 최단 경로 길이.\n#\n# 좌표 체계:\n#   pitch class p를 Tonnetz 좌표 (x, y)로 변환:\n#     x축 = 장3도 이동 (4 semitones)\n#     y축 = 완전5도 이동 (7 semitones)\n#     p ≡ 4x + 7y (mod 12)\n#\n#   이 좌표에서의 거리 = |Δx| + |Δy| (Manhattan distance on Tonnetz)\n\n# 미리 계산된 12개 pitch class 간 Tonnetz 거리 (BFS로 계산)\n_TONNETZ_DIST = None\n\n\ndef _build_tonnetz_distance_table() -> np.ndarray:\n    \"\"\"\n    12개 pitch class 간의 Tonnetz 최단 거리 테이블을 BFS로 구축합니다.\n\n    Tonnetz 이웃 관계:\n      - 장3도: ±4 semitones\n      - 단3도: ±3 semitones (장3도의 보완)\n      - 완전5도: ±7 semitones\n\n    이 3가지 이동으로 연결된 격자에서 BFS → 최단 거리.\n    \"\"\"\n    from collections import deque\n\n    # Tonnetz 이웃: 장3도(±4), 단3도(±3), 완전5도(±7)\n    neighbors = [3, -3, 4, -4, 7, -7]\n\n    dist = np.full((12, 12), 99, dtype=int)\n    np.fill_diagonal(dist, 0)\n\n    for src in range(12):\n        visited = {src}\n        queue = deque([(src, 0)])\n        while queue:\n            node, d = queue.popleft()\n            for step in neighbors:\n                nxt = (node + step) % 12\n                if nxt not in visited:\n                    visited.add(nxt)\n                    dist[src, nxt] = d + 1\n                    queue.append((nxt, d + 1))\n\n    return dist\n\n\ndef tonnetz_distance(pc1: int, pc2: int) -> int:\n    \"\"\"두 pitch class (0~11) 간의 Tonnetz 거리.\"\"\"\n    global _TONNETZ_DIST\n    if _TONNETZ_DIST is None:\n        _TONNETZ_DIST = _build_tonnetz_distance_table()\n    return int(_TONNETZ_DIST[pc1 % 12, pc2 % 12])\n\n\ndef tonnetz_note_distance(note1: Tuple[int, int], note2: Tuple[int, int],\n                          octave_weight: float = 0.3,\n                          duration_weight: float = 0.3) -> float:\n    \"\"\"\n    두 note = (pitch, duration) 간의 Tonnetz 기반 거리.\n\n    Tonnetz는 pitch class(mod 12)만 고려하므로,\n    옥타브 차이와 duration 차이를 추가 항으로 반영합니다.\n\n    d(n1, n2) = tonnetz(pc1, pc2)\n              + octave_weight * |octave1 - octave2|\n              + duration_weight * |dur1 - dur2| / max_dur\n\n    Args:\n        note1, note2: (pitch, duration) 튜플\n        octave_weight: 옥타브 차이 가중치\n        duration_weight: duration 차이 가중치\n    \"\"\"\n    p1, d1 = note1\n    p2, d2 = note2\n\n    # Tonnetz 거리 (pitch class)\n    t_dist = tonnetz_distance(p1 % 12, p2 % 12)\n\n    # 옥타브 차이\n    oct_diff = abs(p1 // 12 - p2 // 12)\n\n    # Duration 차이 (정규화)\n    max_dur = max(d1, d2, 1)\n    dur_diff = abs(d1 - d2) / max_dur\n\n    return t_dist + octave_weight * oct_diff + duration_weight * dur_diff\n\n\n# ═══════════════════════════════════════════════════════════════════════════\n# 1b. Triad Sharing Distance\n# ═══════════════════════════════════════════════════════════════════════════\n#\n# 두 pitch class가 함께 속하는 Major/Minor triad 개수를 기반으로 거리를 계산.\n# BFS Tonnetz 거리가 \"격자 칸 수(이산)\"를 측정하는 반면,\n# 이 거리는 \"공유 화음 수\"를 직접 측정 — 더 soft한 화성 근접도.\n#\n# 24개 triad:\n#   major triad r: {r, r+4, r+7} mod 12,  for r in range(12)\n#   minor triad r: {r, r+3, r+7} mod 12,  for r in range(12)\n#\n# shared_count(pc1, pc2) = 두 pc가 함께 속하는 triad 수  (범위: 0~6)\n# distance = 1 / (shared_count + 1e-6)\n#   → 많이 공유할수록 가까움, 전혀 공유 안 하면 ≈ 1e6\n\n_TRIAD_SHARING_DIST = None\n\n\ndef _build_triad_sharing_table() -> np.ndarray:\n    \"\"\"\n    12×12 Triad Sharing 거리 테이블을 구축합니다.\n\n    각 pitch class 쌍에 대해 함께 속하는 Major/Minor triad 수를 세고,\n    그 역수를 거리로 사용합니다. 대각선(자기 자신)은 0으로 설정합니다.\n\n    수학적 성질:\n      - 자음 음정(단3도·장3도·4도/5도·단6도·장6도) 쌍 → 공유 2 → 거리 ≈ 0.5\n      - 불협음 음정(단2도·장2도·증4도) 쌍 → 공유 0 → 거리 ≈ 1e6\n      - 같은 음 → 공유 6 → 대각선이므로 0으로 재설정\n    \"\"\"\n    triads = []\n    for r in range(12):\n        triads.append(frozenset({r % 12, (r + 4) % 12, (r + 7) % 12}))  # major\n        triads.append(frozenset({r % 12, (r + 3) % 12, (r + 7) % 12}))  # minor\n\n    shared = np.zeros((12, 12), dtype=float)\n    for pc1 in range(12):\n        for pc2 in range(12):\n            shared[pc1, pc2] = sum(1 for t in triads if pc1 in t and pc2 in t)\n\n    dist = 1.0 / (shared + 1e-6)\n    np.fill_diagonal(dist, 0.0)\n    return dist\n\n\ndef triad_sharing_distance(pc1: int, pc2: int) -> float:\n    \"\"\"두 pitch class (0~11) 간의 Triad Sharing 거리.\"\"\"\n    global _TRIAD_SHARING_DIST\n    if _TRIAD_SHARING_DIST is None:\n        _TRIAD_SHARING_DIST = _build_triad_sharing_table()\n    return float(_TRIAD_SHARING_DIST[pc1 % 12, pc2 % 12])\n\n\ndef triad_sharing_note_distance(note1: Tuple[int, int], note2: Tuple[int, int],\n                                octave_weight: float = 0.3,\n                                duration_weight: float = 0.3) -> float:\n    \"\"\"\n    두 note = (pitch, duration) 간의 Triad Sharing 기반 거리.\n    tonnetz_note_distance와 동일한 구조, pc 거리 함수만 교체.\n\n    d(n1, n2) = triad_sharing(pc1, pc2)\n              + octave_weight * |octave1 - octave2|\n              + duration_weight * |dur1 - dur2| / max_dur\n    \"\"\"\n    p1, d1 = note1\n    p2, d2 = note2\n\n    ts_dist = triad_sharing_distance(p1 % 12, p2 % 12)\n    oct_diff = abs(p1 // 12 - p2 // 12)\n    max_dur = max(d1, d2, 1)\n    dur_diff = abs(d1 - d2) / max_dur\n\n    return ts_dist + octave_weight * oct_diff + duration_weight * dur_diff\n\n\n# ═══════════════════════════════════════════════════════════════════════════\n# 2. Voice-leading 거리\n# ═══════════════════════════════════════════════════════════════════════════\n\ndef voice_leading_note_distance(note1: Tuple[int, int], note2: Tuple[int, int],\n                                duration_weight: float = 0.3) -> float:\n    \"\"\"\n    두 note 간의 voice-leading 거리.\n\n    단일 음에 대해서는 pitch 차이(semitones)가 voice-leading 거리.\n    duration 차이도 가중하여 반영.\n\n    d(n1, n2) = |pitch1 - pitch2| + duration_weight * |dur1 - dur2| / max_dur\n    \"\"\"\n    p1, d1 = note1\n    p2, d2 = note2\n\n    pitch_dist = abs(p1 - p2)\n    max_dur = max(d1, d2, 1)\n    dur_diff = abs(d1 - d2) / max_dur\n\n    return pitch_dist + duration_weight * dur_diff\n\n\n# ═══════════════════════════════════════════════════════════════════════════\n# 3. DFT (Discrete Fourier Transform) 거리\n# ═══════════════════════════════════════════════════════════════════════════\n\n_DFT_CACHE = None\n\n\ndef _build_dft_cache() -> np.ndarray:\n    \"\"\"12개 pitch class의 DFT 계수를 미리 계산합니다.\"\"\"\n    cache = np.zeros((12, 6))\n    for pc in range(12):\n        indicator = np.zeros(12)\n        indicator[pc] = 1.0\n        fft = np.fft.fft(indicator)\n        cache[pc] = np.abs(fft[1:7])\n    return cache\n\n\ndef pitch_class_dft(pc: int) -> np.ndarray:\n    \"\"\"\n    단일 pitch class를 12차원 indicator로 변환 후 DFT.\n\n    Returns:\n        6개의 Fourier 계수 크기 (|f̂(1)|, ..., |f̂(6)|)\n    \"\"\"\n    global _DFT_CACHE\n    if _DFT_CACHE is None:\n        _DFT_CACHE = _build_dft_cache()\n    return _DFT_CACHE[pc % 12]\n\n\ndef dft_note_distance(note1: Tuple[int, int], note2: Tuple[int, int],\n                      octave_weight: float = 0.5,\n                      duration_weight: float = 0.3) -> float:\n    \"\"\"\n    두 note 간의 DFT 거리.\n\n    각 note의 pitch class를 Fourier 공간으로 변환하여\n    L2 거리를 계산합니다.\n\n    d(n1, n2) = ||DFT(pc1) - DFT(pc2)||₂\n              + octave_weight * |oct1 - oct2|\n              + duration_weight * |dur1 - dur2| / max_dur\n    \"\"\"\n    p1, d1 = note1\n    p2, d2 = note2\n\n    # DFT 거리\n    f1 = pitch_class_dft(p1)\n    f2 = pitch_class_dft(p2)\n    dft_dist = np.linalg.norm(f1 - f2)\n\n    # 옥타브 + duration\n    oct_diff = abs(p1 // 12 - p2 // 12)\n    max_dur = max(d1, d2, 1)\n    dur_diff = abs(d1 - d2) / max_dur\n\n    return dft_dist + octave_weight * oct_diff + duration_weight * dur_diff\n\n\n# ═══════════════════════════════════════════════════════════════════════════\n# 플러그인 인터페이스\n# ═══════════════════════════════════════════════════════════════════════════\n\nMETRICS = {\n    'tonnetz': tonnetz_note_distance,\n    'triad_sharing': triad_sharing_note_distance,\n    'voice_leading': voice_leading_note_distance,\n    'dft': dft_note_distance,\n}\n\n\ndef get_metric(name: str):\n    \"\"\"이름으로 거리 함수를 가져옵니다.\"\"\"\n    if name not in METRICS:\n        raise ValueError(f\"Unknown metric '{name}'. Available: {list(METRICS.keys())}\")\n    return METRICS[name]\n\n\ndef compute_note_distance_matrix(notes_label: dict,\n                                 metric: str = 'tonnetz',\n                                 **kwargs) -> np.ndarray:\n    \"\"\"\n    notes_label의 모든 note 쌍에 대해 musical metric 거리 행렬을 계산합니다.\n\n    기존 파이프라인의 빈도 기반 거리를 대체하거나 결합할 수 있습니다.\n\n    Args:\n        notes_label: {(pitch, dur): label} 매핑 (1-indexed)\n        metric: 'tonnetz' | 'voice_leading' | 'dft'\n\n    Returns:\n        (N, N) 대칭 거리 행렬 (1-indexed label 순서)\n    \"\"\"\n    dist_fn = get_metric(metric)\n\n    # label 순서대로 note 목록 구성\n    sorted_items = sorted(notes_label.items(), key=lambda x: x[1])\n    notes = [note_tuple for note_tuple, label in sorted_items]\n    N = len(notes)\n\n    dist = np.zeros((N, N), dtype=float)\n    for i in range(N):\n        for j in range(i + 1, N):\n            d = dist_fn(notes[i], notes[j], **kwargs)\n            dist[i, j] = d\n            dist[j, i] = d\n\n    return dist\n\n\ndef compute_hybrid_distance(freq_distance: np.ndarray,\n                            musical_distance: np.ndarray,\n                            alpha: float = 0.5) -> np.ndarray:\n    \"\"\"\n    빈도 기반 거리와 음악적 거리를 결합합니다.\n\n    d_hybrid = alpha * d_freq_normalized + (1 - alpha) * d_musical_normalized\n\n    Args:\n        freq_distance: 기존 빈도 역수 거리 행렬 (N, N)\n        musical_distance: 음악적 거리 행렬 (N, N)\n        alpha: 빈도 거리 가중치 (0=음악적만, 1=빈도만, 0.5=반반)\n    \"\"\"\n    # 각 행렬을 [0, 1]로 정규화\n    def normalize(m):\n        mask = m > 0\n        if not mask.any():\n            return m\n        min_val = m[mask].min()\n        max_val = m[mask].max()\n        if max_val == min_val:\n            return np.where(mask, 0.5, 0)\n        result = np.zeros_like(m)\n        result[mask] = (m[mask] - min_val) / (max_val - min_val)\n        return result\n\n    f_norm = normalize(freq_distance)\n    m_norm = normalize(musical_distance)\n\n    return alpha * f_norm + (1 - alpha) * m_norm\n\n\ndef compute_multi_hybrid_distance(freq_distance: np.ndarray,\n                                   notes_label: dict,\n                                   metric_names: list,\n                                   weights: Optional[list] = None) -> np.ndarray:\n    \"\"\"\n    빈도 거리 + 여러 음악적 거리를 가중 혼합합니다.\n\n    예: metric_names=['tonnetz', 'dft'], weights=[0.4, 0.3, 0.3]\n    → 40% 빈도 + 30% Tonnetz + 30% DFT\n\n    weights의 첫 번째 값이 빈도 거리 비중,\n    나머지가 metric_names 순서대로의 비중.\n    weights가 None이면 모든 metric에 균등 배분.\n\n    Args:\n        freq_distance: (N, N) 빈도 기반 거리\n        notes_label: note label dict\n        metric_names: ['tonnetz'], ['tonnetz', 'dft'], ['tonnetz', 'voice_leading', 'dft'] 등\n        weights: [freq_w, metric1_w, metric2_w, ...] 합 = 1.0\n\n    Returns:\n        (N, N) 혼합 거리 행렬\n    \"\"\"\n    n_metrics = len(metric_names)\n\n    if weights is None:\n        # 균등 배분: 빈도 + n개 metric = 총 (n+1)개\n        w = 1.0 / (n_metrics + 1)\n        weights = [w] * (n_metrics + 1)\n\n    assert len(weights) == n_metrics + 1, \\\n        f\"weights 길이({len(weights)})가 metric 수+1({n_metrics+1})과 불일치\"\n\n    # 정규화 함수\n    def normalize(m):\n        mask = m > 0\n        if not mask.any():\n            return m\n        min_val = m[mask].min()\n        max_val = m[mask].max()\n        if max_val == min_val:\n            return np.where(mask, 0.5, 0)\n        result = np.zeros_like(m)\n        result[mask] = (m[mask] - min_val) / (max_val - min_val)\n        return result\n\n    # 빈도 거리 (정규화)\n    result = weights[0] * normalize(freq_distance)\n\n    # 각 음악적 거리 추가\n    for i, name in enumerate(metric_names):\n        m_dist = compute_note_distance_matrix(notes_label, metric=name)\n        result += weights[i + 1] * normalize(m_dist)\n\n    return result\n", "line_count": 415, "functions": [{"name": "_build_tonnetz_distance_table", "qual": "_build_tonnetz_distance_table", "class": "", "lineno": 42, "end_lineno": 73, "doc_short": "12개 pitch class 간의 Tonnetz 최단 거리 테이블을 BFS로 구축합니다.", "description": "12개 pitch class 간의 Tonnetz 최단 거리 테이블을 BFS로 구축합니다.\nTonnetz 이웃 관계:\n- 장3도: ±4 semitones\n- 단3도: ±3 semitones (장3도의 보완)\n- 완전5도: ±7 semitones\n이 3가지 이동으로 연결된 격자에서 BFS → 최단 거리.", "params": [], "return_type": "np.ndarray", "returns_desc": "", "recently_modified": true}, {"name": "tonnetz_distance", "qual": "tonnetz_distance", "class": "", "lineno": 76, "end_lineno": 81, "doc_short": "두 pitch class (0~11) 간의 Tonnetz 거리.", "description": "두 pitch class (0~11) 간의 Tonnetz 거리.", "params": [{"name": "pc1", "type": "int", "default": "", "desc": ""}, {"name": "pc2", "type": "int", "default": "", "desc": ""}], "return_type": "int", "returns_desc": "", "recently_modified": true}, {"name": "tonnetz_note_distance", "qual": "tonnetz_note_distance", "class": "", "lineno": 84, "end_lineno": 115, "doc_short": "두 note = (pitch, duration) 간의 Tonnetz 기반 거리.", "description": "두 note = (pitch, duration) 간의 Tonnetz 기반 거리.\nTonnetz는 pitch class(mod 12)만 고려하므로,\n옥타브 차이와 duration 차이를 추가 항으로 반영합니다.\nd(n1, n2) = tonnetz(pc1, pc2)\n+ octave_weight * |octave1 - octave2|\n+ duration_weight * |dur1 - dur2| / max_dur", "params": [{"name": "note1", "type": "Tuple[int, int]", "default": "", "desc": ""}, {"name": "note2", "type": "Tuple[int, int]", "default": "", "desc": ""}, {"name": "octave_weight", "type": "float", "default": "0.3", "desc": "옥타브 차이 가중치"}, {"name": "duration_weight", "type": "float", "default": "0.3", "desc": "duration 차이 가중치"}], "return_type": "float", "returns_desc": "", "recently_modified": true}, {"name": "_build_triad_sharing_table", "qual": "_build_triad_sharing_table", "class": "", "lineno": 137, "end_lineno": 161, "doc_short": "12×12 Triad Sharing 거리 테이블을 구축합니다.", "description": "12×12 Triad Sharing 거리 테이블을 구축합니다.\n각 pitch class 쌍에 대해 함께 속하는 Major/Minor triad 수를 세고,\n그 역수를 거리로 사용합니다. 대각선(자기 자신)은 0으로 설정합니다.\n수학적 성질:\n- 자음 음정(단3도·장3도·4도/5도·단6도·장6도) 쌍 → 공유 2 → 거리 ≈ 0.5\n- 불협음 음정(단2도·장2도·증4도) 쌍 → 공유 0 → 거리 ≈ 1e6\n- 같은 음 → 공유 6 → 대각선이므로 0으로 재설정", "params": [], "return_type": "np.ndarray", "returns_desc": "", "recently_modified": true}, {"name": "triad_sharing_distance", "qual": "triad_sharing_distance", "class": "", "lineno": 164, "end_lineno": 169, "doc_short": "두 pitch class (0~11) 간의 Triad Sharing 거리.", "description": "두 pitch class (0~11) 간의 Triad Sharing 거리.", "params": [{"name": "pc1", "type": "int", "default": "", "desc": ""}, {"name": "pc2", "type": "int", "default": "", "desc": ""}], "return_type": "float", "returns_desc": "", "recently_modified": true}, {"name": "triad_sharing_note_distance", "qual": "triad_sharing_note_distance", "class": "", "lineno": 172, "end_lineno": 191, "doc_short": "두 note = (pitch, duration) 간의 Triad Sharing 기반 거리.", "description": "두 note = (pitch, duration) 간의 Triad Sharing 기반 거리.\ntonnetz_note_distance와 동일한 구조, pc 거리 함수만 교체.\nd(n1, n2) = triad_sharing(pc1, pc2)\n+ octave_weight * |octave1 - octave2|\n+ duration_weight * |dur1 - dur2| / max_dur", "params": [{"name": "note1", "type": "Tuple[int, int]", "default": "", "desc": ""}, {"name": "note2", "type": "Tuple[int, int]", "default": "", "desc": ""}, {"name": "octave_weight", "type": "float", "default": "0.3", "desc": ""}, {"name": "duration_weight", "type": "float", "default": "0.3", "desc": ""}], "return_type": "float", "returns_desc": "", "recently_modified": true}, {"name": "voice_leading_note_distance", "qual": "voice_leading_note_distance", "class": "", "lineno": 198, "end_lineno": 215, "doc_short": "두 note 간의 voice-leading 거리.", "description": "두 note 간의 voice-leading 거리.\n단일 음에 대해서는 pitch 차이(semitones)가 voice-leading 거리.\nduration 차이도 가중하여 반영.\nd(n1, n2) = |pitch1 - pitch2| + duration_weight * |dur1 - dur2| / max_dur", "params": [{"name": "note1", "type": "Tuple[int, int]", "default": "", "desc": ""}, {"name": "note2", "type": "Tuple[int, int]", "default": "", "desc": ""}, {"name": "duration_weight", "type": "float", "default": "0.3", "desc": ""}], "return_type": "float", "returns_desc": "", "recently_modified": true}, {"name": "_build_dft_cache", "qual": "_build_dft_cache", "class": "", "lineno": 225, "end_lineno": 233, "doc_short": "12개 pitch class의 DFT 계수를 미리 계산합니다.", "description": "12개 pitch class의 DFT 계수를 미리 계산합니다.", "params": [], "return_type": "np.ndarray", "returns_desc": "", "recently_modified": true}, {"name": "pitch_class_dft", "qual": "pitch_class_dft", "class": "", "lineno": 236, "end_lineno": 246, "doc_short": "단일 pitch class를 12차원 indicator로 변환 후 DFT.", "description": "단일 pitch class를 12차원 indicator로 변환 후 DFT.", "params": [{"name": "pc", "type": "int", "default": "", "desc": ""}], "return_type": "np.ndarray", "returns_desc": "6개의 Fourier 계수 크기 (|f̂(1)|, ..., |f̂(6)|)", "recently_modified": true}, {"name": "dft_note_distance", "qual": "dft_note_distance", "class": "", "lineno": 249, "end_lineno": 275, "doc_short": "두 note 간의 DFT 거리.", "description": "두 note 간의 DFT 거리.\n각 note의 pitch class를 Fourier 공간으로 변환하여\nL2 거리를 계산합니다.\nd(n1, n2) = ||DFT(pc1) - DFT(pc2)||₂\n+ octave_weight * |oct1 - oct2|\n+ duration_weight * |dur1 - dur2| / max_dur", "params": [{"name": "note1", "type": "Tuple[int, int]", "default": "", "desc": ""}, {"name": "note2", "type": "Tuple[int, int]", "default": "", "desc": ""}, {"name": "octave_weight", "type": "float", "default": "0.5", "desc": ""}, {"name": "duration_weight", "type": "float", "default": "0.3", "desc": ""}], "return_type": "float", "returns_desc": "", "recently_modified": true}, {"name": "get_metric", "qual": "get_metric", "class": "", "lineno": 290, "end_lineno": 294, "doc_short": "이름으로 거리 함수를 가져옵니다.", "description": "이름으로 거리 함수를 가져옵니다.", "params": [{"name": "name", "type": "str", "default": "", "desc": ""}], "return_type": "", "returns_desc": "", "recently_modified": true}, {"name": "compute_note_distance_matrix", "qual": "compute_note_distance_matrix", "class": "", "lineno": 297, "end_lineno": 326, "doc_short": "notes_label의 모든 note 쌍에 대해 musical metric 거리 행렬을 계산합니다.", "description": "notes_label의 모든 note 쌍에 대해 musical metric 거리 행렬을 계산합니다.\n기존 파이프라인의 빈도 기반 거리를 대체하거나 결합할 수 있습니다.", "params": [{"name": "notes_label", "type": "dict", "default": "", "desc": "{(pitch, dur): label} 매핑 (1-indexed)"}, {"name": "metric", "type": "str", "default": "'tonnetz'", "desc": "'tonnetz' | 'voice_leading' | 'dft'"}], "return_type": "np.ndarray", "returns_desc": "(N, N) 대칭 거리 행렬 (1-indexed label 순서)", "recently_modified": true}, {"name": "compute_hybrid_distance", "qual": "compute_hybrid_distance", "class": "", "lineno": 329, "end_lineno": 358, "doc_short": "빈도 기반 거리와 음악적 거리를 결합합니다.", "description": "빈도 기반 거리와 음악적 거리를 결합합니다.\nd_hybrid = alpha * d_freq_normalized + (1 - alpha) * d_musical_normalized", "params": [{"name": "freq_distance", "type": "np.ndarray", "default": "", "desc": "기존 빈도 역수 거리 행렬 (N, N)"}, {"name": "musical_distance", "type": "np.ndarray", "default": "", "desc": "음악적 거리 행렬 (N, N)"}, {"name": "alpha", "type": "float", "default": "0.5", "desc": "빈도 거리 가중치 (0=음악적만, 1=빈도만, 0.5=반반)"}], "return_type": "np.ndarray", "returns_desc": "", "recently_modified": false}, {"name": "compute_multi_hybrid_distance", "qual": "compute_multi_hybrid_distance", "class": "", "lineno": 361, "end_lineno": 415, "doc_short": "빈도 거리 + 여러 음악적 거리를 가중 혼합합니다.", "description": "빈도 거리 + 여러 음악적 거리를 가중 혼합합니다.\n예: metric_names=['tonnetz', 'dft'], weights=[0.4, 0.3, 0.3]\n→ 40% 빈도 + 30% Tonnetz + 30% DFT\nweights의 첫 번째 값이 빈도 거리 비중,\n나머지가 metric_names 순서대로의 비중.\nweights가 None이면 모든 metric에 균등 배분.", "params": [{"name": "freq_distance", "type": "np.ndarray", "default": "", "desc": "(N, N) 빈도 기반 거리"}, {"name": "notes_label", "type": "dict", "default": "", "desc": "note label dict"}, {"name": "metric_names", "type": "list", "default": "", "desc": "['tonnetz'], ['tonnetz', 'dft'], ['tonnetz', 'voice_leading', 'dft'] 등"}, {"name": "weights", "type": "Optional[list]", "default": "None", "desc": "[freq_w, metric1_w, metric2_w, ...] 합 = 1.0"}], "return_type": "np.ndarray", "returns_desc": "(N, N) 혼합 거리 행렬", "recently_modified": false}]}, "overlap": {"name": "overlap", "filename": "overlap.py", "exists": true, "source": "\"\"\"\nTDA Music Pipeline - Overlap Matrix (최적화)\n=============================================\n사이클 레이블링, 스케일 조정, 중첩행렬 구축을 담당합니다.\n\n주요 최적화:\n1. get_scattered_cycles_df: numpy boolean 연산으로 DataFrame 순회 제거\n2. filter_consecutive_indices: numpy diff 기반 O(N) 처리\n3. construct_overlap_df: numpy 배열 직접 조작 (DataFrame 루프 제거)\n\"\"\"\n\nimport numpy as np\nimport pandas as pd\nfrom collections import Counter\nfrom typing import Dict, List, Tuple, Optional, Set, Union\nimport re\n\n\n# ─── 사이클 레이블링 ───────────────────────────────────────────────────────\n\ndef label_cycles_from_persistence(cycle_persistence: dict) -> dict:\n    \"\"\"\n    persistence 데이터에서 사이클을 정렬하여 레이블링합니다.\n    기존 get_cycle_labeled_asc + label_cycle의 통합 버전.\n    dim=1(tuple)과 dim=2(frozenset) 키가 혼재할 수 있으므로\n    문자열 변환 후 정렬합니다.\n    \"\"\"\n    sorted_keys = sorted(cycle_persistence.keys(), key=lambda c: str(c))\n    return {i: cycle for i, cycle in enumerate(sorted_keys)}\n\n\ndef get_cycle_stats(cycle_labeled: dict, notes_dict: dict) -> Tuple[list, list, set]:\n    \"\"\"사이클 통계를 한 번의 순회로 계산합니다.\"\"\"\n    length_counter = Counter()\n    vertex_counter = Counter()\n    \n    for cycle in cycle_labeled.values():\n        length_counter[len(cycle)] += 1\n        vertex_counter.update(cycle)\n    \n    # 어떤 사이클에도 포함되지 않은 note 찾기\n    all_notes = set()\n    for k, v in notes_dict.items():\n        if isinstance(k, int):\n            all_notes |= v\n    \n    in_cycle = {v + 1 for v in vertex_counter.keys()}  # 0-indexed → 1-indexed\n    not_in_cycle = all_notes - in_cycle\n    \n    return (length_counter.most_common(), \n            [(k + 1, c) for k, c in vertex_counter.most_common()],\n            not_in_cycle)\n\n\n# ─── 중첩행렬 구축 (핵심 최적화) ──────────────────────────────────────────\n\ndef build_activation_matrix(df: pd.DataFrame,\n                            cycle_labeled: Union[dict, list],\n                            continuous: bool = False) -> pd.DataFrame:\n    \"\"\"\n    원곡의 note-time 행렬에서 각 사이클의 시점별 활성화를 계산합니다.\n\n    continuous=False (기존): 이진 0/1. 하나라도 활성화되면 1.\n    continuous=True (신규): 연속값 0~1.\n      활성 note 비율에 희귀도 가중치를 적용:\n      - 많은 cycle에 등장하는 흔한 note → 낮은 가중치\n      - 적은 cycle에만 등장하는 희귀 note → 높은 가중치\n      효과: 색채음 같은 희귀 note가 활성화되면 overlap 값이 더 높아짐\n    \"\"\"\n    df_values = df.values  # (T, N_notes) numpy array\n    columns = list(df.columns)\n\n    if isinstance(cycle_labeled, dict):\n        items = list(cycle_labeled.items())\n    else:\n        items = list(enumerate(cycle_labeled))\n\n    n_cycles = len(items)\n    n_times = df_values.shape[0]\n    dtype = float if continuous else int\n    activation = np.zeros((n_times, n_cycles), dtype=dtype)\n\n    col_to_idx = {col: i for i, col in enumerate(columns)}\n\n    # 희귀도 계산: note_rarity[col_idx] = 1 / (해당 note가 등장하는 cycle 수)\n    note_rarity = {}\n    if continuous:\n        from collections import Counter\n        note_cycle_count = Counter()\n        for _, (label, cycle) in enumerate(items):\n            verts = set()\n            if isinstance(cycle, frozenset):\n                for s in cycle:\n                    verts.update(s) if isinstance(s, tuple) else verts.add(s)\n            else:\n                verts = set(cycle)\n            for v in verts:\n                if (v + 1) in col_to_idx:\n                    note_cycle_count[col_to_idx[v + 1]] += 1\n        # rarity = 1/count (등장 cycle이 적을수록 높은 가중치)\n        for col_idx, count in note_cycle_count.items():\n            note_rarity[col_idx] = 1.0 / count\n    \n    for c_idx, (label, cycle) in enumerate(items):\n        # cycle의 vertex 추출 (dim=1: tuple of ints, dim=2: frozenset of tuples)\n        if isinstance(cycle, frozenset):\n            # dim=2: frozenset of (v1, v2, v3) → 모든 vertex 합집합\n            vertices = set()\n            for simplex in cycle:\n                if isinstance(simplex, tuple):\n                    vertices.update(simplex)\n                else:\n                    vertices.add(simplex)\n        else:\n            vertices = cycle\n        note_indices = [col_to_idx[v + 1] for v in vertices if (v + 1) in col_to_idx]\n        \n        if note_indices:\n            sub = df_values[:, note_indices]\n            if continuous:\n                # 연속값 모드: 활성 note 비율 + 희귀 note 가중치\n                # note_rarity[n] = 1 / (해당 note가 등장하는 cycle 수)\n                # 희귀 note가 활성화되면 기여도가 높음\n                weights = np.array([note_rarity.get(ni, 1.0)\n                                    for ni in note_indices])\n                weighted_active = (sub > 0).astype(float) * weights[np.newaxis, :]\n                activation[:, c_idx] = weighted_active.sum(axis=1) / weights.sum()\n            else:\n                # 이진 모드 (기존): 하나라도 활성화되면 1\n                activation[:, c_idx] = np.any(sub > 0, axis=1).astype(int)\n\n    result = pd.DataFrame(activation, columns=[item[0] for item in items])\n    return result\n\n\n# ─── 스케일 조정 (최적화) ──────────────────────────────────────────────────\n\ndef find_consecutive_runs(binary_series: np.ndarray, \n                          min_length: int) -> List[List[int]]:\n    \"\"\"\n    이진 배열에서 min_length 이상 연속된 1의 구간을 찾습니다.\n    \n    최적화: numpy diff 기반 O(N) 처리\n    - 기존: 인덱스를 하나씩 비교하며 순회\n    - 개선: diff로 연속 구간의 시작/끝을 한 번에 찾음\n    \"\"\"\n    if binary_series.sum() == 0:\n        return []\n    \n    # 패딩 추가하여 경계 처리\n    padded = np.concatenate(([0], binary_series, [0]))\n    diff = np.diff(padded)\n    \n    starts = np.where(diff == 1)[0]   # 1이 시작되는 위치\n    ends = np.where(diff == -1)[0]    # 1이 끝나는 위치\n    \n    runs = []\n    for s, e in zip(starts, ends):\n        length = e - s\n        if length >= min_length:\n            runs.append(list(range(s, e)))\n    \n    return runs\n\n\ndef compute_scale_for_cycle(activation_col: np.ndarray,\n                            initial_scale: int,\n                            threshold: float,\n                            lower_bound: float) -> Tuple[List[list], int, float]:\n    \"\"\"\n    단일 사이클에 대해 최적 scale을 탐색합니다.\n    기존 get_cycle_scaled의 최적화 버전.\n    \"\"\"\n    total = len(activation_col)\n    # activation이 1인 인덱스만 추출\n    ones_idx = np.where(activation_col == 1)[0]\n    \n    if len(ones_idx) == 0:\n        return [], initial_scale, 0.0\n    \n    scale = initial_scale\n    \n    while True:\n        runs = find_consecutive_runs(activation_col, scale)\n        on_length = sum(len(r) for r in runs)\n        reduction = on_length / total\n        \n        if reduction <= lower_bound:\n            # scale을 하나 줄여서 재계산\n            scale = max(scale - 1, 1)\n            runs = find_consecutive_runs(activation_col, scale)\n            on_length = sum(len(r) for r in runs)\n            reduction = on_length / total\n            break\n        elif reduction <= threshold:\n            break\n        \n        scale += 1\n    \n    return runs, scale, reduction\n\n\ndef build_overlap_matrix(activation_df: pd.DataFrame,\n                         cycle_labeled: Union[dict, list],\n                         threshold: float,\n                         lower_bound: Optional[float] = None,\n                         total_length: int = 1088) -> pd.DataFrame:\n    \"\"\"\n    활성화 행렬에서 스케일 조정을 적용하여 중첩행렬을 구축합니다.\n    기존 evaluate_threshold + construct_overlap_df의 통합 최적화 버전.\n    \n    최적화: numpy 배열 직접 조작 (DataFrame 순회 제거)\n    \"\"\"\n    if lower_bound is None:\n        lower_bound = max(0.0, threshold - 0.1)\n    \n    if isinstance(cycle_labeled, dict):\n        items = list(cycle_labeled.items())\n    else:\n        items = list(enumerate(cycle_labeled))\n    \n    n_cycles = len(items)\n    overlap = np.zeros((total_length, n_cycles), dtype=int)\n    \n    for c_idx, (label, cycle) in enumerate(items):\n        col = activation_df[label].values\n        initial_scale = len(cycle)\n        \n        runs, _, _ = compute_scale_for_cycle(\n            col, initial_scale, threshold, lower_bound\n        )\n        \n        for run in runs:\n            indices = np.array(run)\n            indices = indices[indices < total_length]\n            overlap[indices, c_idx] = 1\n    \n    columns = [item[0] for item in items]\n    return pd.DataFrame(overlap, columns=columns)\n\n\ndef build_overlap_matrix_percycle(activation_df: pd.DataFrame,\n                                  cycle_labeled: Union[dict, list],\n                                  tau_list: list,\n                                  total_length: int = 1088) -> pd.DataFrame:\n    \"\"\"\n    Per-cycle 임계값 τ_c를 적용하여 중첩행렬을 구축합니다.\n    §7.7.1 실험 결과: 단일 τ=0.35 대비 +48.6% JS 개선 (N=5, K=42).\n\n    각 cycle c에 고유한 임계값 tau_list[c]를 적용:\n      overlap[t, c] = 1  if  activation[t, c] >= tau_list[c]\n                    = 0  otherwise\n\n    Args:\n        activation_df: build_activation_matrix(continuous=True)의 출력. (T, K) DataFrame.\n        cycle_labeled: cycle 레이블 딕셔너리 또는 리스트.\n        tau_list: 길이 K의 리스트. 각 cycle에 대응하는 임계값 (0~1).\n                  None이면 τ_c = 0.35 (기본값)로 일괄 적용.\n        total_length: 시간축 길이.\n\n    Returns:\n        (total_length, K) 이진 overlap DataFrame.\n    \"\"\"\n    if isinstance(cycle_labeled, dict):\n        items = list(cycle_labeled.items())\n    else:\n        items = list(enumerate(cycle_labeled))\n\n    n_cycles = len(items)\n    if tau_list is None:\n        tau_list = [0.35] * n_cycles\n    assert len(tau_list) == n_cycles, \\\n        f\"tau_list 길이({len(tau_list)})가 cycle 수({n_cycles})와 불일치\"\n\n    act = activation_df.values  # (T, K) — continuous activation\n    overlap = np.zeros((total_length, n_cycles), dtype=int)\n\n    for c_idx, tau in enumerate(tau_list):\n        col = act[:min(total_length, len(act)), c_idx]\n        overlap[:len(col), c_idx] = (col >= tau).astype(int)\n\n    columns = [item[0] for item in items]\n    return pd.DataFrame(overlap, columns=columns)\n\n\n# ─── rBD 그룹화 (최적화) ──────────────────────────────────────────────────\n\ndef group_rBD_by_homology(homology_profile: list, dim: int = 1) -> dict:\n    \"\"\"\n    호몰로지 프로필을 사이클/void별로 그룹화합니다.\n    기존 get_rBD_groupedBy_homol의 정리 버전.\n    \"\"\"\n    persistence = {}\n    \n    for rate_data in homology_profile:\n        rate = rate_data[0]\n        cycles_list = rate_data[1]\n        \n        for cycle_info in cycles_list:\n            birth = cycle_info[1][0]\n            death = cycle_info[1][1]\n            \n            if len(cycle_info) < 3:\n                continue\n            edges_str = cycle_info[2].strip()\n            \n            # 부호 정규화\n            if not re.match(r'^[+-]', edges_str):\n                edges_str = '+ ' + edges_str\n            \n            if dim == 1:\n                key = _parse_cycle_1d(edges_str)\n            elif dim == 2:\n                key = _parse_cycle_2d(edges_str)\n            else:\n                continue\n            \n            if key is not None:\n                persistence.setdefault(key, []).append((rate, birth, death))\n    \n    return persistence\n\n\ndef _parse_cycle_1d(edges_str: str) -> Optional[tuple]:\n    \"\"\"1차 호몰로지 (cycle) 파싱.\n\n    numpy 버전: \" - (5, 19) + (9, 18) + ...\" (부호 + edge)\n    ripser 버전: \"(5, 9) + (5, 16) + ...\" (부호 없을 수 있음, 중복 가능)\n    둘 다 처리합니다.\n    \"\"\"\n    edges = re.findall(r'([+-])?\\s*\\(\\s*(\\d+)\\s*,\\s*(\\d+)\\)', edges_str)\n    if not edges:\n        return None\n\n    edge_list = []\n    for sign, v1, v2 in edges:\n        a, b = int(v1), int(v2)\n        if sign == '-':\n            edge_list.append((b, a))\n        else:\n            edge_list.append((a, b))\n\n    # 중복 edge 제거 (ripser BFS에서 발생 가능)\n    seen = set()\n    unique_edges = []\n    for e in edge_list:\n        normalized = (min(e), max(e))\n        if normalized not in seen:\n            seen.add(normalized)\n            unique_edges.append(e)\n    edge_list = unique_edges\n\n    if not edge_list:\n        return None\n\n    # edge가 1개뿐이면 cycle이 아님 → vertex set으로 fallback\n    if len(edge_list) == 1:\n        return tuple(sorted(set(edge_list[0])))\n\n    # 연결 순서대로 vertex 나열\n    cycle_repr = []\n    start_tuple = min(edge_list)\n    cycle_repr.append(start_tuple[0])\n    cycle_repr.append(start_tuple[1])\n    remaining = [e for e in edge_list if e != start_tuple]\n\n    while remaining:\n        last = cycle_repr[-1]\n        found = False\n        for e in remaining:\n            # 양방향 연결 허용 (ripser BFS는 방향이 다를 수 있음)\n            if e[0] == last and e[1] not in cycle_repr:\n                cycle_repr.append(e[1])\n                remaining.remove(e)\n                found = True\n                break\n            elif e[1] == last and e[0] not in cycle_repr:\n                cycle_repr.append(e[0])\n                remaining.remove(e)\n                found = True\n                break\n        if not found:\n            # 연결이 안 되면 vertex set으로 fallback\n            all_verts = set()\n            for e in edge_list:\n                all_verts.update(e)\n            return tuple(sorted(all_verts))\n\n    if cycle_repr and cycle_repr[0] == cycle_repr[-1]:\n        cycle_repr.pop()\n\n    return tuple(cycle_repr)\n\n\ndef _parse_cycle_2d(edges_str: str) -> Optional[frozenset]:\n    \"\"\"2차 호몰로지 (void) 파싱\"\"\"\n    edges = re.findall(r'([+-])\\s*\\(\\s*(\\d+)\\s*,\\s*(\\d+)\\s*,\\s*(\\d+)\\)', edges_str)\n    if not edges:\n        return None\n    \n    simplices = set()\n    for sign, v1, v2, v3 in edges:\n        v1, v2, v3 = int(v1), int(v2), int(v3)\n        if sign == '+':\n            simplices.add((v1, v2, v3))\n        else:\n            simplices.add((v3, v2, v1))\n    \n    return frozenset(simplices)\n\n\n# ─── 교집합 분석 ───────────────────────────────────────────────────────────\n\ndef find_common_across_lags(persistence_by_lag: Dict[int, dict], dim: int = 1):\n    \"\"\"\n    lag 1~4에서 공통으로 발견되는 호몰로지를 찾습니다.\n    기존 catch_intersection의 간결화 버전.\n    \"\"\"\n    sets = {lag: set(p.keys()) for lag, p in persistence_by_lag.items()}\n    lags = sorted(sets.keys())\n    \n    # 모든 lag의 교집합\n    common = sets[lags[0]]\n    for lag in lags[1:]:\n        common &= sets[lag]\n    \n    # 모든 lag의 합집합\n    union = set()\n    for s in sets.values():\n        union |= s\n    \n    return {\n        'common': common,\n        'union': union,\n        'per_lag': sets,\n        'counts': {lag: len(s) for lag, s in sets.items()}\n    }\n", "line_count": 437, "functions": [{"name": "label_cycles_from_persistence", "qual": "label_cycles_from_persistence", "class": "", "lineno": 21, "end_lineno": 29, "doc_short": "persistence 데이터에서 사이클을 정렬하여 레이블링합니다.", "description": "persistence 데이터에서 사이클을 정렬하여 레이블링합니다.\n기존 get_cycle_labeled_asc + label_cycle의 통합 버전.\ndim=1(tuple)과 dim=2(frozenset) 키가 혼재할 수 있으므로\n문자열 변환 후 정렬합니다.", "params": [{"name": "cycle_persistence", "type": "dict", "default": "", "desc": ""}], "return_type": "dict", "returns_desc": "", "recently_modified": true}, {"name": "get_cycle_stats", "qual": "get_cycle_stats", "class": "", "lineno": 32, "end_lineno": 52, "doc_short": "사이클 통계를 한 번의 순회로 계산합니다.", "description": "사이클 통계를 한 번의 순회로 계산합니다.", "params": [{"name": "cycle_labeled", "type": "dict", "default": "", "desc": ""}, {"name": "notes_dict", "type": "dict", "default": "", "desc": ""}], "return_type": "Tuple[list, list, set]", "returns_desc": "", "recently_modified": true}, {"name": "build_activation_matrix", "qual": "build_activation_matrix", "class": "", "lineno": 57, "end_lineno": 133, "doc_short": "원곡의 note-time 행렬에서 각 사이클의 시점별 활성화를 계산합니다.", "description": "원곡의 note-time 행렬에서 각 사이클의 시점별 활성화를 계산합니다.\ncontinuous=False (기존): 이진 0/1. 하나라도 활성화되면 1.\ncontinuous=True (신규): 연속값 0~1.\n활성 note 비율에 희귀도 가중치를 적용:\n- 많은 cycle에 등장하는 흔한 note → 낮은 가중치\n- 적은 cycle에만 등장하는 희귀 note → 높은 가중치\n효과: 색채음 같은 희귀 note가 활성화되면 overlap 값이 더 높아짐", "params": [{"name": "df", "type": "pd.DataFrame", "default": "", "desc": ""}, {"name": "cycle_labeled", "type": "Union[dict, list]", "default": "", "desc": ""}, {"name": "continuous", "type": "bool", "default": "False", "desc": ""}], "return_type": "pd.DataFrame", "returns_desc": "", "recently_modified": true}, {"name": "find_consecutive_runs", "qual": "find_consecutive_runs", "class": "", "lineno": 138, "end_lineno": 163, "doc_short": "이진 배열에서 min_length 이상 연속된 1의 구간을 찾습니다.", "description": "이진 배열에서 min_length 이상 연속된 1의 구간을 찾습니다.\n최적화:
