<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>TDA PIPELINE SYSTEM</title>
<link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
<style>
:root{
  --bg:#06090f;--bg2:#0a1020;--bg3:#0e1828;
  --acc:#00c8ff;--acc2:#00ff9f;--warn:#e63946;
  --txt:#9ab8cc;--txtb:#cce0f0;
  --bdr:rgba(0,200,255,.18);--glow:0 0 8px rgba(0,200,255,.25);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);color:var(--txt);
  font-family:'Courier New',monospace;font-size:13px;
  display:flex;flex-direction:column;
  background-image:
    linear-gradient(rgba(0,200,255,.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,200,255,.018) 1px,transparent 1px);
  background-size:44px 44px;
}

/* ── HEADER ───────────────────────────────── */
#hdr{
  height:46px;flex-shrink:0;z-index:100;
  background:linear-gradient(135deg,#070d1c,#0c1830);
  border-bottom:1px solid var(--bdr);
  box-shadow:0 2px 14px rgba(0,0,0,.7);
  display:flex;align-items:center;padding:0 20px;gap:18px;
}
.sys-title{color:var(--acc);font-size:14px;font-weight:bold;
  letter-spacing:4px;text-shadow:0 0 10px var(--acc);}
.sys-sub{color:rgba(0,200,255,.4);font-size:9px;letter-spacing:2px;margin-top:2px;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px;
  font-size:10px;color:var(--acc2);letter-spacing:1px;}
.blink{width:7px;height:7px;border-radius:50%;background:var(--acc2);
  box-shadow:0 0 6px var(--acc2);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.35;}}

/* ── LAYOUT ───────────────────────────────── */
#main{display:flex;flex:1;overflow:hidden;min-height:0;}

/* ── SIDEBAR ──────────────────────────────── */
#sb{
  width:21%;min-width:190px;max-width:290px;flex-shrink:0;
  background:var(--bg2);border-right:1px solid var(--bdr);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-hdr{
  padding:9px 14px 7px;font-size:9px;letter-spacing:2px;
  color:var(--acc);text-transform:uppercase;
  border-bottom:1px solid var(--bdr);
  background:linear-gradient(135deg,#080f1e,#0a1525);flex-shrink:0;
}
#srch{padding:7px 10px;border-bottom:1px solid rgba(0,200,255,.08);flex-shrink:0;}
#srch input{
  width:100%;background:rgba(0,200,255,.05);
  border:1px solid rgba(0,200,255,.2);color:var(--txtb);
  padding:5px 8px;font-family:monospace;font-size:11px;
  outline:none;border-radius:2px;
}
#srch input:focus{border-color:var(--acc);box-shadow:0 0 4px rgba(0,200,255,.3);}
#tree{overflow-y:auto;flex:1;padding:4px 0;}

.stage-grp{}
.stage-hdr{
  padding:7px 12px;font-size:9px;letter-spacing:1.5px;
  color:rgba(154,184,204,.45);text-transform:uppercase;
  cursor:pointer;display:flex;align-items:center;gap:6px;
  border-left:2px solid transparent;transition:all .12s;
  position:sticky;top:0;background:var(--bg2);z-index:1;user-select:none;
}
.stage-hdr:hover{color:var(--txt);background:var(--bg3);}
.stage-hdr.open{color:var(--acc);border-left-color:var(--acc);}
.arr{margin-left:auto;font-size:8px;transition:transform .2s;}
.closed .arr{transform:rotate(-90deg);}
.closed .sc{display:none;}

.mod-item{
  padding:6px 12px 6px 22px;cursor:pointer;font-size:11px;
  border-left:2px solid transparent;transition:all .1s;
  display:flex;align-items:center;justify-content:space-between;gap:6px;
}
.mod-item:hover{background:rgba(0,200,255,.06);border-left-color:rgba(0,200,255,.3);}
.mod-item.sel{background:rgba(0,200,255,.12);border-left-color:var(--acc);color:var(--acc);}
.mod-item.dead{opacity:.35;cursor:not-allowed;}
.fc{font-size:9px;background:rgba(0,200,255,.12);color:rgba(0,200,255,.65);
  padding:1px 5px;border-radius:8px;flex-shrink:0;}

.fn-list{display:none;background:rgba(0,0,0,.18);
  border-left:1px solid rgba(0,200,255,.08);margin-left:22px;}
.fn-list.vis{display:block;}
.fn-item{
  padding:4px 10px;font-size:10px;color:rgba(154,184,204,.55);
  cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  border-left:2px solid transparent;transition:all .1s;
  display:flex;align-items:center;gap:5px;
}
.fn-item:hover{color:var(--txtb);border-left-color:rgba(0,200,255,.4);background:rgba(0,200,255,.04);}
.fn-item.sel{color:var(--acc);border-left-color:var(--acc);background:rgba(0,200,255,.08);}
.rdot{width:5px;height:5px;border-radius:50%;background:var(--warn);flex-shrink:0;}
.gdot{width:5px;height:5px;flex-shrink:0;}

/* ── CODE PANEL ───────────────────────────── */
#cp{
  flex:1;background:#0c1a28;
  display:flex;flex-direction:column;overflow:hidden;min-width:0;
}
.ph{
  padding:8px 16px;flex-shrink:0;
  background:linear-gradient(135deg,#08101e,#0c1b30);
  border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;gap:12px;font-size:10px;
}
.plbl{color:var(--acc);font-size:9px;letter-spacing:2px;text-transform:uppercase;}
#fn-lbl{color:var(--txtb);font-size:13px;}
.li{color:rgba(154,184,204,.35);font-size:10px;}
.rbdg{background:var(--warn);color:#fff;font-size:9px;
  padding:1px 6px;border-radius:2px;letter-spacing:.5px;}
#cw{flex:1;overflow:auto;position:relative;}
#cw pre{margin:0!important;padding:16px!important;
  background:transparent!important;min-height:100%;
  font-size:12.5px!important;line-height:1.68!important;tab-size:4;}
#cw code{font-family:'Courier New',monospace!important;white-space:pre!important;}
.hi-line{
  position:absolute;left:0;right:0;
  background:rgba(0,200,255,.07);border-left:3px solid var(--acc);
  pointer-events:none;
}

/* ── DOC PANEL ────────────────────────────── */
#dp{
  width:27%;min-width:250px;max-width:400px;flex-shrink:0;
  background:var(--bg2);border-left:1px solid var(--bdr);
  display:flex;flex-direction:column;overflow:hidden;
}
#dc{flex:1;overflow-y:auto;padding:16px;}
.empty{padding:40px 16px;text-align:center;
  color:rgba(154,184,204,.3);font-size:11px;line-height:2.2;}

.fn-name{color:var(--acc);font-size:17px;font-weight:bold;
  text-shadow:0 0 8px rgba(0,200,255,.35);word-break:break-all;}
.fn-meta{font-size:10px;color:rgba(154,184,204,.4);
  margin:4px 0 12px;letter-spacing:.4px;}
.fn-sig{
  background:rgba(0,200,255,.05);border:1px solid rgba(0,200,255,.15);
  border-radius:4px;padding:8px 10px;font-size:11px;
  color:#9ad4b4;margin-bottom:14px;line-height:1.65;word-break:break-all;
}
.ret-t{color:#ffd166;}

.sec{font-size:9px;letter-spacing:2px;color:var(--acc);
  text-transform:uppercase;border-bottom:1px solid rgba(0,200,255,.12);
  padding-bottom:4px;margin:14px 0 8px;}
.desc{font-size:12px;color:var(--txt);line-height:1.75;white-space:pre-wrap;}

.pt{width:100%;border-collapse:collapse;font-size:11px;}
.pt th{text-align:left;padding:3px 6px;color:rgba(0,200,255,.6);
  font-size:9px;letter-spacing:1px;border-bottom:1px solid rgba(0,200,255,.12);}
.pt td{padding:5px 6px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top;}
.pn{color:#9ad4b4;}.pt_t{color:#ffd166;font-size:10px;}
.pd{color:rgba(154,184,204,.45);font-size:10px;}.pdc{color:var(--txt);line-height:1.4;}

.ret-box{
  background:rgba(0,255,159,.04);border:1px solid rgba(0,255,159,.15);
  border-radius:4px;padding:8px 10px;font-size:11px;margin-top:4px;
}
.ret-tl{color:var(--acc2);font-size:10px;margin-bottom:4px;}
.ret-d{color:var(--txt);line-height:1.5;}

.chip-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.chip{
  background:rgba(0,200,255,.08);border:1px solid rgba(0,200,255,.2);
  color:var(--acc);font-size:10px;padding:2px 8px;border-radius:2px;
  cursor:pointer;transition:all .1s;
}
.chip:hover{background:rgba(0,200,255,.18);}

/* ── STATUSBAR ────────────────────────────── */
#stb{
  flex-shrink:0;background:#040710;
  border-top:1px solid var(--bdr);padding:4px 16px;
  font-size:10px;color:rgba(154,184,204,.35);
  display:flex;gap:20px;letter-spacing:.4px;
}
#stb span:last-child{margin-left:auto;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(0,200,255,.18);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:rgba(0,200,255,.35);}
</style>
</head>
<body>

<div id="hdr">
  <div>
    <div class="sys-title">TDA PIPELINE SYSTEM</div>
    <div class="sys-sub">TOPOLOGICAL DATA ANALYSIS · MUSIC GENERATION · SAKAMOTO RYUICHI</div>
  </div>
  <div class="hdr-right">
    <div class="blink"></div>
    <span>ONLINE</span>

</div>

<div id="main">

  <!-- LEFT -->
  <div id="sb">
    <div class="sb-hdr">▶ MODULE HIERARCHY</div>

      <span class="plbl">SOURCE</span>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script>
const MODULES = {"pipeline": {"name": "pipeline", "filename": "pipeline.py", "exists": true, "source": "\"\"\"\nTDA Music Pipeline - Main Orchestrator\n========================================\n전체 파이프라인을 하나의 흐름으로 실행합니다.\n\n핵심 설계 원칙:\n1. 중간 결과를 캐싱하여 반복 실행 시 재계산 방지\n2. 각 단계를 독립적으로 실행 가능 (모듈러 설계)\n3. 설정 변경이 영향을 미치는 하류 단계만 재실행\n\"\"\"\n\nimport os\nimport pickle\nimport time\nimport numpy as np\nimport pandas as pd\nfrom typing import Dict, List, Tuple, Optional\nfrom collections import Counter\n\nfrom config import PipelineConfig\nfrom preprocessing import (\n    load_and_quantize, split_instruments,\n    group_notes_with_duration, build_chord_labels, build_note_labels,\n    chord_to_note_labels, prepare_lag_sequences,\n    find_flexible_pitches, simul_chord_lists, simul_union_by_dict\n)\nfrom weights import (\n    compute_intra_weights, compute_inter_weights,\n    compute_distance_matrix, compute_out_of_reach,\n    compute_simul_weights\n)\nfrom overlap import (\n    label_cycles_from_persistence, get_cycle_stats,\n    build_activation_matrix, build_overlap_matrix,\n    group_rBD_by_homology, find_common_across_lags\n)\nfrom generation import (\n    NodePool, CycleSetManager,\n    algorithm1_optimized, notes_to_xml\n)\n\n\nclass TDAMusicPipeline:\n    \"\"\"\n    TDA 기반 음악 생성 파이프라인.\n    \n    Usage:\n        config = PipelineConfig()\n        pipeline = TDAMusicPipeline(config)\n        pipeline.run_preprocessing()\n        pipeline.run_homology_search()\n        pipeline.run_overlap_construction()\n        generated = pipeline.run_generation()\n    \"\"\"\n    \n    def __init__(self, config: PipelineConfig):\n        self.config = config\n        self._cache = {}  # 중간 결과 캐시\n        \n        # 디렉토리 생성\n        os.makedirs(config.output_dir, exist_ok=True)\n        os.makedirs(config.pickle_dir, exist_ok=True)\n    \n    # ═══════════════════════════════════════════════════════════════════════\n    # Stage 1: 전처리\n    # ═══════════════════════════════════════════════════════════════════════\n    \n    def run_preprocessing(self, midi_file: Optional[str] = None):\n        \"\"\"MIDI → 화음 시퀀스 → note 레이블링\"\"\"\n        t0 = time.time()\n        \n        fpath = midi_file or self.config.midi.file_name\n        print(f\"[Stage 1] 전처리 시작: {fpath}\")\n        \n        # MIDI 로드 및 양자화\n        adjusted_notes, tempo, boundaries = load_and_quantize(\n            fpath, quantize_unit=self.config.midi.quantize_unit\n        )\n        self._cache['tempo'] = tempo\n\n        # 자동 감지 모드: MIDI에서 파라미터 추출\n        if self.config.midi.auto_detect:\n            from preprocessing import analyze_midi\n            detected = analyze_midi(fpath, self.config.midi.quantize_unit)\n            # 자동 감지 가능한 값 업데이트\n            self.config.midi.inst1_end_idx = detected['inst1_end_idx']\n            self.config.midi.num_notes = detected['num_notes']\n            self.config.midi.num_chords = detected['num_chords']\n            self.config.overlap.total_length = detected['total_timepoints']\n            # solo는 자동 감지가 어려우므로 감지값이 0이면 config fallback 유지\n            if detected['solo_notes'] > 0:\n                self.config.midi.solo_notes = detected['solo_notes']\n                self.config.midi.solo_timepoints = detected['solo_timepoints']\n\n        # 두 악기 분리\n        inst1_notes, inst2_notes = split_instruments(\n            adjusted_notes, boundaries[0]\n        )\n\n        # 솔로 구간 제거\n        solo = self.config.midi.solo_notes\n        inst1_real = inst1_notes[:-solo] if solo > 0 else inst1_notes\n        inst2_real = inst2_notes[solo:] if solo > 0 else inst2_notes\n        self._cache['inst1_real'] = inst1_real\n        self._cache['inst2_real'] = inst2_real\n        \n        # 화음 레이블링\n        active1 = group_notes_with_duration(inst1_real)\n        active2 = group_notes_with_duration(inst2_real)\n        \n        chord_map1, chord_seq1 = build_chord_labels(active1)\n        chord_map2, chord_seq2 = build_chord_labels(active2)\n        self._cache['chord_seq1'] = chord_seq1\n        self._cache['chord_seq2'] = chord_seq2\n        \n        # Note 레이블링 (모듈 단위)\n        module_notes = inst1_real[:solo]\n        notes_label, notes_counts = build_note_labels(module_notes)\n        self._cache['notes_label'] = notes_label\n        self._cache['notes_counts'] = notes_counts\n        \n        # 화음 → note 매핑 (notes_dict)\n        module_active = group_notes_with_duration(module_notes)\n        chord_map_module, _ = build_chord_labels(module_active)\n        notes_dict = chord_to_note_labels(chord_map_module, notes_label)\n        notes_dict['name'] = 'notes'\n        self._cache['notes_dict'] = notes_dict\n        \n        # lag별 시퀀스 준비\n        # solo_timepoints는 solo_notes와 다름 (시간 길이 vs note 수)\n        solo_tp = self.config.midi.solo_timepoints\n        adn_i = prepare_lag_sequences(\n            chord_seq1, chord_seq2,\n            solo_timepoints=solo_tp,\n            max_lag=self.config.homology.max_lag\n        )\n        self._cache['adn_i'] = adn_i\n        \n        # Flexible pitches\n        flex_pitches = find_flexible_pitches(notes_counts, notes_label)\n        self._cache['flexible_pitches'] = flex_pitches\n        \n        dt = time.time() - t0\n        print(f\"[Stage 1] 전처리 완료 ({dt:.2f}s)\")\n        print(f\"  - Notes: {len(notes_label)}종, Chords: {len(chord_map_module)}종\")\n        \n        return self\n    \n    # ═══════════════════════════════════════════════════════════════════════\n    # Stage 2: Persistent Homology 탐색\n    # ═══════════════════════════════════════════════════════════════════════\n    \n    def run_homology_search(self, \n                            search_type: str = 'timeflow',\n                            lag: int = 1,\n                            dimension: int = 1,\n                            rate_t: float = 0.3,\n                            rate_s: float = 0.6):\n        \"\"\"\n        Persistent homology를 탐색합니다.\n        \n        Args:\n            search_type: 'timeflow' | 'simul' | 'complex'\n            lag: inter-weight lag (timeflow/complex 전용)\n            dimension: 호몰로지 차원 (1=cycle, 2=void)\n            rate_t, rate_s: complex 모드에서의 비율\n        \"\"\"\n        t0 = time.time()\n        cfg = self.config.homology\n        \n        mcfg = self.config.metric\n        metric_label = mcfg.metric if mcfg.metric != 'hybrid' else f\"hybrid({'+'.join(mcfg.hybrid_metrics)})\"\n        print(f\"[Stage 2] Homology 탐색: type={search_type}, dim={dimension},\"\n              f\" lag={lag}, metric={metric_label}\")\n\n        adn_i = self._cache['adn_i']\n        notes_dict = self._cache['notes_dict']\n        notes_label = self._cache['notes_label']\n\n        # Barcode 생성 함수 선택: ripser(45x) > numpy(2.5x)\n        from topology import _check_ripser\n        if _check_ripser():\n            from topology import generate_barcode_ripser as generateBarcode\n        else:\n            from topology import generate_barcode_numpy as generateBarcode\n\n        # Musical metric 사전 계산 (frequency가 아닌 경우)\n        musical_dist = None\n        if mcfg.metric != 'frequency':\n            from musical_metrics import (compute_note_distance_matrix,\n                                          compute_multi_hybrid_distance)\n            if mcfg.metric == 'hybrid':\n                # 다중 혼합: 빈도 + 여러 metric\n                # musical_dist는 rate loop 안에서 빈도 거리와 합성\n                musical_dist = 'hybrid'  # 마커 — loop 안에서 처리\n            else:\n                # 단일 metric (tonnetz / voice_leading / dft)\n                kwargs = {}\n                if mcfg.metric in ('tonnetz', 'dft'):\n                    kwargs['octave_weight'] = mcfg.octave_weight\n                    kwargs['duration_weight'] = mcfg.duration_weight\n                elif mcfg.metric == 'voice_leading':\n                    kwargs['duration_weight'] = mcfg.duration_weight\n                musical_dist = compute_note_distance_matrix(\n                    notes_label, metric=mcfg.metric, **kwargs\n                )\n\n        # _apply_metric을 search 함수에 전달\n        if search_type == 'timeflow':\n            profile, oor = self._search_timeflow(\n                adn_i, notes_dict, lag, dimension, cfg, generateBarcode,\n                musical_dist=musical_dist\n            )\n        elif search_type == 'simul':\n            profile, oor = self._search_simul(\n                adn_i, notes_dict, dimension, cfg, generateBarcode,\n                musical_dist=musical_dist\n            )\n        elif search_type == 'complex':\n            profile, oor = self._search_complex(\n                adn_i, notes_dict, lag, dimension, rate_t, rate_s, cfg, generateBarcode,\n                musical_dist=musical_dist\n            )\n        else:\n            raise ValueError(f\"Unknown search_type: {search_type}\")\n        \n        # rBD 그룹화\n        persistence = group_rBD_by_homology(profile, dim=dimension)\n        \n        # 캐시 저장\n        key = f\"h{dimension}_{search_type}_lag{lag}\"\n        self._cache[key] = persistence\n        self._cache[f\"{key}_oor\"] = oor\n        \n        dt = time.time() - t0\n        print(f\"[Stage 2] 완료 ({dt:.2f}s) - {len(persistence)}개 호몰로지 발견\")\n        \n        return self\n    \n    def _apply_metric(self, freq_dist_values):\n        \"\"\"빈도 거리 행렬에 musical metric을 적용합니다.\"\"\"\n        mcfg = self.config.metric\n        if mcfg.metric == 'frequency':\n            return freq_dist_values\n\n        from musical_metrics import (compute_hybrid_distance,\n                                      compute_multi_hybrid_distance,\n                                      compute_note_distance_matrix)\n        notes_label = self._cache['notes_label']\n\n        if mcfg.metric == 'hybrid':\n            return compute_multi_hybrid_distance(\n                freq_dist_values, notes_label,\n                metric_names=mcfg.hybrid_metrics,\n                weights=mcfg.hybrid_weights\n            )\n        else:\n            kwargs = {}\n            if mcfg.metric in ('tonnetz', 'dft'):\n                kwargs['octave_weight'] = mcfg.octave_weight\n                kwargs['duration_weight'] = mcfg.duration_weight\n            elif mcfg.metric == 'voice_leading':\n                kwargs['duration_weight'] = mcfg.duration_weight\n            m_dist = compute_note_distance_matrix(notes_label, metric=mcfg.metric, **kwargs)\n            return compute_hybrid_distance(freq_dist_values, m_dist, alpha=mcfg.alpha)\n\n    def _search_timeflow(self, adn_i, notes_dict, lag, dim, cfg, generateBarcode,\n                         musical_dist=None):\n        \"\"\"Timeflow homology 탐색\"\"\"\n        from weights import compute_inter_weights_decayed\n\n        w1 = compute_intra_weights(adn_i[1][0])\n        w2 = compute_intra_weights(adn_i[2][0])\n        intra = w1 + w2\n\n        # lag 1~max_lag 감쇄 가중치 합산\n        max_lag = self.config.homology.max_lag\n        inter = compute_inter_weights_decayed(\n            adn_i, max_lag=max_lag,\n            num_chords=self.config.midi.num_chords\n        )\n        oor = compute_out_of_reach(inter, power=cfg.power)\n\n        step = 10 ** cfg.power\n        profile = []\n\n        for a in range(int(cfg.rate_start / step), int(cfg.rate_end / step)):\n            rate = round(a * step, -cfg.power)\n\n            timeflow_w = intra + rate * inter\n            dist = compute_distance_matrix(\n                timeflow_w, notes_dict, oor,\n                num_notes=self.config.midi.num_notes\n            )\n\n            # Musical metric 적용\n            final_dist = self._apply_metric(dist.values)\n\n            bd = generateBarcode(\n                mat=final_dist, listOfDimension=[dim],\n                exactStep=True, birthDeathSimplex=False, sortDimension=False\n            )\n            profile.append((rate, bd))\n\n        return profile, oor\n    \n    def _search_simul(self, adn_i, notes_dict, dim, cfg, generateBarcode,\n                      musical_dist=None):\n        \"\"\"Simul homology 탐색\"\"\"\n        simul_intra, simul_inter = compute_simul_weights(\n            adn_i[1][-1], adn_i[2][-1], notes_dict\n        )\n        \n        step = 10 ** cfg.power\n        temp = step * simul_inter\n        oor = 1 + 2 / temp.values[temp.values != 0].min()\n        \n        profile = []\n        for a in range(int(cfg.rate_start / step), int(cfg.rate_end / step)):\n            rate = round(a * step, 4)\n            \n            w = simul_intra + rate * simul_inter\n            dist = compute_distance_matrix(\n                w, notes_dict, oor, \n                num_notes=self.config.midi.num_notes,\n                refine=False\n            )\n            \n            final_dist = self._apply_metric(dist.values)\n\n            bd = generateBarcode(\n                mat=final_dist, listOfDimension=[dim],\n                exactStep=True, birthDeathSimplex=False, sortDimension=False\n            )\n            profile.append((rate, bd))\n\n        return profile, oor\n\n    def _search_complex(self, adn_i, notes_dict, lag, dim, rate_t, rate_s, cfg, generateBarcode,\n                         musical_dist=None):\n        \"\"\"Complex homology 탐색\"\"\"\n        from weights import compute_inter_weights_decayed\n        # Timeflow 부분\n        w1 = compute_intra_weights(adn_i[1][0])\n        w2 = compute_intra_weights(adn_i[2][0])\n        intra = w1 + w2\n        max_lag = self.config.homology.max_lag\n        inter = compute_inter_weights_decayed(\n            adn_i, max_lag=max_lag,\n            num_chords=self.config.midi.num_chords\n        )\n        \n        timeflow_w = intra + rate_t * inter\n        # Refine만 수행 (거리 변환은 complex에서)\n        from weights import to_upper_triangular, refine_connectedness_fast\n        from weights import symmetrize_upper_to_full\n        \n        tf_upper = to_upper_triangular(timeflow_w)\n        tf_refined = refine_connectedness_fast(\n            tf_upper, notes_dict, self.config.midi.num_notes\n        )\n        tf_full = symmetrize_upper_to_full(tf_refined)\n        \n        # Simul 부분\n        simul_intra, simul_inter = compute_simul_weights(\n            adn_i[1][-1], adn_i[2][-1], notes_dict\n        )\n        simul_w = simul_intra + rate_s * simul_inter\n        \n        oor = compute_out_of_reach(simul_w, power=cfg.power)\n        \n        step = 10 ** cfg.power\n        profile = []\n        \n        for a in range(int(cfg.rate_start / step), int(cfg.rate_end / step)):\n            rate = round(a * step, -cfg.power)\n            \n            complex_w = tf_full + rate * simul_w\n            from weights import weight_to_distance\n            dist = weight_to_distance(complex_w, oor)\n            dist = symmetrize_upper_to_full(dist)\n            \n            final_dist = self._apply_metric(dist.values)\n\n            bd = generateBarcode(\n                mat=final_dist, listOfDimension=[dim],\n                exactStep=True, birthDeathSimplex=False, sortDimension=False\n            )\n            profile.append((rate, bd))\n\n        return profile, oor\n\n    # ═══════════════════════════════════════════════════════════════════════\n    # Stage 3: 중첩행렬 구축\n    # ═══════════════════════════════════════════════════════════════════════\n    \n    def run_overlap_construction(self,\n                                 persistence_key: Optional[str] = None,\n                                 from_pickle: Optional[str] = None,\n                                 per_cycle_tau: Optional[List[float]] = None):\n        \"\"\"\n        사이클 persistence 데이터로부터 중첩행렬을 구축합니다.\n\n        Args:\n            persistence_key: 캐시 키 (예: 'h1_timeflow_lag1')\n            from_pickle: pickle 파일에서 로드할 경우 파일명\n            per_cycle_tau: 길이 K의 리스트. None이면 config.overlap.threshold 단일값 사용.\n                           §7.7.1 per-cycle τ 최적화 결과를 직접 주입할 때 사용.\n                           예: [0.1, 0.2, 0.5, ...] (K개 cycle 각각의 임계값)\n        \"\"\"\n        t0 = time.time()\n        cfg = self.config.overlap\n\n        print(f\"[Stage 3] 중첩행렬 구축 \"\n              f\"({'per-cycle τ' if per_cycle_tau else f'threshold={cfg.threshold}'})\")\n\n        # Persistence 데이터 로드\n        if from_pickle:\n            filepath = os.path.join(self.config.pickle_dir, from_pickle)\n            persistence = self._load_persistence_from_pickle(filepath)\n        elif persistence_key and persistence_key in self._cache:\n            persistence = self._cache[persistence_key]\n        else:\n            raise ValueError(\"persistence 데이터를 지정해주세요.\")\n\n        # 사이클 레이블링\n        cycle_labeled = label_cycles_from_persistence(persistence)\n        self._cache['cycle_labeled'] = cycle_labeled\n\n        # 통계\n        length_stats, vertex_stats, missing = get_cycle_stats(\n            cycle_labeled, self._cache['notes_dict']\n        )\n        print(f\"  - {len(cycle_labeled)}개 사이클\")\n        if missing:\n            print(f\"  - 사이클에 미포함 note: {missing}\")\n\n        # Note-time 행렬 구축\n        adn_i = self._cache['adn_i']\n        notes_dict = self._cache['notes_dict']\n\n        chord_pairs = simul_chord_lists(adn_i[1][-1], adn_i[2][-1])\n        note_sets = simul_union_by_dict(chord_pairs, notes_dict)\n\n        # DataFrame 구축\n        nodes_list = list(range(1, self.config.midi.num_notes + 1))\n        note_time_df = self._build_note_time_df(nodes_list, note_sets)\n        self._cache['note_time_df'] = note_time_df\n\n        if per_cycle_tau is not None:\n            # §7.7.1: per-cycle τ_c 적용 (continuous activation 필요)\n            from overlap import build_overlap_matrix_percycle\n            activation_cont = build_activation_matrix(\n                note_time_df, cycle_labeled, continuous=True\n            )\n            self._cache['activation_continuous'] = activation_cont\n            overlap = build_overlap_matrix_percycle(\n                activation_cont, cycle_labeled,\n                tau_list=per_cycle_tau,\n                total_length=cfg.total_length\n            )\n        else:\n            # 기존 방식: 단일 threshold\n            activation = build_activation_matrix(note_time_df, cycle_labeled)\n            overlap = build_overlap_matrix(\n                activation, cycle_labeled,\n                threshold=cfg.threshold,\n                lower_bound=cfg.lower_bound,\n                total_length=cfg.total_length\n            )\n\n        # continuous activation도 캐시 (Algo2 soft input용, §7.7.2)\n        if 'activation_continuous' not in self._cache:\n            activation_cont = build_activation_matrix(\n                note_time_df, cycle_labeled, continuous=True\n            )\n            self._cache['activation_continuous'] = activation_cont\n\n        self._cache['overlap_matrix'] = overlap\n\n        dt = time.time() - t0\n        on_ratio = overlap.values.sum() / overlap.size\n        print(f\"[Stage 3] 완료 ({dt:.2f}s) - ON ratio: {on_ratio:.4f}\")\n\n        return self\n    \n    def _build_note_time_df(self, nodes_list, note_sets):\n        \"\"\"note-time DataFrame 구축\"\"\"\n        data = []\n        for ns in note_sets:\n            row = [1 if col in ns else 0 for col in nodes_list]\n            data.append(row)\n        return pd.DataFrame(data, columns=nodes_list)\n    \n    def _load_persistence_from_pickle(self, filepath):\n        \"\"\"pickle에서 persistence 로드\"\"\"\n        df = pd.read_pickle(filepath)\n        result = {}\n        for _, row in df.iterrows():\n            key = row['cycle']\n            val = (row['rate'], row['birth'], row['death'])\n            result.setdefault(key, []).append(val)\n        return result\n    \n    # ═══════════════════════════════════════════════════════════════════════\n    # Stage 3.5: Cycle Subset 선택 (선택적)\n    # ═══════════════════════════════════════════════════════════════════════\n\n    def run_cycle_selection(self, k: Optional[int] = None,\n                            target: Optional[float] = None,\n                            verbose: bool = True):\n        \"\"\"\n        위상 구조 보존도 기반으로 최적 cycle subset을 선택합니다.\n        Greedy forward selection으로 복합 보존도(Jaccard+Corr+Betti)가\n        가장 높은 cycle을 하나씩 추가합니다.\n\n        Args:\n            k: 고정 크기 선택 (예: 10, 17)\n            target: 보존도 임계값 (예: 0.90)\n            둘 다 None이면 전체 cycle 사용 (no-op)\n        \"\"\"\n        if k is None and target is None:\n            print(\"[Stage 3.5] Cycle 선택 생략 (전체 사용)\")\n            return self\n\n        t0 = time.time()\n        from cycle_selector import CycleSubsetSelector\n\n        overlap = self._cache['overlap_matrix']\n        cycle_labeled = self._cache['cycle_labeled']\n\n        print(f\"[Stage 3.5] Cycle Subset 선택\"\n              f\" ({'K=' + str(k) if k else 'target=' + str(target)})\")\n\n        selector = CycleSubsetSelector(overlap.values, cycle_labeled)\n\n        if k is not None:\n            result = selector.select_fixed_size(k, verbose=verbose)\n        else:\n            result = selector.select_by_threshold(target, verbose=verbose)\n\n        # 원본을 별도 키로 보존 (나중에 복원 가능)\n        self._cache['cycle_labeled_full'] = cycle_labeled\n        self._cache['overlap_matrix_full'] = overlap\n        self._cache['selection_result'] = result\n\n        # 선택된 cycle만으로 새 cycle_labeled 구성 (0부터 재인덱싱)\n        items = list(cycle_labeled.items())\n        selected_labeled = {}\n        for new_idx, orig_col_idx in enumerate(result.selected_indices):\n            orig_label, cycle_tuple = items[orig_col_idx]\n            selected_labeled[new_idx] = cycle_tuple\n\n        # overlap matrix에서 선택된 컬럼만 추출\n        selected_overlap = pd.DataFrame(\n            overlap.values[:, result.selected_indices],\n            columns=list(range(len(result.selected_indices)))\n        )\n\n        # cache 교체 → 이후 Stage 4가 subset 기반으로 동작\n        self._cache['cycle_labeled'] = selected_labeled\n        self._cache['overlap_matrix'] = selected_overlap\n\n        dt = time.time() - t0\n        print(f\"[Stage 3.5] 완료 ({dt:.2f}s)\"\n              f\" — {len(result.selected_indices)}/{len(items)} cycles\"\n              f\", score={result.final_score:.4f}\")\n\n        return self\n\n    # ═══════════════════════════════════════════════════════════════════════\n    # Stage 3.5: 시간 재배치 (방향 B)\n    # ═══════════════════════════════════════════════════════════════════════\n\n    def run_temporal_reorder(self, strategy: str = 'segment_shuffle',\n                             seed: int = 42, **kwargs):\n        \"\"\"\n        중첩행렬의 시간축을 재배치한다 (cycle 보존, 선율 변화).\n\n        Args:\n            strategy: 'segment_shuffle' | 'block_permute' | 'markov_resample'\n            seed: 랜덤 시드\n        \"\"\"\n        from temporal_reorder import reorder_overlap_matrix\n\n        print(f\"[Stage 3.5] 시간 재배치 ({strategy})\")\n        overlap = self._cache['overlap_matrix']\n        self._cache['overlap_matrix_original'] = overlap\n\n        reordered, info = reorder_overlap_matrix(\n            overlap.values, strategy=strategy, seed=seed, **kwargs\n        )\n        self._cache['overlap_matrix'] = pd.DataFrame(\n            reordered, columns=overlap.columns\n        )\n        print(f\"  전략: {strategy}, segments/blocks: {info.get('n_segments', info.get('n_blocks', info.get('n_unique_patterns', '?')))}\")\n        return info\n\n    # ═══════════════════════════════════════════════════════════════════════\n    # Stage 4: 음악 생성\n    # ═══════════════════════════════════════════════════════════════════════\n\n    def run_generation_algo1(self,\n                             inst_chord_heights: Optional[List[int]] = None,\n                             verbose: bool = False,\n                             file_suffix: str = \"\") -> List[Tuple[int, int, int]]:\n        \"\"\"\n        Algorithm 1로 음악을 생성합니다.\n        \n        Args:\n            inst_chord_heights: 각 시점별 화음 높이(음의 수) 리스트\n                None이면 기본 패턴(modules × 33) 사용\n            verbose: 디버그 출력\n        \"\"\"\n        t0 = time.time()\n        print(\"[Stage 4-A] Algorithm 1 음악 생성\")\n        \n        notes_label = self._cache['notes_label']\n        notes_counts = self._cache['notes_counts']\n        cycle_labeled = self._cache['cycle_labeled']\n        overlap = self._cache['overlap_matrix']\n        \n        # 화음 높이 시퀀스\n        if inst_chord_heights is None:\n            modules = [4, 4, 4, 3, 4, 3, 4, 3, 4, 3, 3, 3, 3, 3, 3, 3,\n                       4, 4, 4, 3, 4, 3, 4, 3, 4, 3, 4, 3, 3, 3, 3, 3]\n            inst_chord_heights = modules * 33\n        \n        # 노드 풀 생성 (온도 스케일링 적용)\n        pool = NodePool(\n            notes_label, notes_counts,\n            num_modules=self.config.generation.num_modules,\n            temperature=self.config.generation.temperature,\n        )\n        \n        # 사이클 집합 매니저\n        cycles_list = list(cycle_labeled.values())\n        manager = CycleSetManager(cycle_labeled)\n        \n        # 생성 — min_onset_gap은 config에서 읽음 (2026-04-17 B 세션, 기본 0)\n        generated = algorithm1_optimized(\n            pool, inst_chord_heights,\n            overlap.values,\n            manager,\n            max_resample=self.config.generation.max_resample_attempts,\n            verbose=verbose,\n            min_onset_gap=self.config.min_onset_gap,\n        )\n        \n        # XML 출력\n        import datetime\n        timestamp = datetime.datetime.now().strftime(\"%Y%m%d_%H%M%S\")\n        notes_to_xml(\n            [generated],\n            tempo_bpm=self.config.generation.tempo_bpm,\n            file_name=f\"algo1{file_suffix}_{timestamp}\",\n            output_dir=self.config.output_dir\n        )\n        \n        dt = time.time() - t0\n        print(f\"[Stage 4-A] 완료 ({dt:.2f}s) - {len(generated)}개 음표 생성\")\n        \n        return generated\n    \n    def run_generation_algo2(self, \n                             batch_size: int = 32) -> Optional[object]:\n        \"\"\"\n        Algorithm 2 (신경망)로 음악을 생성합니다.\n        \"\"\"\n        try:\n            from generation import (\n                prepare_training_data, MusicGenerator, train_model\n            )\n            from sklearn.model_selection import train_test_split\n        except ImportError as e:\n            print(f\"  ⚠ 필요한 라이브러리가 없습니다: {e}\")\n            return None\n        \n        t0 = time.time()\n        cfg = self.config.generation\n        print(\"[Stage 4-B] Algorithm 2 (신경망) 학습\")\n\n        # §7.7.2: use_continuous_overlap=True면 continuous activation을 X로 사용\n        if cfg.use_continuous_overlap and 'activation_continuous' in self._cache:\n            overlap_for_x = self._cache['activation_continuous']\n            print(\"  입력: continuous overlap (§7.7.2, +64.3% JS 개선)\")\n        else:\n            overlap_for_x = self._cache['overlap_matrix']\n            print(\"  입력: binary overlap\")\n\n        notes_label = self._cache['notes_label']\n        inst1_real = self._cache['inst1_real']\n        inst2_real = self._cache['inst2_real']\n\n        n_notes = self.config.midi.num_notes\n        seq_len = self.config.overlap.total_length\n\n        # 학습 데이터 준비\n        X, y = prepare_training_data(\n            overlap_for_x.values if hasattr(overlap_for_x, 'values') else overlap_for_x,\n            [inst1_real, inst2_real],\n            notes_label,\n            seq_len,\n            n_notes\n        )\n        \n        print(f\"  X shape: {X.shape}, y shape: {y.shape}\")\n        \n        # Train/Valid 분할\n        X_train, X_valid, y_train, y_valid = train_test_split(\n            X, y, test_size=cfg.test_size, random_state=cfg.random_state\n        )\n        \n        # 모델 생성\n        dim_input = X.shape[1]\n        dim_output = y.shape[1] * n_notes\n        dim_hidden = seq_len\n        \n        model = MusicGenerator(\n            dim_input, dim_hidden, dim_output, n_notes,\n            dropout=cfg.dropout\n        )\n        \n        # 학습\n        history = train_model(\n            model, X_train, y_train, X_valid, y_valid,\n            epochs=cfg.epochs, lr=cfg.lr, batch_size=batch_size\n        )\n        \n        self._cache['model'] = model\n        self._cache['training_history'] = history\n        \n        dt = time.time() - t0\n        print(f\"[Stage 4-B] 완료 ({dt:.2f}s)\")\n        \n        return model\n    \n    # ═══════════════════════════════════════════════════════════════════════\n    # 캐시 관리\n    # ═══════════════════════════════════════════════════════════════════════\n    \n    def save_cache(self, filepath: str = \"pipeline_cache.pkl\"):\n        \"\"\"중간 결과를 pickle로 저장합니다.\"\"\"\n        path = os.path.join(self.config.output_dir, filepath)\n        with open(path, 'wb') as f:\n            pickle.dump(self._cache, f)\n        print(f\"캐시 저장: {path}\")\n    \n    def load_cache(self, filepath: str = \"pipeline_cache.pkl\"):\n        \"\"\"저장된 중간 결과를 로드합니다.\"\"\"\n        path = os.path.join(self.config.output_dir, filepath)\n        with open(path, 'rb') as f:\n            self._cache = pickle.load(f)\n        print(f\"캐시 로드: {path}\")\n        return self\n    \n    @property\n    def cache_keys(self):\n        return list(self._cache.keys())\n\n\n# ═══════════════════════════════════════════════════════════════════════════\n# CLI 엔트리포인트\n# ═══════════════════════════════════════════════════════════════════════════\n\nif __name__ == \"__main__\":\n    config = PipelineConfig()\n    pipeline = TDAMusicPipeline(config)\n    \n    # 1) 전처리\n    pipeline.run_preprocessing()\n    \n    # 2) Homology 탐색 (예: timeflow, lag=1, dim=1)\n    pipeline.run_homology_search(\n        search_type='timeflow', lag=1, dimension=1\n    )\n    \n    # 3) 중첩행렬 구축\n    pipeline.run_overlap_construction(\n        persistence_key='h1_timeflow_lag1'\n    )\n    \n    # 4) 음악 생성\n    generated = pipeline.run_generation_algo1(verbose=True)\n    \n    print(f\"\\n생성 완료: {len(generated)}개 음표\")\n", "line_count": 786, "functions": [{"name": "__init__", "qual": "TDAMusicPipeline.__init__", "class": "TDAMusicPipeline", "lineno": 56, "end_lineno": 62, "doc_short": "", "description": "", "params": [{"name": "config", "type": "PipelineConfig", "default": "", "desc": ""}], "return_type": "", "returns_desc": "", "recently_modified": true}, {"name": "run_preprocessing", "qual": "TDAMusicPipeline.run_preprocessing", "class": "TDAMusicPipeline", "lineno": 68, "end_lineno": 147, "doc_short": "MIDI → 화음 시퀀스 → note 레이블링", "description": "MIDI → 화음 시퀀스 → note 레이블링", "params": [{"name": "midi_file", "type": "Optional[str]", "default": "None", "desc": ""}], "return_type": "", "returns_desc": "", "recently_modified": true}, {"name": "run_homology_search", "qual": "TDAMusicPipeline.run_homology_search", "class": "TDAMusicPipeline", "lineno": 153, "end_lineno": 238, "doc_short": "Persistent homology를 탐색합니다.", "description": "Persistent homology를 탐색합니다.", "params": [{"name": "search_type", "type": "str", "default": "'timeflow'", "desc": "'timeflow' | 'simul' | 'complex'"}, {"name": "lag", "type": "int", "default": "1", "desc": "inter-weight lag (timeflow/complex 전용)"}, {"name": "dimension", "type": "int", "default": "1", "desc": "호몰로지 차원 (1=cycle, 2=void) rate_t, rate_s: complex 모드에서의 비율"}, {"name": "rate_t", "type": "float", "default": "0.3", "desc": ""}, {"name": "rate_s", "type": "float", "default": "0.6", "desc": ""}], "return_type": "", "returns_desc": "", "recently_modified": true}, {"name": "_apply_metric", "qual": "TDAMusicPipeline._apply_metric", "class": "TDAMusicPipeline", "lineno": 240, "end_lineno": 265, "doc_short": "빈도 거리 행렬에 musical metric을 적용합니다.", "description": "빈도 거리 행렬에 musical metric을 적용합니다.", "params": [{"name": "freq_dist_values", "type": "", "default": "", "desc": ""}], "return_type": "", "returns_desc": "", "recently_modified": true}, {"name": "_search_timeflow", "qual": "TDAMusicPipeline._search_timeflow", "class": "TDAMusicPipeline", "lineno": 267, "end_lineno": 305, "doc_short": "Timeflow homology 탐색", "description": "Timeflow homology 탐색", "params": [{
