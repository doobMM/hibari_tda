.6% JS 개선 (N=5, K=42).\n각 cycle c에 고유한 임계값 tau_list[c]를 적용:\noverlap[t, c] = 1  if  activation[t, c] >= tau_list[c]\n= 0  otherwise", "params": [{"name": "activation_df", "type": "pd.DataFrame", "default": "", "desc": "build_activation_matrix(continuous=True)의 출력. (T, K) DataFrame."}, {"name": "cycle_labeled", "type": "Union[dict, list]", "default": "", "desc": "cycle 레이블 딕셔너리 또는 리스트."}, {"name": "tau_list", "type": "list", "default": "", "desc": "길이 K의 리스트. 각 cycle에 대응하는 임계값 (0~1). None이면 τ_c = 0.35 (기본값)로 일괄 적용."}, {"name": "total_length", "type": "int", "default": "1088", "desc": "시간축 길이."}], "return_type": "pd.DataFrame", "returns_desc": "(total_length, K) 이진 overlap DataFrame.", "recently_modified": true}, {"name": "group_rBD_by_homology", "qual": "group_rBD_by_homology", "class": "", "lineno": 288, "end_lineno": 321, "doc_short": "호몰로지 프로필을 사이클/void별로 그룹화합니다.", "description": "호몰로지 프로필을 사이클/void별로 그룹화합니다.\n기존 get_rBD_groupedBy_homol의 정리 버전.", "params": [{"name": "homology_profile", "type": "list", "default": "", "desc": ""}, {"name": "dim", "type": "int", "default": "1", "desc": ""}], "return_type": "dict", "returns_desc": "", "recently_modified": true}, {"name": "_parse_cycle_1d", "qual": "_parse_cycle_1d", "class": "", "lineno": 324, "end_lineno": 392, "doc_short": "1차 호몰로지 (cycle) 파싱.", "description": "1차 호몰로지 (cycle) 파싱.\nnumpy 버전: \" - (5, 19) + (9, 18) + ...\" (부호 + edge)\nripser 버전: \"(5, 9) + (5, 16) + ...\" (부호 없을 수 있음, 중복 가능)\n둘 다 처리합니다.", "params": [{"name": "edges_str", "type": "str", "default": "", "desc": ""}], "return_type": "Optional[tuple]", "returns_desc": "", "recently_modified": true}, {"name": "_parse_cycle_2d", "qual": "_parse_cycle_2d", "class": "", "lineno": 395, "end_lineno": 409, "doc_short": "2차 호몰로지 (void) 파싱", "description": "2차 호몰로지 (void) 파싱", "params": [{"name": "edges_str", "type": "str", "default": "", "desc": ""}], "return_type": "Optional[frozenset]", "returns_desc": "", "recently_modified": false}, {"name": "find_common_across_lags", "qual": "find_common_across_lags", "class": "", "lineno": 414, "end_lineno": 437, "doc_short": "lag 1~4에서 공통으로 발견되는 호몰로지를 찾습니다.", "description": "lag 1~4에서 공통으로 발견되는 호몰로지를 찾습니다.\n기존 catch_intersection의 간결화 버전.", "params": [{"name": "persistence_by_lag", "type": "Dict[int, dict]", "default": "", "desc": ""}, {"name": "dim", "type": "int", "default": "1", "desc": ""}], "return_type": "", "returns_desc": "", "recently_modified": false}]}, "cycle_selector": {"name": "cycle_selector", "filename": "cycle_selector.py", "exists": true, "source": "\"\"\"\ncycle_selector.py — Cycle Subset 선택: 위상 구조 보존도 최적화\n================================================================\n\n48개 cycle 전체 대신, 원곡의 위상 구조를 가장 잘 보존하는\nK개 cycle subset을 선택합니다.\n\n보존도 = 3가지 지표의 가중 평균:\n  1. Note Pool Jaccard (0.5) — 음악 생성에 직접 연관\n  2. Overlap Pattern 상관 (0.3) — 시간 구조 보존\n  3. Betti Curve 유사도 (0.2) — 위상 구조 보존\n\n탐색: Greedy Forward Selection\n  - S=∅ → 매 단계에서 가장 preservation이 높은 cycle 추가\n  - 종료: 고정 크기 K 또는 보존도 임계값 도달\n\"\"\"\n\nimport numpy as np\nfrom typing import List, Tuple, Optional, Dict, Set\nfrom dataclasses import dataclass, field\n\n\n@dataclass\nclass SelectionResult:\n    \"\"\"Greedy selection 결과.\"\"\"\n    selected_indices: List[int]          # 선택된 cycle column 인덱스\n    selected_cycles: List[tuple]         # 선택된 cycle vertex tuple\n    preservation_curve: List[float]      # 각 단계의 composite score\n    component_curves: Dict[str, List[float]]  # 지표별 curve\n    final_score: float\n\n\n# ═══════════════════════════════════════════════════════════════════════════\n# 보존도 지표\n# ═══════════════════════════════════════════════════════════════════════════\n\nclass PreservationMetrics:\n    \"\"\"\n    전체 overlap matrix 대비 subset의 보존도를 계산합니다.\n\n    초기화 시 전체 overlap matrix에서 시점별 note pool 등을\n    사전 계산하여 select 루프 내에서 빠르게 평가합니다.\n    \"\"\"\n\n    def __init__(self, overlap_matrix: np.ndarray,\n                 cycle_notes: Dict[int, Set[int]],\n                 weights: Tuple[float, float, float] = (0.5, 0.3, 0.2)):\n        \"\"\"\n        Args:\n            overlap_matrix: (T, C) 이진 행렬\n            cycle_notes: {col_idx: set of note labels} 매핑\n            weights: (jaccard, correlation, betti) 가중치\n        \"\"\"\n        self.overlap = overlap_matrix  # (T, C)\n        self.T, self.C = overlap_matrix.shape\n        self.cycle_notes = cycle_notes\n        self.w_jaccard, self.w_corr, self.w_betti = weights\n\n        # ── 사전 계산: 전체 matrix 기준값 ──\n        # 각 시점(t)에서 활성화된 cycle 수의 합 → temporal profile (Betti curve와 동일)\n        self._full_temporal = overlap_matrix.sum(axis=1).astype(float)  # (T,)\n        self._full_betti = self._full_temporal.copy()\n        # Betti curve의 L2 노름 (나중에 정규화 거리 계산에 사용)\n        self._full_betti_norm = np.linalg.norm(self._full_betti)\n\n        # ── 시점별 전체 note pool 사전 계산 ──\n        # 각 시점 t에서 활성화된 모든 cycle의 note를 합집합으로 모은 것\n        # greedy 루프에서 Jaccard를 빠르게 계산하기 위해 미리 구해둠\n        self._full_pools: List[Set[int]] = []\n        # note pool이 비어있지 않은 시점만 기록 (Jaccard 계산 시 순회 대상)\n        self._active_times: List[int] = []\n        for t in range(self.T):\n            pool = set()\n            for c in range(self.C):\n                if overlap_matrix[t, c]:\n                    pool |= cycle_notes.get(c, set())\n            self._full_pools.append(pool)\n            if pool:\n                self._active_times.append(t)\n\n    def note_pool_jaccard(self, subset: List[int]) -> float:\n        \"\"\"\n        시점별 note pool Jaccard 유사도의 평균.\n\n        각 활성 시점 t에서:\n          full_pool = 전체 cycle이 커버하는 note 집합\n          sub_pool  = subset cycle이 커버하는 note 집합\n          J(t) = |full_pool ∩ sub_pool| / |full_pool ∪ sub_pool|\n        최종 반환값 = 모든 활성 시점의 J(t) 평균\n        \"\"\"\n        if not self._active_times:\n            return 1.0\n\n        subset_set = set(subset)\n        total_j = 0.0\n        count = 0\n\n        for t in self._active_times:\n            full_pool = self._full_pools[t]\n            if not full_pool:\n                continue\n\n            # subset에 속하면서 시점 t에서 활성화된 cycle들의 note 합집합\n            sub_pool = set()\n            for c in subset_set:\n                if self.overlap[t, c]:\n                    sub_pool |= self.cycle_notes.get(c, set())\n\n            if not full_pool and not sub_pool:\n                continue\n\n            # Jaccard 계산: 교집합 크기 / 합집합 크기\n            intersection = len(full_pool & sub_pool)\n            union = len(full_pool | sub_pool)\n            if union > 0:\n                total_j += intersection / union\n                count += 1\n\n        return total_j / count if count > 0 else 0.0\n\n    # ── Incremental Jaccard (greedy 최적화용) ──\n\n    def init_incremental(self) -> List[Set[int]]:\n        \"\"\"greedy 시작 전 호출. 시점별 빈 sub_pool 초기화.\"\"\"\n        return [set() for _ in range(self.T)]\n\n    def jaccard_with_candidate(self, sub_pools: List[Set[int]],\n                               candidate_c: int) -> float:\n        \"\"\"\n        기존 sub_pools에 candidate_c를 추가했을 때의 Jaccard를\n        sub_pools를 변경하지 않고 계산합니다.\n        \"\"\"\n        if not self._active_times:\n            return 1.0\n\n        c_notes = self.cycle_notes.get(candidate_c, set())\n        total_j = 0.0\n        count = 0\n\n        for t in self._active_times:\n            full_pool = self._full_pools[t]\n            if not full_pool:\n                continue\n\n            if self.overlap[t, candidate_c]:\n                sub_pool = sub_pools[t] | c_notes\n            else:\n                sub_pool = sub_pools[t]\n\n            intersection = len(full_pool & sub_pool)\n            union = len(full_pool | sub_pool)\n            if union > 0:\n                total_j += intersection / union\n                count += 1\n\n        return total_j / count if count > 0 else 0.0\n\n    def commit_candidate(self, sub_pools: List[Set[int]],\n                         candidate_c: int) -> None:\n        \"\"\"선택 확정: sub_pools에 candidate_c의 note를 반영합니다.\"\"\"\n        c_notes = self.cycle_notes.get(candidate_c, set())\n        for t in range(self.T):\n            if self.overlap[t, candidate_c]:\n                sub_pools[t] |= c_notes\n\n    def overlap_correlation(self, subset: List[int]) -> float:\n        \"\"\"\n        전체 vs subset의 temporal profile에 대한 Pearson 상관계수.\n\n        temporal profile = 각 시점에서 활성화된 cycle 수의 시계열 벡터.\n        전체 cycle의 profile과 subset의 profile 간 상관이 높을수록\n        시간에 따른 위상 구조의 밀도 변화 패턴이 유사함을 의미.\n        음수 상관은 0으로 클리핑 (역상관은 보존으로 간주하지 않음).\n        \"\"\"\n        # subset에 해당하는 열만 추출하여 시점별 합산\n        sub_temporal = self.overlap[:, subset].sum(axis=1).astype(float)\n\n        full_std = self._full_temporal.std()\n        sub_std = sub_temporal.std()\n\n        # 둘 다 상수(분산=0)이면 완벽 일치, 한쪽만 상수이면 상관 없음\n        if full_std < 1e-12 or sub_std < 1e-12:\n            return 1.0 if full_std < 1e-12 and sub_std < 1e-12 else 0.0\n\n        corr = np.corrcoef(self._full_temporal, sub_temporal)[0, 1]\n        return max(0.0, corr)  # 음수 상관은 0으로\n\n    def betti_curve_score(self, subset: List[int]) -> float:\n        \"\"\"\n        Betti curve L2 유사도: 1 - (정규화된 L2 거리).\n\n        Betti curve = 시점별 활성 cycle 수 (= temporal profile과 동일).\n        subset은 cycle 수가 적으므로 값이 전체보다 작음 →\n        전체 합 / subset 합 비율로 스케일링하여 크기를 맞춘 뒤,\n        L2 거리를 전체 curve의 노름으로 나누어 0~1 범위로 정규화.\n        score = 1 - (||full - scaled_sub|| / ||full||)\n        score가 1에 가까울수록 curve의 형태(shape)가 유사.\n        \"\"\"\n        if self._full_betti_norm < 1e-12:\n            return 1.0\n\n        sub_betti = self.overlap[:, subset].sum(axis=1).astype(float)\n        # 전체 대비 비율 보정: subset은 cycle 수가 적으므로 스케일 조정\n        if sub_betti.sum() > 0:\n            scale = self._full_betti.sum() / sub_betti.sum()\n            sub_betti_scaled = sub_betti * scale\n        else:\n            return 0.0\n\n        dist = np.linalg.norm(self._full_betti - sub_betti_scaled)\n        return max(0.0, 1.0 - dist / self._full_betti_norm)\n\n    def composite_score(self, subset: List[int]) -> Tuple[float, Dict[str, float]]:\n        \"\"\"\n        3가지 지표의 가중 평균으로 최종 보존도 점수를 산출.\n\n        score = w_jaccard * J + w_corr * C + w_betti * B\n        기본 가중치: (0.5, 0.3, 0.2)\n        → note pool 유사도(음악적 내용)에 가장 큰 비중,\n          시간 패턴 상관에 중간 비중, Betti curve 형태에 보조 비중.\n        \"\"\"\n        j = self.note_pool_jaccard(subset)\n        c = self.overlap_correlation(subset)\n        b = self.betti_curve_score(subset)\n\n        score = self.w_jaccard * j + self.w_corr * c + self.w_betti * b\n        components = {'jaccard': j, 'correlation': c, 'betti': b}\n        return score, components\n\n    def composite_score_incremental(self, subset: List[int],\n                                    candidate_c: int,\n                                    sub_pools: List[Set[int]]\n                                    ) -> Tuple[float, Dict[str, float]]:\n        \"\"\"\n        incremental Jaccard + 기존 correlation/betti로 composite score 계산.\n        greedy 루프에서 subset 전체를 매번 재순회하지 않아 빠릅니다.\n        \"\"\"\n        candidate = subset + [candidate_c]\n        j = self.jaccard_with_candidate(sub_pools, candidate_c)\n        c = self.overlap_correlation(candidate)\n        b = self.betti_curve_score(candidate)\n\n        score = self.w_jaccard * j + self.w_corr * c + self.w_betti * b\n        components = {'jaccard': j, 'correlation': c, 'betti': b}\n        return score, components\n\n\n# ═══════════════════════════════════════════════════════════════════════════\n# Greedy Forward Selection\n# ═══════════════════════════════════════════════════════════════════════════\n\nclass CycleSubsetSelector:\n    \"\"\"\n    Greedy forward selection으로 최적 cycle subset을 찾습니다.\n    \"\"\"\n\n    def __init__(self, overlap_matrix: np.ndarray,\n                 cycle_labeled: dict,\n                 weights: Tuple[float, float, float] = (0.5, 0.3, 0.2)):\n        \"\"\"\n        Args:\n            overlap_matrix: (T, C) 이진 행렬\n            cycle_labeled: {label: (v0, v1, ...)} cycle vertex 매핑\n        \"\"\"\n        self.overlap = overlap_matrix\n        self.cycle_labeled = cycle_labeled\n        self.C = overlap_matrix.shape[1]\n\n        # cycle column index → note set 매핑 (cycle 내 vertex 추출)\n        cycle_notes = {}\n        items = list(cycle_labeled.items()) if isinstance(cycle_labeled, dict) else list(enumerate(cycle_labeled))\n        for c_idx, (label, cycle) in enumerate(items):\n            # dim=2인 경우: frozenset of tuples → 모든 vertex(note)의 합집합\n            if isinstance(cycle, frozenset):\n                verts = set()\n                for simplex in cycle:\n                    if isinstance(simplex, tuple):\n                        verts.update(simplex)\n                    else:\n                        verts.add(simplex)\n                cycle_notes[c_idx] = verts\n            else:\n                cycle_notes[c_idx] = set(cycle)\n\n        self.cycle_notes = cycle_notes\n        self.metrics = PreservationMetrics(overlap_matrix, cycle_notes, weights)\n        self._items = items\n\n    def select_fixed_size(self, k: int, verbose: bool = True) -> SelectionResult:\n        \"\"\"정확히 K개 cycle을 greedy로 선택합니다.\"\"\"\n        k = min(k, self.C)\n        return self._greedy_select(\n            stop_fn=lambda selected, score: len(selected) >= k,\n            verbose=verbose\n        )\n\n    def select_by_threshold(self, target: float = 0.9,\n                            max_k: Optional[int] = None,\n                            verbose: bool = True) -> SelectionResult:\n        \"\"\"보존도가 target에 도달할 때까지 cycle을 추가합니다.\"\"\"\n        if max_k is None:\n            max_k = self.C\n        return self._greedy_select(\n            stop_fn=lambda selected, score: score >= target or len(selected) >= max_k,\n            verbose=verbose\n        )\n\n    def _greedy_select(self, stop_fn, verbose: bool) -> SelectionResult:\n        \"\"\"\n        Greedy forward selection 공통 로직 (incremental Jaccard 최적화).\n\n        빈 집합에서 시작하여 매 단계마다:\n          1. 아직 선택되지 않은 모든 cycle을 후보로 시도\n          2. 각 후보를 현재 선택 집합에 추가했을 때의 composite score 계산\n             — Jaccard는 incremental: 이전 sub_pools 캐시에 후보만 추가하여 평가\n          3. 가장 높은 score를 주는 cycle을 선택 집합에 확정\n          4. stop_fn 조건(크기 K 도달 또는 목표 score 달성)이면 종료\n        \"\"\"\n        selected: List[int] = []\n        remaining = set(range(self.C))\n        preservation_curve: List[float] = []\n        component_curves: Dict[str, List[float]] = {\n            'jaccard': [], 'correlation': [], 'betti': []\n        }\n\n        # incremental Jaccard용 시점별 sub_pool 캐시\n        sub_pools = self.metrics.init_incremental()\n\n        step = 0\n        while remaining:\n            best_c = -1\n            best_score = -1.0\n            best_comp = {}\n\n            # 남은 후보 중 추가 시 score가 최대인 cycle 탐색\n            for c in remaining:\n                score, comp = self.metrics.composite_score_incremental(\n                    selected, c, sub_pools)\n                if score > best_score:\n                    best_score = score\n                    best_c = c\n                    best_comp = comp\n\n            # 최선의 cycle을 선택 집합에 추가 + sub_pools 갱신\n            selected.append(best_c)\n            remaining.remove(best_c)\n            self.metrics.commit_candidate(sub_pools, best_c)\n            preservation_curve.append(best_score)\n            for key in component_curves:\n                component_curves[key].append(best_comp[key])\n\n            step += 1\n            if verbose and (step <= 10 or step % 5 == 0 or step == self.C):\n                cycle_verts = self._items[best_c][1]\n                print(f\"    step {step:2d}: +cycle {best_c:2d} {cycle_verts}\"\n                      f\"  score={best_score:.4f}\"\n                      f\"  (J={best_comp['jaccard']:.3f}\"\n                      f\" C={best_comp['correlation']:.3f}\"\n                      f\" B={best_comp['betti']:.3f})\")\n\n            # 종료 조건 확인 (크기 K 도달 또는 목표 score 달성)\n            if stop_fn(selected, best_score):\n                break\n\n        selected_cycles = [self._items[i][1] for i in selected]\n\n        return SelectionResult(\n            selected_indices=selected,\n            selected_cycles=selected_cycles,\n            preservation_curve=preservation_curve,\n            component_curves=component_curves,\n            final_score=preservation_curve[-1] if preservation_curve else 0.0\n        )\n\n    def select_with_coverage(self, notes_dict: dict,\n                              target: float = 0.9,\n                              k: Optional[int] = None,\n                              verbose: bool = True) -> SelectionResult:\n        \"\"\"\n        Note coverage를 분석한 후 보존도를 최적화합니다.\n\n        2단계 분석:\n          1) \"고아 note\" 식별 — 어떤 cycle에도 속하지 않는 note\n             → cycle 선택으로는 해결 불가, 생성 시 chord 기반 보충 필요\n          2) greedy selection 수행 후 커버리지 보고\n\n        Args:\n            notes_dict: {chord_idx: set of note labels} 화음→note 매핑\n            target: 보존도 임계값\n            k: 고정 크기 (None이면 target 사용)\n\n        Returns:\n            SelectionResult에 .orphan_notes, .orphan_chords, .coverage 추가\n        \"\"\"\n        # ── 전체 note 집합 (1-indexed) ──\n        all_notes = set()\n        for key, val in notes_dict.items():\n            if isinstance(key, int):\n                all_notes |= val\n\n        # ── cycle에 포함된 note (0-indexed vertex → 1-indexed) ──\n        notes_in_any_cycle = set()\n        for c_idx, verts in self.cycle_notes.items():\n            notes_in_any_cycle |= {v + 1 for v in verts}\n\n        orphan_notes = all_notes - notes_in_any_cycle\n\n        # ── 고아 note가 속한 chord 식별 ──\n        orphan_chords = {}\n        for n in orphan_notes:\n            chords = [key for key, val in notes_dict.items()\n                      if isinstance(key, int) and n in val]\n            orphan_chords[n] = chords\n\n        if verbose:\n            if orphan_notes:\n                print(f\"    [Coverage] 고아 note {len(orphan_notes)}개\"\n                      f\" (어떤 cycle에도 미포함): {sorted(orphan_notes)}\")\n                for n, chords in sorted(orphan_chords.items()):\n                    print(f\"      note {n} -> chord {chords}\")\n            else:\n                print(f\"    [Coverage] 모든 note가 cycle에 포함됨\")\n\n        # ── greedy selection ──\n        if k is not None:\n            result = self.select_fixed_size(k, verbose=verbose)\n        else:\n            result = self.select_by_threshold(target, verbose=verbose)\n\n        # ── 선택 후 커버리지 보고 ──\n        covered = set()\n        for idx in result.selected_indices:\n            covered |= {v + 1 for v in self.cycle_notes[idx]}\n\n        total_missing = all_notes - covered\n\n        if verbose:\n            print(f\"    [Coverage] {len(covered)}/{len(all_notes)} notes 커버\"\n                  f\" (구조적 고아 {len(orphan_notes)}개 포함하면\"\n                  f\" 최대 {len(notes_in_any_cycle)}/{len(all_notes)})\")\n\n        # ── orphan 정보를 result에 첨부 ──\n        result.orphan_notes = orphan_notes\n        result.orphan_chords = orphan_chords\n        result.coverage = len(covered) / len(all_notes) if all_notes else 1.0\n\n        return result\n\n    def rank_cycles(self) -> List[Tuple[int, float]]:\n        \"\"\"\n        각 cycle을 단독으로 평가하여 순위를 매깁니다.\n\n        cycle 하나만 선택했을 때의 composite score를 기준으로\n        내림차순 정렬. 개별 cycle의 중요도를 파악하거나,\n        greedy selection의 첫 단계 결과를 미리 확인할 때 유용.\n        \"\"\"\n        scores = []\n        for c in range(self.C):\n            score, _ = self.metrics.composite_score([c])\n            scores.append((c, score))\n        scores.sort(key=lambda x: -x[1])\n        return scores\n", "line_count": 462, "functions": [{"name": "__init__", "qual": "PreservationMetrics.__init__", "class": "PreservationMetrics", "lineno": 45, "end_lineno": 79, "doc_short": "Args:", "description": "", "params": [{"name": "overlap_matrix", "type": "np.ndarray", "default": "", "desc": "(T, C) 이진 행렬"}, {"name": "cycle_notes", "type": "Dict[int, Set[int]]", "default": "", "desc": "{col_idx: set of note labels} 매핑"}, {"name": "weights", "type": "Tuple[float, float, float]", "default": "(0.5, 0.3, 0.2)", "desc": "(jaccard, correlation, betti) 가중치"}], "return_type": "", "returns_desc": "", "recently_modified": true}, {"name": "note_pool_jaccard", "qual": "PreservationMetrics.note_pool_jaccard", "class": "PreservationMetrics", "lineno": 81, "end_lineno": 119, "doc_short": "시점별 note pool Jaccard 유사도의 평균.", "description": "시점별 note pool Jaccard 유사도의 평균.\n각 활성 시점 t에서:\nfull_pool = 전체 cycle이 커버하는 note 집합\nsub_pool  = subset cycle이 커버하는 note 집합\nJ(t) = |full_pool ∩ sub_pool| / |full_pool ∪ sub_pool|\n최종 반환값 = 모든 활성 시점의 J(t) 평균", "params": [{"name": "subset", "type": "List[int]", "default": "", "desc": ""}], "return_type": "float", "returns_desc": "", "recently_modified": true}, {"name": "init_incremental", "qual": "PreservationMetrics.init_incremental", "class": "PreservationMetrics", "lineno": 123, "end_lineno": 125, "doc_short": "greedy 시작 전 호출. 시점별 빈 sub_pool 초기화.", "description": "greedy 시작 전 호출. 시점별 빈 sub_pool 초기화.", "params": [], "return_type": "List[Set[int]]", "returns_desc": "", "recently_modified": true}, {"name": "jaccard_with_candidate", "qual": "PreservationMetrics.jaccard_with_candidate", "class": "PreservationMetrics", "lineno": 127, "end_lineno": 156, "doc_short": "기존 sub_pools에 candidate_c를 추가했을 때의 Jaccard를", "description": "기존 sub_pools에 candidate_c를 추가했을 때의 Jaccard를\nsub_pools를 변경하지 않고 계산합니다.", "params": [{"name": "sub_pools", "type": "List[Set[int]]", "default": "", "desc": ""}, {"name": "candidate_c", "type": "int", "default": "", "desc": ""}], "return_type": "float", "returns_desc": "", "recently_modified": true}, {"name": "commit_candidate", "qual": "PreservationMetrics.commit_candidate", "class": "PreservationMetrics", "lineno": 158, "end_lineno": 164, "doc_short": "선택 확정: sub_pools에 candidate_c의 note를 반영합니다.", "description": "선택 확정: sub_pools에 candidate_c의 no Dict[str, float]]", "returns_desc": "", "recently_modified": true}, {"name": "composite_score_incremental", "qual": "PreservationMetrics.composite_score_incremental", "class": "PreservationMetrics", "lineno": 230, "end_lineno": 245, "doc_short": "incremental Jaccard + 기존 correlation/betti로 composite score 계산.", "description": "incremental Jaccard + 기존 correlation/betti로 composite score 계산.\ngreedy 루프에서 subset 전체를 매번 재순회하지 않아 빠릅니다.", "params": [{"name": "subset", "type": "List[int]", "default": "", "desc": ""}, {"name": "candidate_c", "type": "int", "default": "", "desc": ""}, {"name": "sub_pools", "type": "List[Set[int]]", "default": "", "desc": ""}], "return_type": "Tuple[float, Dict[str, float]]", "returns_desc": "", "recently_modified": true}, {"name": "__init__", "qual": "CycleSubsetSelector.__init__", "class": "CycleSubsetSelector", "lineno": 257, "end_lineno": 287, "doc_short": "Args:", "description": "", "params": [{"name": "overlap_matrix", "type": "np.ndarray", "default": "", "desc": "(T, C) 이진 행렬"}, {"name": "cycle_labeled", "type": "dict", "default": "", "desc": "{label: (v0, v1, ...)} cycle vertex 매핑"}, {"name": "weights", "type": "Tuple[float, float, float]", "default": "(0.5, 0.3, 0.2)", "desc": ""}], "return_type": "", "returns_desc": "", "recently_modified": true}, {"name": "select_fixed_size", "qual": "CycleSubsetSelector.select_fixed_size", "class": "CycleSubsetSelector", "lineno": 289, "end_lineno": 295, "doc_short": "정확히 K개 cycle을 greedy로 선택합니다.", "description": "정확히 K개 cycle을 greedy로 선택합니다.", "params": [{"name": "k", "type": "int", "default": "", "desc": ""}, {"name": "verbose", "type": "bool", "default": "True", "desc": ""}], "return_type": "SelectionResult", "returns_desc": "", "recently_modified": true}, {"name": "select_by_threshold", "qual": "CycleSubsetSelector.select_by_threshold", "class": "CycleSubsetSelector", "lineno": 297, "end_lineno": 306, "doc_short": "보존도가 target에 도달할 때까지 cycle을 추가합니다.", "description": "보존도가 target에 도달할 때까지 cycle을 추가합니다.", "params": [{"name": "target", "type": "float", "default": "0.9", "desc": ""}, {"name": "max_k", "type": "Optional[int]", "default": "None", "desc": ""}, {"name": "verbose", "type": "bool", "default": "True", "desc": ""}], "return_type": "SelectionResult", "returns_desc": "", "recently_modified": true}, {"name": "_greedy_select", "qual": "CycleSubsetSelector._greedy_select", "class": "CycleSubsetSelector", "lineno": 308, "end_lineno": 373, "doc_short": "Greedy forward selection 공통 로직 (incremental Jaccard 최적화).", "description": "Greedy forward selection 공통 로직 (incremental Jaccard 최적화).\n빈 집합에서 시작하여 매 단계마다:\n1. 아직 선택되지 않은 모든 cycle을 후보로 시도\n2. 각 후보를 현재 선택 집합에 추가했을 때의 composite score 계산\n— Jaccard는 incremental: 이전 sub_pools 캐시에 후보만 추가하여 평가\n3. 가장 높은 score를 주는 cycle을 선택 집합에 확정\n4. stop_fn 조건(크기 K 도달 또는 목표 score 달성)이면 종료", "params": [{"name": "stop_fn", "type": "", "default": "", "desc": ""}, {"name": "verbose", "type": "bool", "default": "", "desc": ""}], "return_type": "SelectionResult", "returns_desc": "", "recently_modified": true}, {"name": "select_with_coverage", "qual": "CycleSubsetSelector.select_with_coverage", "class": "CycleSubsetSelector", "lineno": 375, "end_lineno": 447, "doc_short": "Note coverage를 분석한 후 보존도를 최적화합니다.", "description": "Note coverage를 분석한 후 보존도를 최적화합니다.\n2단계 분석:\n1) \"고아 note\" 식별 — 어떤 cycle에도 속하지 않는 note\n→ cycle 선택으로는 해결 불가, 생성 시 chord 기반 보충 필요\n2) greedy selection 수행 후 커버리지 보고", "params": [{"name": "notes_dict", "type": "dict", "default": "", "desc": "{chord_idx: set of note labels} 화음→note 매핑"}, {"name": "target", "type": "float", "default": "0.9", "desc": "보존도 임계값"}, {"name": "k", "type": "Optional[int]", "default": "None", "desc": "고정 크기 (None이면 target 사용)"}, {"name": "verbose", "type": "bool", "default": "True", "desc": ""}], "return_type": "SelectionResult", "returns_desc": "SelectionResult에 .orphan_notes, .orphan_chords, .coverage 추가", "recently_modified": true}, {"name": "rank_cycles", "qual": "CycleSubsetSelector.rank_cycles", "class": "CycleSubsetSelector", "lineno": 449, "end_lineno": 462, "doc_short": "각 cycle을 단독으로 평가하여 순위를 매깁니다.", "description": "각 cycle을 단독으로 평가하여 순위를 매깁니다.\ncycle 하나만 선택했을 때의 composite score를 기준으로\n내림차순 정렬. 개별 cycle의 중요도를 파악하거나,\ngreedy selection의 첫 단계 결과를 미리 확인할 때 유용.", "params": [], "return_type": "List[Tuple[int, float]]", "returns_desc": "", "recently_modified": false}]}, "temporal_reorder": {"name": "temporal_reorder", "filename": "temporal_reorder.py", "exists": true, "source": "\"\"\"\ntemporal_reorder.py — 중첩행렬 시간 재배치 (방향 B)\n\ncycle(열)은 고정하고 시간(행)을 재배치하여,\n같은 위상 구조에서 다른 선율 경로를 생성한다.\n\n3가지 전략:\n  1. segment_shuffle  — 동일 활성 패턴 연속 구간을 셔플\n  2. block_permute    — 고정 길이 블록 단위 셔플\n  3. markov_resample  — 행 전이확률 학습 → 새 시퀀스 리샘플링\n\"\"\"\nimport numpy as np\nfrom typing import Tuple, Dict, Any, Optional\n\n\ndef reorder_overlap_matrix(overlap: np.ndarray,\n                           strategy: str = 'segment_shuffle',\n                           seed: int = 42,\n                           **kwargs) -> Tuple[np.ndarray, Dict[str, Any]]:\n    \"\"\"\n    중첩행렬의 시간축을 재배치한다.\n\n    Args:\n        overlap: (T, C) numpy 배열 (이진 또는 연속값)\n        strategy: 'segment_shuffle' | 'block_permute' | 'markov_resample'\n        seed: 랜덤 시드\n        **kwargs: 전략별 추가 파라미터\n\n    Returns:\n        reordered: (T, C) 재배치된 행렬\n        info: 전략 정보 및 통계\n    \"\"\"\n    rng = np.random.RandomState(seed)\n\n    if strategy == 'segment_shuffle':\n        return _segment_shuffle(overlap, rng, **kwargs)\n    elif strategy == 'block_permute':\n        return _block_permute(overlap, rng, **kwargs)\n    elif strategy == 'markov_resample':\n        return _markov_resample(overlap, rng, **kwargs)\n    else:\n        raise ValueError(f\"Unknown strategy: {strategy}\")\n\n\n# ── 1. Segment Shuffle ─────────────────────────────────────────────────\n\ndef _segment_shuffle(overlap: np.ndarray, rng: np.random.RandomState,\n                     min_segment_len: int = 1\n                     ) -> Tuple[np.ndarray, Dict[str, Any]]:\n    \"\"\"\n    동일한 활성화 패턴이 연속되는 구간(segment)을 식별하고,\n    segment 단위로 순서를 셔플한다.\n\n    예: [A,A,A,B,B,C,C,C,C] → [C,C,C,C,A,A,A,B,B]\n    각 segment 내부 순서는 보존되므로 국소적 연결성 유지.\n    \"\"\"\n    T, C = overlap.shape\n\n    # 각 행을 tuple로 변환하여 패턴 비교\n    segments = []  # [(start, end, pattern_tuple), ...]\n    current_pattern = tuple(overlap[0])\n    seg_start = 0\n\n    for t in range(1, T):\n        pattern = tuple(overlap[t])\n        if pattern != current_pattern:\n            segments.append((seg_start, t, current_pattern))\n            current_pattern = pattern\n            seg_start = t\n    segments.append((seg_start, T, current_pattern))\n\n    # 최소 길이 필터\n    small = []\n    if min_segment_len > 1:\n        filtered = [s for s in segments if (s[1] - s[0]) >= min_segment_len]\n        small = [s for s in segments if (s[1] - s[0]) < min_segment_len]\n        # 짧은 segment는 가장 가까운 filtered segment에 병합\n        segments = filtered if filtered else segments\n\n    # 셔플\n    order = list(range(len(segments)))\n    rng.shuffle(order)\n\n    # 재조립\n    reordered = np.empty_like(overlap)\n    pos = 0\n    mapping = {}  # new_t → old_t\n\n    for new_idx in order:\n        start, end, _ = segments[new_idx]\n        seg_len = end - start\n        reordered[pos:pos + seg_len] = overlap[start:end]\n        for offset in range(seg_len):\n            mapping[pos + offset] = start + offset\n        pos += seg_len\n\n    # pos < T인 경우 (small segments 제외 시) 나머지 채움\n    if pos < T:\n        for s_start, s_end, _ in small:\n            seg_len = s_end - s_start\n            reordered[pos:pos + seg_len] = overlap[s_start:s_end]\n            for offset in range(seg_len):\n                mapping[pos + offset] = s_start + offset\n            pos += seg_len\n\n    info = {\n        'strategy': 'segment_shuffle',\n        'n_segments': len(segments),\n        'avg_segment_len': np.mean([s[1] - s[0] for s in segments]),\n        'shuffle_order': order,\n    }\n    return reordered, info\n\n\n# ── 2. Block Permute ───────────────────────────────────────────────────\n\ndef _block_permute(overlap: np.ndarray, rng: np.random.RandomState,\n                   block_size: int = 32\n                   ) -> Tuple[np.ndarray, Dict[str, Any]]:\n    \"\"\"\n    고정 길이 블록(예: 32 timestep = 4마디) 단위로 셔플.\n    블록 내부 순서는 보존.\n\n    block_size=32 → 8분음표 기준 4마디 (32 × 0.5beat = 16beat = 4bar)\n    \"\"\"\n    T, C = overlap.shape\n    n_blocks = T // block_size\n    remainder = T % block_size\n\n    # 블록 인덱스 셔플\n    order = list(range(n_blocks))\n    rng.shuffle(order)\n\n    reordered = np.empty_like(overlap)\n    pos = 0\n\n    for new_idx in order:\n        start = new_idx * block_size\n        reordered[pos:pos + block_size] = overlap[start:start + block_size]\n        pos += block_size\n\n    # 나머지 (마지막 불완전 블록) 그대로 붙임\n    if remainder > 0:\n        reordered[pos:] = overlap[n_blocks * block_size:]\n\n    info = {\n        'strategy': 'block_permute',\n        'block_size': block_size,\n        'n_blocks': n_blocks,\n        'remainder': remainder,\n        'shuffle_order': order,\n    }\n    return reordered, info\n\n\n# ── 3. Markov Resample ─────────────────────────────────────────────────\n\ndef _markov_resample(overlap: np.ndarray, rng: np.random.RandomState,\n                     temperature: float = 1.0\n                     ) -> Tuple[np.ndarray, Dict[str, Any]]:\n    \"\"\"\n    원본 중첩행렬의 행 전이확률(1차 Markov)을 학습한 뒤,\n    같은 길이의 새로운 시퀀스를 리샘플링한다.\n\n    temperature: 1.0 = 원본 전이확률 그대로\n                 >1.0 = 더 랜덤 (탐험적)\n                 <1.0 = 더 결정론적 (원본에 가까움)\n    \"\"\"\n    T, C = overlap.shape\n\n    # 각 행을 고유 패턴으로 인코딩\n    row_tuples = [tuple(overlap[t]) for t in range(T)]\n    unique_patterns = list(set(row_tuples))\n    pattern_to_idx = {p: i for i, p in enumerate(unique_patterns)}\n    n_states = len(unique_patterns)\n\n    # 상태 시퀀스\n    state_seq = [pattern_to_idx[p] for p in row_tuples]\n\n    # 전이 행렬 구축\n    trans = np.zeros((n_states, n_states))\n    for t in range(T - 1):\n        trans[state_seq[t], state_seq[t + 1]] += 1\n\n    # 정규화 (smoothing)\n    trans += 1e-6\n    row_sums = trans.sum(axis=1, keepdims=True)\n    trans = trans / row_sums\n\n    # temperature 적용\n    if temperature != 1.0:\n        log_trans = np.log(trans + 1e-12) / temperature\n        log_trans -= log_trans.max(axis=1, keepdims=True)\n        trans = np.exp(log_trans)\n        trans = trans / trans.sum(axis=1, keepdims=True)\n\n    # 리샘플링 — 시작 상태는 원본과 동일\n    new_state_seq = [state_seq[0]]\n    for t in range(1, T):\n        current = new_state_seq[-1]\n        probs = trans[current]\n        next_state = rng.choice(n_states, p=probs)\n        new_state_seq.append(next_state)\n\n    # 상태 → 행 복원\n    reordered = np.array([unique_patterns[s] for s in new_state_seq])\n\n    # 통계: 원본과 리샘플의 상태 분포 비교\n    from collections import Counter\n    orig_dist = Counter(state_seq)\n    new_dist = Counter(new_state_seq)\n\n    info = {\n        'strategy': 'markov_resample',\n        'n_unique_patterns': n_states,\n        'temperature': temperature,\n        'orig_state_dist': dict(orig_dist),\n        'new_state_dist': dict(new_dist),\n    }\n    return reordered, info\n", "line_count": 220, "functions": [{"name": "reorder_overlap_matrix", "qual": "reorder_overlap_matrix", "class": "", "lineno": 16, "end_lineno": 42, "doc_short": "중첩행렬의 시간축을 재배치한다.", "description": "중첩행렬의 시간축을 재배치한다.", "params": [{"name": "overlap", "type": "np.ndarray", "default": "", "desc": "(T, C) numpy 배열 (이진 또는 연속값)"}, {"name": "strategy", "type": "str", "default": "'segment_shuffle'", "desc": "'segment_shuffle' | 'block_permute' | 'markov_resample'"}, {"name": "seed", "type": "int", "default": "42", "desc": "랜덤 시드 **kwargs: 전략별 추가 파라미터"}], "return_type": "Tuple[np.ndarray, Dict[str, Any]]", "returns_desc": "reordered: (T, C) 재배치된 행렬 info: 전략 정보 및 통계", "recently_modified": true}, {"name": "_segment_shuffle", "qual": "_segment_shuffle", "class": "", "lineno": 47, "end_lineno": 112, "doc_short": "동일한 활성화 패턴이 연속되는 구간(segment)을 식별하고,", "description": "동일한 활성화 패턴이 연속되는 구간(segment)을 식별하고,\nsegment 단위로 순서를 셔플한다.\n예: [A,A,A,B,B,C,C,C,C] → [C,C,C,C,A,A,A,B,B]\n각 segment 내부 순서는 보존되므로 국소적 연결성 유지.", "params": [{"name": "overlap", "type": "np.ndarray", "default": "", "desc": ""}, {"name": "rng", "type": "np.random.RandomState", "default": "", "desc": ""}, {"name": "min_segment_len", "type": "int", "default": "1", "desc": ""}], "return_type": "Tuple[np.ndarray, Dict[str, Any]]", "returns_desc": "", "recently_modified": true}, {"name": "_block_permute", "qual": "_block_permute", "class": "", "lineno": 117, "end_lineno": 153, "doc_short": "고정 길이 블록(예: 32 timestep = 4마디) 단위로 셔플.", "description": "고정 길이 블록(예: 32 timestep = 4마디) 단위로 셔플.\n블록 내부 순서는 보존.\nblock_size=32 → 8분음표 기준 4마디 (32 × 0.5beat = 16beat = 4bar)", "params": [{"name": "overlap", "type": "np.ndarray", "default": "", "desc": ""}, {"name": "rng", "type": "np.random.RandomState", "default": "", "desc": ""}, {"name": "block_size", "type": "int", "default": "32", "desc": ""}], "return_type": "Tuple[np.ndarray, Dict[str, Any]]", "returns_desc": "", "recently_modified": true}, {"name": "_markov_resample", "qual": "_markov_resample", "class": "", "lineno": 158, "end_lineno": 220, "doc_short": "원본 중첩행렬의 행 전이확률(1차 Markov)을 학습한 뒤,", "description": "원본 중첩행렬의 행 전이확률(1차 Markov)을 학습한 뒤,\n같은 길이의 새로운 시퀀스를 리샘플링한다.\ntemperature: 1.0 = 원본 전이확률 그대로\n>1.0 = 더 랜덤 (탐험적)\n<1.0 = 더 결정론적 (원본에 가까움)", "params": [{"name": "overlap", "type": "np.ndarray", "default": "", "desc": ""}, {"name": "rng", "type": "np.random.RandomState", "default": "", "desc": ""}, {"name": "temperature", "type": "float", "default": "1.0", "desc": ""}], "return_type": "Tuple[np.ndarray, Dict[str, Any]]", "returns_desc": "", "recently_modified": true}]}, "generation": {"name": "generation", "filename": "generation.py", "exists": true, "source": "\"\"\"\nTDA Music Pipeline - Music Generation (최적화)\n================================================\nAlgorithm 1 (확률적 샘플링)과 Algorithm 2 (신경망) 구현.\n\n주요 최적화:\n1. Algorithm 1:\n   - node_pool을 numpy 배열로 관리하여 random.choice 가속\n   - onset_checker를 set 기반으로 변경하여 O(1) 멤버십 검사\n   - inst_len 동적 갱신 버그 수정 (range를 while로 교체)\n   - max_resample_attempts 도입으로 무한 루프 방지\n   - node_intersect/union을 캐싱하여 반복 계산 제거\n\n2. Algorithm 2:\n   - 두 악기의 indexed_music을 시간축 기준으로 정렬\n   - 배치 학습 도입 (메모리 효율)\n   - 모델 구조 간소화\n\"\"\"\n\nimport numpy as np\nimport pandas as pd\nimport random\nimport math\nimport os\nimport datetime\nfrom collections import Counter\nfrom typing import Dict, List, Tuple, Optional, Set\n\ntry:\n    import torch\n    import torch.nn as nn\n    import torch.nn.functional as F\n    from torch.utils.data import Dataset, DataLoader\n    HAS_TORCH = True\nexcept ImportError:\n    HAS_TORCH = False\n\n\n# ═══════════════════════════════════════════════════════════════════════════\n# Algorithm 1: 확률적 샘플링 기반 음악 생성\n# ═══════════════════════════════════════════════════════════════════════════\n\nclass NodePool:\n    \"\"\"\n    노드 풀 관리 클래스.\n    기존 코드의 node_pool, node_freq, node_i를 캡슐화합니다.\n\n    temperature: §7.7.3 온도 스케일링. w(n) ∝ freq(n)^(1/T).\n      T=1.0: 원래 빈도 (기존 동작)\n      T=3.0: 균등화 방향 (N=10 최적, JS -6.7%)\n      T<1.0: 고빈도 집중\n    \"\"\"\n\n    def __init__(self, notes_label: dict, notes_counts: Counter,\n                 num_modules: int = 65, temperature: float = 1.0):\n        self.notes_label = notes_label\n        self.label_to_note = {v: k for k, v in notes_label.items()}  # 역매핑\n\n        # 전체 곡에서의 빈도 계산\n        whole_counts = {k: v * num_modules for k, v in notes_counts.items()}\n\n        # 온도 스케일링: count → round(count^(1/T)), 최소 1\n        if abs(temperature - 1.0) > 1e-9:\n            whole_counts = {\n                k: max(1, round(v ** (1.0 / temperature)))\n                for k, v in whole_counts.items()\n            }\n\n        # 빈도 기반 노드 풀 생성 (numpy 배열)\n        pool_list = []\n        for note, count in whole_counts.items():\n            if note in notes_label:\n                label = notes_label[note]\n                pool_list.extend([label] * count)\n\n        # 셔플\n        random.shuffle(pool_list)\n        self.pool = np.array(pool_list, dtype=int)\n        self.total_size = len(self.pool)\n    \n    def sample(self) -> int:\n        \"\"\"풀에서 무작위 note label을 샘플링합니다.\"\"\"\n        return int(np.random.choice(self.pool))\n    \n    def label_to_note_info(self, label: int) -> Tuple[int, int]:\n        \"\"\"label → (pitch, duration) 변환\"\"\"\n        # notes_label은 1-indexed이므로 label+1이 아닌 label 자체 사용\n        # 기존 코드의 get_note_by_label과 동일\n        for note, lbl in self.notes_label.items():\n            if lbl == label + 1:  # 0-indexed label → 1-indexed notes_label\n                return note\n        return None\n\n\nclass CycleSetManager:\n    \"\"\"\n    사이클 집합 연산을 캐싱하여 중복 계산을 제거합니다.\n    \"\"\"\n    \n    def __init__(self, cycle_labeled: dict):\n        self.all_cycle_sets = [set(cycle) for cycle in cycle_labeled.values()]\n        self._cache_intersect = {}\n        self._cache_union = {}\n    \n    def get_intersect_nodes(self, active_mask: np.ndarray) -> Optional[tuple]:\n        \"\"\"\n        활성화된 사이클들의 교집합에서 빈도 기반 샘플링 풀을 반환합니다.\n        \n        최적화: 캐시 키로 active_mask의 tuple 사용\n        \"\"\"\n        key = tuple(active_mask.nonzero()[0])\n        if not key:\n            return None\n        \n        if key not in self._cache_intersect:\n            # 활성 사이클의 모든 원소를 빈도 기반으로 수집\n            freq = Counter()\n            for idx in key:\n                for elem in self.all_cycle_sets[idx]:\n                    freq[elem] += 1\n            \n            # 빈도만큼 반복하여 튜플로\n            result = []\n            for elem, count in freq.items():\n                result.extend([elem] * count)\n            \n            self._cache_intersect[key] = tuple(result) if result else None\n        \n        return self._cache_intersect[key]\n    \n    def get_union_nodes(self, active_mask: np.ndarray) -> Optional[set]:\n        \"\"\"활성화된 사이클들의 합집합을 반환합니다.\"\"\"\n        key = tuple(active_mask.nonzero()[0])\n        if not key:\n            return None\n        \n        if key not in self._cache_union:\n            union = set()\n            for idx in key:\n                union |= self.all_cycle_sets[idx]\n            self._cache_union[key] = union\n        \n        return self._cache_union[key]\n\n\ndef build_orphan_supplement(orphan_notes: Set[int],\n                            orphan_chords: Dict[int, List[int]],\n                            notes_dict: dict,\n                            adn_whole_1: list,\n                            adn_whole_2: list,\n                            notes_label: dict,\n                            total_length: int = 1088) -> Dict[int, List[int]]:\n    \"\"\"\n    고아 note를 chord 활성화 시점에 보충하는 매핑을 생성합니다.\n\n    cycle에 속하지 않는 note(고아)가 원곡에서 실제로 연주되는 시점을\n    찾아서, 해당 시점의 sampling pool에 추가할 note label 목록을 반환.\n\n    Args:\n        orphan_notes: {5, 8, 22} 등 고아 note (1-indexed)\n        orphan_chords: {note: [chord_indices]} 매핑\n        notes_dict: {chord_idx: set of note labels}\n        adn_whole_1, adn_whole_2: 악기별 전체 chord 시퀀스 (None 포함)\n        notes_label: (pitch, dur) -> label dict\n        total_length: 시간축 길이\n\n    Returns:\n        {t: [label1, label2, ...]} — 시점 t에서 보충할 note label 목록\n    \"\"\"\n    # 고아 note가 속한 chord 인덱스 집합\n    orphan_chord_set = set()\n    for n, chords in orphan_chords.items():\n        orphan_chord_set.update(chords)\n\n    # label -> note_label (1-indexed) 역매핑\n    # orphan note의 label 값 (0-indexed for node_pool)\n    orphan_labels = {n - 1 for n in orphan_notes}  # 0-indexed\n\n    supplement: Dict[int, List[int]] = {}\n\n    for t in range(min(total_length, len(adn_whole_1), len(adn_whole_2))):\n        c1 = adn_whole_1[t]\n        c2 = adn_whole_2[t]\n        labels_to_add = []\n\n        for chord_idx in [c1, c2]:\n            if chord_idx is None:\n                continue\n            if chord_idx in orphan_chord_set:\n                # 이 chord에 속한 고아 note를 추가\n                chord_notes = notes_dict.get(chord_idx, set())\n                for n in chord_notes:\n                    if n in orphan_notes:\n                        labels_to_add.append(n - 1)  # 0-indexed label\n\n        if labels_to_add:\n            supplement[t] = labels_to_add\n\n    return supplement\n\n\ndef algorithm1_optimized(node_pool: NodePool,\n                         inst_len: List[int],\n                         overlap_matrix: np.ndarray,\n                         cycle_manager: CycleSetManager,\n                         max_resample: int = 50,\n                         verbose: bool = False,\n                         orphan_supplement: Optional[Dict[int, List[int]]] = None,\n                         min_onset_gap: int = 0\n                         ) -> List[Tuple[int, int, int]]:\n    \"\"\"\n    Algorithm 1의 최적화 버전.\n    \n    핵심 수정사항:\n    1. inst_len 동적 갱신 시 range 대신 while 사용\n    2. onset_checker를 set으로 변경 (O(1) 검색)\n    3. 경계 조건 (n1[2] >= length) 일관적 처리\n    4. max_resample로 무한 루프 방지\n    \n    Args:\n        node_pool: NodePool 객체\n        inst_len: 각 시점별 추출할 음의 개수 리스트 (복사본 사용 권장)\n        overlap_matrix: (T, C) numpy 배열\n        cycle_manager: CycleSetManager 객체\n        max_resample: 재샘플링 최대 시도 횟수\n        verbose: 디버그 출력 여부\n    \n    Returns:\n        생성된 음표 리스트 [(start, pitch, end), ...]\n    \"\"\"\n    length = len(inst_len)\n    inst_len = list(inst_len)  # 방어적 복사\n\n    generated = []\n    onset_checker: Dict[int, Set[Tuple[int, int]]] = {i: set() for i in range(length)}\n    resample_count = 0\n    last_onset_time = -min_onset_gap  # onset gap 추적 (첫 시점은 항상 허용)\n\n    for j in range(length):\n        # ── onset 간격 제약 ──\n        # min_onset_gap > 0이면 이전 onset으로부터 최소 gap만큼 간격을 둠\n        # 예: min_onset_gap=3이면 \"3 eighth notes = 1.5박\" 동안 새 타건 없음\n        if min_onset_gap > 0 and (j - last_onset_time) < min_onset_gap:\n            continue  # 이 시점 건너뜀 (이전 note가 아직 sustain 중)\n\n        # 이 시점에서 추출할 음의 수 (동적으로 줄어들 수 있음)\n        num_to_sample = max(0, inst_len[j])\n\n        # 고아 note 보충: 이 시점에 chord 기반으로 추가할 note가 있으면\n        # 일정 확률로 고아 note를 먼저 배치\n        if orphan_supplement and j in orphan_supplement and num_to_sample > 0:\n            for orphan_label in orphan_supplement[j]:\n                if num_to_sample <= 0:\n                    break\n                # 30% 확률로 고아 note 삽입 (너무 많으면 부자연스러움)\n                if random.random() < 0.3:\n                    note_tuple = node_pool.label_to_note_info(orphan_label)\n                    if note_tuple:\n                        pitch, duration = note_tuple\n                        end = min(j + duration, length)\n                        n1 = (j, pitch, end)\n                        n2 = (pitch, end - j)\n                        if n2 not in onset_checker[j]:\n                            generated.append(n1)\n                            onset_checker[j].add(n2)\n                            for t in range(j + 1, min(end, length)):\n                                inst_len[t] = max(0, inst_len[t] - 1)\n                                onset_checker[t].add(n2)\n                            num_to_sample -= 1\n\n        for _ in range(num_to_sample):\n            flag = overlap_matrix[j, :].sum()\n\n            note_info = _sample_note_at_time(\n                j, length, flag, overlap_matrix,\n                node_pool, cycle_manager, onset_checker,\n                max_resample, verbose\n            )\n            \n            if note_info is None:\n                resample_count += 1\n                continue\n            \n            n1, n2 = note_info\n            generated.append(n1)\n            onset_checker[j].add(n2)\n            last_onset_time = j  # onset gap 추적 갱신\n\n            # 활성화 구간에서 inst_len 감소\n            for t in range(j + 1, min(n1[2], length)):\n                inst_len[t] = max(0, inst_len[t] - 1)\n                onset_checker[t].add(n2)\n    \n    if verbose:\n        print(f\"총 {resample_count}번 재샘플링 실패\")\n    \n    return generated\n\n\ndef _sample_note_at_time(j: int, length: int, flag: float,\n                         overlap_matrix: np.ndarray,\n                         node_pool: NodePool,\n                         cycle_manager: CycleSetManager,\n                         onset_checker: dict,\n                         max_resample: int,\n                         verbose: bool) -> Optional[Tuple[tuple, tuple]]:\n    \"\"\"\n    단일 시점 j에서 하나의 note를 샘플링합니다.\n    \n    Returns:\n        (n1, n2) where n1 = (onset, pitch, end), n2 = (pitch, duration)\n        또는 실패 시 None\n    \"\"\"\n    for attempt in range(max_resample):\n        if flag == 0:\n            # 사이클 활성화 없음 → 인접 시점의 union을 피해서 샘플링\n            z = _sample_avoiding_neighbors(\n                j, length, overlap_matrix, node_pool, cycle_manager\n            )\n        else:\n            # 사이클 활성화 있음 → 교집합에서 샘플링\n            intersect_pool = cycle_manager.get_intersect_nodes(overlap_matrix[j, :])\n            if intersect_pool is None:\n                z = node_pool.sample()\n            else:\n                z = random.choice(intersect_pool)\n        \n        note_tuple = node_pool.label_to_note_info(z)\n        if note_tuple is None:\n            continue\n        \n        pitch, duration = note_tuple\n        n1 = (j, pitch, j + duration)\n        n2 = (pitch, duration)\n        \n        # 유효성 검사\n        if n1[2] > length:\n            # 곡의 끝을 넘어감 → duration 조정 시도\n            if j + 1 <= length:\n                n1 = (j, pitch, length)\n                n2 = (pitch, length - j)\n            else:\n                continue\n        \n        if n2 in onset_checker[j]:\n            if verbose and attempt > 5:\n                print(f\"  시점 {j}: {n2} 이미 존재, 재샘플링 ({attempt+1}/{max_resample})\")\n            continue\n        \n        return n1, n2\n    \n    return None\n\n\ndef _sample_avoiding_neighbors(j: int, length: int,\n                               overlap_matrix: np.ndarray,\n                               node_pool: NodePool,\n                               cycle_manager: CycleSetManager) -> int:\n    \"\"\"인접 시점의 활성 사이클 노드를 피해서 샘플링합니다.\"\"\"\n    avoid = set()\n    \n    if j > 0 and overlap_matrix[j - 1, :].sum() > 0:\n        union_prev = cycle_manager.get_union_nodes(overlap_matrix[j - 1, :])\n        if union_prev:\n            avoid |= union_prev\n    \n    if j < length - 1 and overlap_matrix[j + 1, :].sum() > 0:\n        union_next = cycle_manager.get_union_nodes(overlap_matrix[j + 1, :])\n        if union_next:\n            avoid |= union_next\n    \n    if not avoid:\n        return node_pool.sample()\n    \n    # avoid에 없는 노드가 나올 때까지 샘플링 (최대 20회)\n    for _ in range(20):\n        z = node_pool.sample()\n        if z not in avoid:\n            return z\n    \n    return node_pool.sample()  # 포기하고 아무거나 반환\n\n\n# ═══════════════════════════════════════════════════════════════════════════\n# Algorithm 2: 신경망 기반 음악 생성 (수정판)\n# ═══════════════════════════════════════════════════════════════════════════\n#\n# [수정] L_encoded(7670) vs L_onehot(1088) 불일치 해결\n#   원인: 기존 코드가 sliding window로 y를 (T-1, T*N) 형태로 펼쳐서\n#         시점과 note 차원이 혼합됨\n#   수정: 시점 t의 overlap → 시점 t의 multi-hot note를 직접 매핑\n#         X: (T, C), y: (T, N) — 동일한 시간축\n#\n# [추가] Baseline DL 모델\n#   - MusicGeneratorFC: 기존 FC 구조 (수정판)\n#   - MusicGeneratorLSTM: 시계열 패턴 학습\n#   - MusicGeneratorTransformer: self-attention 기반\n\nif HAS_TORCH:\n\n    # ── 학습 데이터 준비 ──────────────────────────────────────────────────\n\n    def build_onehot_matrix(music_notes: List[List[Tuple[int, int, int]]],\n                            notes_label: dict,\n                            sequence_length: int,\n                            num_notes: int = 23) -> np.ndarray:\n        \"\"\"\n        두 악기의 note를 시간축 기준으로 multi-hot 행렬로 변환합니다.\n        각 시점 t에서 활성화된 note를 1로 표시.\n\n        [수정] 기존 indexed_music의 두 악기 concat 문제 해결:\n        두 악기를 별도 리스트로 받아 같은 시간축에 겹쳐 기록.\n\n        Args:\n            music_notes: [inst1_notes, inst2_notes], 각 note는 (start, pitch, end)\n            notes_label: (pitch, duration) → label (1-indexed)\n            sequence_length: 시간축 길이 T (= 1088)\n            num_notes: 고유 note 수 (= 23)\n\n        Returns:\n            (T, N) multi-hot 행렬. onehot[t, n] = 1이면 시점 t에 note n이 활성.\n        \"\"\"\n        onehot = np.zeros((sequence_length, num_notes), dtype=np.float32)\n\n        for inst_notes in music_notes:\n            for start, pitch, end in inst_notes:\n                duration = end - start\n                key = (pitch, duration)\n                if key in notes_label:\n                    label = notes_label[key] - 1  # 1-indexed → 0-indexed\n                    if 0 <= start < sequence_length and 0 <= label < num_notes:\n                        onehot[start, label] = 1.0\n\n        return onehot\n\n    def prepare_training_data(overlap_matrix: np.ndarray,\n                              music_notes: List[List[Tuple[int, int, int]]],\n                              notes_label: dict,\n                              sequence_length: int,\n                              num_notes: int = 23) -> Tuple[np.ndarray, np.ndarray]:\n        \"\"\"\n        학습 데이터를 준비합니다.\n\n        [수정] X와 y가 동일한 시간축을 공유:\n          X[t] = overlap_matrix[t]  (C차원, 어떤 cycle이 활성인지)\n          y[t] = onehot[t]         (N차원, 어떤 note가 활성인지)\n\n        모델이 학습할 매핑: \"시점 t의 위상 구조 → 시점 t의 음악\"\n\n        Returns:\n            X: (T, C) float32, y: (T, N) float32\n        \"\"\"\n        onehot = build_onehot_matrix(\n            music_notes, notes_label, sequence_length, num_notes\n        )\n\n        X = overlap_matrix.astype(np.float32)  # (T, C)\n        y = onehot                               # (T, N)\n\n        return X, y\n\n    # ── Data Augmentation ─────────────────────────────────────────────────\n\n    def augment_training_data(X: np.ndarray, y: np.ndarray,\n                              overlap_full: np.ndarray,\n                              cycle_labeled: dict,\n                              k_values: List[int] = [10, 15, 20, 30],\n                              n_shifts: int = 3,\n                              noise_prob: float = 0.03,\n                              n_noise_copies: int = 2) -> Tuple[np.ndarray, np.ndarray]:\n        \"\"\"\n        3가지 전략으로 학습 데이터를 증강합니다.\n\n        1) Subset Augmentation:\n           cycle_selector로 다양한 K값의 overlap을 생성.\n           동일한 y(원곡)에 대해 다른 X(위상 구조)를 학습 →\n           \"불완전한 위상 정보에서도 원곡을 복원\"하는 강건한 모델.\n\n        2) Circular Shift:\n           시작점을 랜덤 이동하여 시퀀스를 회전.\n           [A B C D] → [C D A B]. 같은 패턴이지만 모델이\n           다른 시퀀스로 인식 → 위치 편향 방지.\n\n        3) Noise Injection:\n           overlap에 소량의 bit flip을 추가.\n           입력에 노이즈가 있어도 올바른 note를 예측하도록 학습 →\n           overfitting 방지 + 정규화 효과.\n\n        Args:\n            X: (T, C) 원본 overlap (전체 cycle)\n            y: (T, N) 원본 note multi-hot\n            overlap_full: (T, C_full) cycle selection 이전의 전체 overlap\n            cycle_labeled: 전체 cycle labeled dict\n            k_values: subset augmentation에 사용할 K 리스트\n            n_shifts: circular shift 횟수\n            noise_prob: noise injection에서 bit flip 확률\n            n_noise_copies: noise 복사본 수\n\n        Returns:\n            (X_aug, y_aug): 증강된 학습 데이터\n        \"\"\"\n        from cycle_selector import CycleSubsetSelector\n\n        T, C = X.shape\n        N = y.shape[1]\n\n        all_X = [X]     # 원본 포함\n        all_y = [y]\n\n        # ── 1) Subset Augmentation ──\n        # 다양한 K값의 overlap matrix를 생성하여 같은 y에 매핑\n        selector = CycleSubsetSelector(overlap_full, cycle_labeled)\n        for k in k_values:\n            if k >= overlap_full.shape[1]:\n                continue\n            result = selector.select_fixed_size(k, verbose=False)\n            X_sub = overlap_full[:, result.selected_indices].astype(np.float32)\n            # C가 다르므로 전체 C 크기로 zero-padding\n            X_padded = np.zeros((T, C), dtype=np.float32)\n            X_padded[:, :X_sub.shape[1]] = X_sub\n            all_X.append(X_padded)\n            all_y.append(y.copy())\n\n        # ── 2) Circular Shift ──\n        # 시작점을 랜덤으로 이동하여 시퀀스 회전\n        for _ in range(n_shifts):\n            shift = np.random.randint(1, T)\n            X_shifted = np.roll(X, shift, axis=0)\n            y_shifted = np.roll(y, shift, axis=0)\n            all_X.append(X_shifted)\n            all_y.append(y_shifted)\n\n        # ── 3) Noise Injection ──\n        # overlap에 소량의 bit flip 추가\n        for _ in range(n_noise_copies):\n            noise_mask = np.random.random(X.shape) < noise_prob\n            X_noisy = X.copy()\n            X_noisy[noise_mask] = 1.0 - X_noisy[noise_mask]  # 0→1 또는 1→0\n            all_X.append(X_noisy.astype(np.float32))\n            all_y.append(y.copy())\n\n        X_aug = np.concatenate(all_X, axis=0)\n        y_aug = np.concatenate(all_y, axis=0)\n\n        return X_aug, y_aug\n\n    # ── 모델 1: FC (기존 구조 수정판) ─────────────────────────────────────\n\n    class MusicGeneratorFC(nn.Module):\n        \"\"\"\n        Fully Connected 모델 (기존 MusicGenerator 수정판).\n        시점별 독립 예측: overlap[t] → notes[t]\n\n        입력: (batch, C)  — C = cycle 수\n        출력: (batch, N)  — N = note 수 (multi-label sigmoid)\n        \"\"\"\n\n        def __init__(self, num_cycles: int, num_notes: int,\n                     hidden_dim: int = 128, dropout: float = 0.3):\n            super().__init__()\n            self.net = nn.Sequential(\n                nn.Linear(num_cycles, hidden_dim),\n                nn.ReLU(),\n                nn.Dropout(dropout),\n                nn.Linear(hidden_dim, hidden_dim * 2),\n                nn.ReLU(),\n                nn.Dropout(dropout),\n                nn.Linear(hidden_dim * 2, num_notes),\n            )\n\n        def forward(self, x):\n            return self.net(x)  # (batch, N) — raw logits\n\n    # ── 모델 2: LSTM ─────────────────────────────────────────────────────\n\n    class MusicGeneratorLSTM(nn.Module):\n        \"\"\"\n        LSTM 기반 시퀀스 모델.\n        overlap 시퀀스의 시간적 패턴을 학습하여 note 시퀀스를 예측.\n\n        입력: (batch, T, C)  — T 시점의 overlap 시퀀스\n        출력: (batch, T, N)  — T 시점의 note 예측\n        \"\"\"\n\n        def __init__(self, num_cycles: int, num_notes: int,\n                     hidden_dim: int = 128, num_layers: int = 2,\n                     dropout: float = 0.3):\n            super().__init__()\n            self.lstm = nn.LSTM(\n                input_size=num_cycles,\n                hidden_size=hidden_dim,\n                num_layers=num_layers,\n                batch_first=True,\n                dropout=dropout if num_layers > 1 else 0.0,\n            )\n            self.fc = nn.Linear(hidden_dim, num_notes)\n\n        def forward(self, x):\n            # x: (batch, T, C)\n            out, _ = self.lstm(x)     # (batch, T, hidden)\n            return self.fc(out)       # (batch, T, N)\n\n    # ── 모델 3: Transformer ──────────────────────────────────────────────\n\n    class MusicGeneratorTransformer(nn.Module):\n        \"\"\"\n        Transformer 기반 시퀀스 모델.\n        Self-attention으로 전체 시점 간 관계를 학습.\n\n        입력: (batch, T, C)\n        출력: (batch, T, N)\n        \"\"\"\n\n        def __init__(self, num_cycles: int, num_notes: int,\n                     d_model: int = 128, nhead: int = 4,\n                     num_layers: int = 2, dropout: float = 0.1,\n                     max_len: int = 1088, use_pos_emb: bool = True):\n            super().__init__()\n            self.input_proj = nn.Linear(num_cycles, d_model)\n            self.use_pos_emb = use_pos_emb\n\n            # 학습 가능한 positional encoding\n            self.pos_emb = nn.Parameter(torch.randn(1, max_len, d_model) * 0.02)\n\n            encoder_layer = nn.TransformerEncoderLayer(\n                d_model=d_model, nhead=nhead,\n                dim_feedforward=d_model * 4,\n                dropout=dropout, batch_first=True\n            )\n            self.transformer = nn.TransformerEncoder(\n                encoder_layer, num_layers=num_layers\n            )\n            self.fc_out = nn.Linear(d_model, num_notes)\n\n        def forward(self, x):\n            # x: (batch, T, C)\n            T = x.size(1)\n            x = self.input_proj(x)\n            if self.use_pos_emb:\n                x = x + self.pos_emb[:, :T, :]\n            x = self.transformer(x)                            # (batch, T, d_model)\n            return self.fc_out(x)                              # (batch, T, N)\n\n    # ── 학습 함수 ─────────────────────────────────────────────────────────\n\n    def train_model(model: nn.Module,\n                    X_train: np.ndarray, y_train: np.ndarray,\n                    X_valid: np.ndarray, y_valid: np.ndarray,\n                    epochs: int = 100, lr: float = 0.001,\n                    batch_size: int = 32,\n                    model_type: str = 'fc',\n                    seq_len: int = 1088,\n                    epoch_callback=None) -> List[dict]:\n        \"\"\"\n        모델을 학습합니다.\n\n        BCEWithLogitsLoss 사용 (multi-label 문제):\n        각 시점에서 여러 note가 동시에 활성화될 수 있으므로\n        CrossEntropy(단일 클래스) 대신 BCE(다중 레이블) 사용.\n\n        Args:\n            model_type: 'fc' | 'lstm' | 'transformer'\n                fc: 시점별 독립 미니배치 학습\n                lstm/transformer: seq_len 단위로 시퀀스를 잘라서 배치 학습\n            seq_len: 시퀀스 모델에서 한 시퀀스의 길이 (기본 1088)\n        \"\"\"\n        criterion = nn.BCEWithLogitsLoss()\n        optimizer = torch.optim.Adam(model.parameters(), lr=lr)\n\n        is_seq = model_type in ('lstm', 'transformer')\n\n        # 데이터를 텐서로 변환\n        X_tr_all = torch.from_numpy(X_train)\n        y_tr_all = torch.from_numpy(y_train)\n        X_va_all = torch.from_numpy(X_valid)\n        y_va_all = torch.from_numpy(y_valid)\n\n        history = []\n\n        for epoch in range(epochs):\n            model.train()\n\n            if is_seq:\n                # 시퀀스 모델: seq_len 단위로 잘라서 배치 구성\n                # augmented 데이터는 [seq1 | seq2 | ...] 형태로 concat되어 있음\n                # → seq_len 단위로 잘라서 (n_seqs, seq_len, C) 배치 구성\n                n_total = len(X_tr_all)\n                n_seqs = n_total // seq_len\n                if n_seqs == 0:\n                    n_seqs = 1\n                    actual_len = n_total\n                else:\n                    actual_len = seq_len\n\n                X_seqs = X_tr_all[:n_seqs * actual_len].view(n_seqs, actual_len, -1)\n                y_seqs = y_tr_all[:n_seqs * actual_len].view(n_seqs, actual_len, -1)\n\n                # 배치 단위 학습\n                seq_indices = torch.randperm(n_seqs)\n                total_loss = 0.0\n                n_batches = 0\n                for s in range(0, n_seqs, max(1, batch_size // actual_len)):\n                    e = min(s + max(1, batch_size // actual_len), n_seqs)\n                    idx = seq_indices[s:e]\n                    pred = model(X_seqs[idx])       # (batch, seq_len, N)\n                    loss_b = criterion(pred, y_seqs[idx])\n                    optimizer.zero_grad()\n                    loss_b.backward()\n                    optimizer.step()\n                    total_loss += loss_b.item()\n                    n_batches += 1\n                avg_loss = total_loss / max(n_batches, 1)\n            else:\n                # FC 모델: 시점별 미니배치\n                n = len(X_tr_all)\n                indices = torch.randperm(n)\n                total_loss = 0.0\n                n_batches = 0\n                for s in range(0, n, batch_size):\n                    e = min(s + batch_size, n)\n                    idx = indices[s:e]\n                    pred = model(X_tr_all[idx])\n                    loss_b = criterion(pred, y_tr_all[idx])\n                    optimizer.zero_grad()\n                    loss_b.backward()\n                    optimizer.step()\n                    total_loss += loss_b.item()\n                    n_batches += 1\n                avg_loss = total_loss / max(n_batches, 1)\n\n            # ── Validation ──\n            model.eval()\n            with torch.no_grad():\n                if is_seq:\n                    n_va = len(X_va_all)\n                    n_va_seqs = max(1, n_va // seq_len)\n                    va_len = min(seq_len, n_va)\n                    X_va_seq = X_va_all[:n_va_seqs * va_len].view(n_va_seqs, va_len, -1)\n                    y_va_seq = y_va_all[:n_va_seqs * va_len].view(n_va_seqs, va_len, -1)\n                    val_pred = model(X_va_seq)\n                    val_loss = criterion(val_pred, y_va_seq).item()\n                else:\n                    val_pred = model(X_va_all)\n                    val_loss = criterion(val_pred, y_va_all).item()\n\n            history.append({\n                'epoch': epoch,\n                'train_loss': avg_loss,\n                'val_loss': val_loss\n            })\n\n            if epoch % 20 == 0 or epoch == epochs - 1:\n                print(f\"  [Epoch {epoch:3d}] train={avg_loss:.5f}  val={val_loss:.5f}\")\n\n            # 대시보드 등에서 epoch별 진행도 표시용 콜백\n            if epoch_callback is not None:\n                epoch_callback(epoch, epochs, avg_loss, val_loss)\n\n        return history\n\n    # ── 생성 함수 ─────────────────────────────────────────────────────────\n\n    def generate_from_model(model: nn.Module,\n                            overlap_matrix: np.ndarray,\n                            notes_label: dict,\n                            model_type: str = 'fc',\n                            threshold: float = 0.5,\n                            adaptive_threshold: bool = True,\n                            min_onset_gap: int = 0) -> List[Tuple[int, int, int]]:\n        \"\"\"\n        학습된 모델로 음악을 생성합니다.\n\n        모델이 각 시점에서 sigmoid > threshold인 note를 활성화로 판정.\n        활성화된 note label → (pitch, duration) → (onset, pitch, onset+duration) 변환.\n\n        adaptive_threshold=True이면 모델 출력의 분포를 보고\n        threshold를 자동 조정합니다. LSTM처럼 sigmoid 값이\n        전체적으로 낮은 모델에서 0개 생성을 방지.\n\n        Args:\n            threshold: sigmoid 임계값 (adaptive=False일 때 사용)\n            adaptive_threshold: True면 y의 ON ratio에 맞춰 threshold 자동 결정\n\n        Returns:\n            [(start, pitch, end), ...] 음표 리스트\n        \"\"\"\n        model.eval()\n        # label → (pitch, duration) 역매핑\n        label_to_note = {v - 1: k for k, v in notes_label.items()}  # 0-indexed\n\n        X = torch.from_numpy(overlap_matrix.astype(np.float32))\n        if model_type in ('lstm', 'transformer'):\n            X = X.unsqueeze(0)  # (1, T, C)\n\n        with torch.no_grad():\n            logits = model(X)  # FC: (T, N), seq: (1, T, N)\n            if model_type in ('lstm', 'transformer'):\n                logits = logits.squeeze(0)  # (T, N)\n            probs = torch.sigmoid(logits)   # (T, N)\n\n        T_out, N_out = probs.shape\n\n        # Adaptive threshold: 원곡의 ON ratio(~15%)에 맞춰 threshold 자동 결정\n        # 상위 15%의 확률값을 기준점으로 사용\n        if adaptive_threshold:\n            target_on_ratio = 0.15  # 원곡의 대략적 ON ratio\n            k = max(1, int(T_out * N_out * target_on_ratio))\n            flat = probs.flatten()\n            topk_val = torch.topk(flat, k).values[-1].item()\n            threshold = max(topk_val, 0.1)  # 최소 0.1\n\n        generated = []\n        last_onset = -min_onset_gap  # onset gap 추적\n\n        for t in range(T_out):\n            # onset gap 제약: 이전 onset으로부터 min_onset_gap 미만이면 건너뜀\n            if min_onset_gap > 0 and (t - last_onset) < min_onset_gap:\n                continue\n\n            onset_at_t = False\n            for n in range(N_out):\n                if probs[t, n] >= threshold:\n                    if n in label_to_note:\n                        pitch, duration = label_to_note[n]\n                        generated.append((t, pitch, t + duration))\n                        onset_at_t = True\n\n            if onset_at_t:\n                last_onset = t\n\n        return generated\n\n    # ── 기존 호환용 별칭 ──────────────────────────────────────────────────\n\n    # 기존 pipeline.py에서 참조하는 이름 유지\n    MusicGenerator = MusicGeneratorFC\n\n\n# ═══════════════════════════════════════════════════════════════════════════\n# Music XML 출력\n# ═══════════════════════════════════════════════════════════════════════════\n\ndef notes_to_xml(notes_list: List[List[Tuple[int, int, int]]],\n                 tempo_bpm: int = 66,\n                 file_name: str = \"generated\",\n                 output_dir: str = \"./output\"):\n    \"\"\"\n    생성된 음표를 MusicXML로 저장합니다.\n    process.py의 notes_to_score_xml 간소화 버전.\n    \"\"\"\n    try:\n        from music21 import stream, note, tempo, chord, clef, meter, instrument\n    except ImportError:\n        print(\"music21이 설치되어 있지 않습니다.\")\n        return None\n    \n    s = stream.Score()\n    \n    for inst_idx, inst_notes in enumerate(notes_list):\n        if not inst_notes:\n            continue\n        \n        p = stream.Part()\n        p.id = f\"Instrument {inst_idx + 1}\"\n        p.insert(0, instrument.Instrument(instrumentNumber=inst_idx + 1))\n        p.insert(0, meter.TimeSignature('4/4'))\n        p.insert(0, clef.TrebleClef())\n        p.insert(0, tempo.MetronomeMark(number=tempo_bpm))\n        \n        # 시작 시간별 그룹화\n        by_start = {}\n        for start, pitch, end in inst_notes:\n            by_start.setdefault(start, []).append((pitch, end))\n        \n        start_offset = inst_notes[0][0] if inst_notes else 0\n        max_end = max(e for _, _, e in inst_notes)\n        \n        for t in range(max_end):\n            # 활성화 여부 확인\n            is_active = any(s <= t < e for s, _, e in inst_notes)\n            \n            if not is_active:\n                r = note.Rest()\n                r.offset = float(t / 2) + start_offset\n                r.quarterLength = 0.5\n                p.append(r)\n            elif t in by_start:\n                pitches = by_start[t]\n                if len(pitches) > 1:\n                    # 화음\n                    chord_notes = []\n                    for pitch_val, end_val in pitches:\n                        n = note.Note()\n                        n.pitch.midi = pitch_val\n                        n.quarterLength = float((end_val - t) / 2)\n                        chord_notes.append(n)\n                    c = chord.Chord(chord_notes)\n                    c.offset = float(t / 2) + start_offset\n                    p.append(c)\n                else:\n                    pitch_val, end_val = pitches[0]\n                    n = note.Note()\n                    n.pitch.midi = pitch_val\n                    n.quarterLength = float((end_val - t) / 2)\n                    n.offset = float(t / 2) + start_offset\n                    p.append(n)\n        \n        s.append(p)\n    \n    os.makedirs(output_dir, exist_ok=True)\n    filepath = os.path.join(output_dir, f'{file_name}.musicxml')\n    s.write('musicxml', fp=filepath)\n    print(f\"MusicXML 저장: {filepath}\")\n    return s\n", "line_count": 914, "functions": [{"name": "__init__", "qual": "NodePool.__init__", "class": "NodePool", "lineno": 54, "end_lineno": 79, "doc_short": "", "description": "", "params": [{"name": "notes_label", "type": "dict", "default": "", "desc": ""}, {"name": "notes_counts", "type": "Counter", "default": "", "desc": ""}, {"name": "num_modules", "type": "int", "default": "65", "desc": ""}, {"name": "temperature", "type": "float", "default": "1.0", "desc": ""}], "return_type": "", "returns_desc": "", "recently_modified": true}, {"name": "sample", "qual": "NodePool.sample", "class": "NodePool", "lineno": 81, "end_lineno": 83, "doc_short": "풀에서 무작위 note label을 샘플링합니다.", "description": "풀에서 무작위 note label을 샘플링합니다.", "params": [], "return_type": "int", "returns_desc": "", "recently_modified": true}, {"name": "label_to_note_info", "qual": "NodePool.label_to_note_info", "class": "NodePool", "lineno": 85, "end_lineno": 92, "doc_short": "label → (pitch, duration) 변환", "description": "label → (pitch, duration) 변환"
