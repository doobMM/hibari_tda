ault": "", "desc": ""}, {"name": "overlap_matrix", "type": "np.ndarray", "default": "", "desc": ""}, {"name": "node_pool", "type": "NodePool", "default": "", "desc": ""}, {"name": "cycle_manager", "type": "CycleSetManager", "default": "", "desc": ""}, {"name": "onset_checker", "type": "dict", "default": "", "desc": ""}, {"name": "max_resample", "type": "int", "default": "", "desc": ""}, {"name": "verbose", "type": "bool", "default": "", "desc": ""}], "return_type": "Optional[Tuple[tuple, tuple]]", "returns_desc": "(n1, n2) where n1 = (onset, pitch, end), n2 = (pitch, duration) 또는 실패 시 None", "recently_modified": true}, {"name": "_sample_avoiding_neighbors", "qual": "_sample_avoiding_neighbors", "class": "", "lineno": 355, "end_lineno": 381, "doc_short": "인접 시점의 활성 사이클 노드를 피해서 샘플링합니다.", "description": "인접 시점의 활성 사이클 노드를 피해서 샘플링합니다.", "params": [{"name": "j", "type": "int", "default": "", "desc": ""}, {"name": "length", "type": "int", "default": "", "desc": ""}, {"name": "overlap_matrix", "type": "np.ndarray", "default": "", "desc": ""}, {"name": "node_pool", "type": "NodePool", "default": "", "desc": ""}, {"name": "cycle_manager", "type": "CycleSetManager", "default": "", "desc": ""}], "return_type": "int", "returns_desc": "", "recently_modified": true}, {"name": "notes_to_xml", "qual": "notes_to_xml", "class": "", "lineno": 843, "end_lineno": 914, "doc_short": "생성된 음표를 MusicXML로 저장합니다.", "description": "생성된 음표를 MusicXML로 저장합니다.\nprocess.py의 notes_to_score_xml 간소화 버전.", "params": [{"name": "notes_list", "type": "List[List[Tuple[int, int, int]]]", "default": "", "desc": ""}, {"name": "tempo_bpm", "type": "int", "default": "66", "desc": ""}, {"name": "file_name", "type": "str", "default": "'generated'", "desc": ""}, {"name": "output_dir", "type": "str", "default": "'./output'", "desc": ""}], "return_type": "", "returns_desc": "", "recently_modified": false}]}, "eval_metrics": {"name": "eval_metrics", "filename": "eval_metrics.py", "exists": true, "source": "\"\"\"\neval_metrics.py — 생성 음악 평가 지표\n=======================================\n\nval_loss만으로는 음악적 품질을 판단할 수 없으므로,\n다양한 관점에서 생성 결과를 평가합니다.\n\n지표:\n1. Note Coverage: 원곡의 23개 note 중 생성 곡에 등장하는 비율\n2. Pitch 분포 유사도: KL-divergence로 원곡과 생성곡의 pitch 빈도 비교\n3. Duration 다양성: 사용된 duration 종류 수\n4. Overlap 충실도: 생성 곡의 활성 패턴이 원래 overlap과 일치하는 정도\n\"\"\"\n\nimport numpy as np\nfrom collections import Counter\nfrom typing import List, Tuple, Dict, Optional\n\n\ndef note_coverage(generated: List[Tuple[int, int, int]],\n                  notes_label: dict) -> Dict[str, float]:\n    \"\"\"\n    생성된 음악이 원곡의 note 종류를 얼마나 커버하는지 측정.\n\n    Args:\n        generated: [(start, pitch, end), ...] 생성된 note 리스트\n        notes_label: (pitch, dur) -> label 매핑 (원곡의 전체 note 종류)\n\n    Returns:\n        {'coverage': 0~1, 'n_used': int, 'n_total': int, 'missing': set}\n    \"\"\"\n    total_notes = set(notes_label.values())  # 1-indexed labels\n    used_pitches = set()\n\n    for start, pitch, end in generated:\n        dur = end - start\n        key = (pitch, dur)\n        if key in notes_label:\n            used_pitches.add(notes_label[key])\n\n    coverage = len(used_pitches) / len(total_notes) if total_notes else 1.0\n    missing = total_notes - used_pitches\n\n    return {\n        'coverage': coverage,\n        'n_used': len(used_pitches),\n        'n_total': len(total_notes),\n        'missing_labels': missing\n    }\n\n\ndef pitch_distribution_similarity(generated: List[Tuple[int, int, int]],\n                                   original: List[Tuple[int, int, int]],\n                                   ) -> Dict[str, float]:\n    \"\"\"\n    원곡과 생성곡의 pitch 빈도 분포를 비교합니다.\n    KL-divergence가 낮을수록 유사합니다.\n\n    Returns:\n        {'kl_divergence': float, 'js_divergence': float,\n         'common_pitches': int, 'gen_unique_pitches': int}\n    \"\"\"\n    orig_pitches = Counter(p for _, p, _ in original)\n    gen_pitches = Counter(p for _, p, _ in generated)\n\n    all_pitches = set(orig_pitches.keys()) | set(gen_pitches.keys())\n    if not all_pitches:\n        return {'kl_divergence': 0.0, 'js_divergence': 0.0,\n                'common_pitches': 0, 'gen_unique_pitches': 0}\n\n    # 정규화된 분포\n    orig_total = sum(orig_pitches.values())\n    gen_total = sum(gen_pitches.values())\n\n    # 생성 결과가 비어있으면 최악값(1.0) 반환\n    if gen_total == 0:\n        return {'kl_divergence': float('inf'), 'js_divergence': 1.0,\n                'common_pitches': 0, 'gen_unique_pitches': 0}\n\n    eps = 1e-10  # smoothing\n    p = np.array([orig_pitches.get(k, 0) / orig_total + eps for k in sorted(all_pitches)])\n    q = np.array([gen_pitches.get(k, 0) / gen_total + eps for k in sorted(all_pitches)])\n    p /= p.sum()\n    q /= q.sum()\n\n    # KL divergence: D(P || Q)\n    kl = np.sum(p * np.log(p / q))\n\n    # Jensen-Shannon divergence (대칭)\n    m = 0.5 * (p + q)\n    js = 0.5 * np.sum(p * np.log(p / m)) + 0.5 * np.sum(q * np.log(q / m))\n\n    common = len(set(orig_pitches.keys()) & set(gen_pitches.keys()))\n\n    return {\n        'kl_divergence': float(kl),\n        'js_divergence': float(js),\n        'common_pitches': common,\n        'gen_unique_pitches': len(gen_pitches)\n    }\n\n\ndef duration_diversity(generated: List[Tuple[int, int, int]],\n                       original: List[Tuple[int, int, int]]) -> Dict[str, float]:\n    \"\"\"\n    사용된 duration 종류와 분포를 비교합니다.\n\n    Returns:\n        {'gen_durations': int, 'orig_durations': int,\n         'duration_coverage': float}\n    \"\"\"\n    orig_durs = set(e - s for s, _, e in original)\n    gen_durs = set(e - s for s, _, e in generated)\n\n    coverage = len(gen_durs & orig_durs) / len(orig_durs) if orig_durs else 1.0\n\n    return {\n        'gen_durations': len(gen_durs),\n        'orig_durations': len(orig_durs),\n        'duration_coverage': coverage\n    }\n\n\ndef transition_matrix_similarity(generated: List[Tuple[int, int, int]],\n                                  original: List[Tuple[int, int, int]],\n                                  ) -> Dict[str, float]:\n    \"\"\"\n    선율 진행(다음 음이 뭐가 올까)의 유사도를 측정합니다.\n\n    각 곡에서 \"note A 다음에 B가 올 확률\" transition matrix를 구축하고\n    두 행렬 간 JS divergence를 계산합니다.\n\n    이것이 JS divergence(pitch 빈도)와 다른 점:\n    - pitch JS: \"어떤 음이 얼마나 자주 나왔나\" (시간 순서 무시)\n    - transition JS: \"어떤 음 다음에 어떤 음이 왔나\" (시간 순서 반영)\n\n    Returns:\n        {'transition_js': float, 'common_transitions': int}\n    \"\"\"\n    def build_transition(notes):\n        # 시점 순 정렬 후 연속 pitch 쌍 수집\n        sorted_notes = sorted(notes, key=lambda x: x[0])\n        pitches = [p for _, p, _ in sorted_notes]\n        trans = Counter()\n        for i in range(len(pitches) - 1):\n            trans[(pitches[i], pitches[i+1])] += 1\n        return trans\n\n    orig_flat = original if isinstance(original[0], tuple) else []\n    if not orig_flat:\n        for inst in original:\n            orig_flat.extend(inst)\n\n    t_orig = build_transition(orig_flat)\n    t_gen = build_transition(generated)\n\n    # 모든 transition 합집합\n    all_trans = set(t_orig.keys()) | set(t_gen.keys())\n    if not all_trans:\n        return {'transition_js': 0.0, 'common_transitions': 0}\n\n    orig_total = sum(t_orig.values())\n    gen_total = sum(t_gen.values())\n    if gen_total == 0:\n        return {'transition_js': 1.0, 'common_transitions': 0}\n    eps = 1e-10\n\n    p = np.array([t_orig.get(k, 0) / orig_total + eps for k in sorted(all_trans)])\n    q = np.array([t_gen.get(k, 0) / gen_total + eps for k in sorted(all_trans)])\n    p /= p.sum()\n    q /= q.sum()\n\n    m = 0.5 * (p + q)\n    js = 0.5 * np.sum(p * np.log(p / m)) + 0.5 * np.sum(q * np.log(q / m))\n\n    common = len(set(t_orig.keys()) & set(t_gen.keys()))\n\n    return {'transition_js': float(js), 'common_transitions': common}\n\n\ndef evaluate_generation(generated: List[Tuple[int, int, int]],\n                        original_notes: List[List[Tuple[int, int, int]]],\n                        notes_label: dict,\n                        name: str = \"\") -> dict:\n    \"\"\"\n    생성 결과를 종합 평가합니다.\n\n    Args:\n        generated: 생성된 note 리스트\n        original_notes: [inst1_notes, inst2_notes] 원곡\n        notes_label: (pitch, dur) -> label\n        name: 모델/설정 이름 (출력용)\n    \"\"\"\n    # 원곡 통합\n    orig_flat = []\n    for inst in original_notes:\n        orig_flat.extend(inst)\n\n    cov = note_coverage(generated, notes_label)\n    pitch = pitch_distribution_similarity(generated, orig_flat)\n    dur = duration_diversity(generated, orig_flat)\n\n    result = {\n        'name': name,\n        'n_notes': len(generated),\n        'note_coverage': cov['coverage'],\n        'missing_notes': len(cov['missing_labels']),\n        'kl_divergence': pitch['kl_divergence'],\n        'js_divergence': pitch['js_divergence'],\n        'pitch_count': pitch['gen_unique_pitches'],\n        'duration_coverage': dur['duration_coverage'],\n        'duration_count': dur['gen_durations'],\n    }\n\n    if name:\n        print(f\"\\n  [{name}] 평가 결과:\")\n        print(f\"    Notes: {result['n_notes']}\")\n        print(f\"    Note coverage: {cov['n_used']}/{cov['n_total']}\"\n              f\" ({cov['coverage']:.1%})\"\n              f\"{' missing: ' + str(sorted(cov['missing_labels'])) if cov['missing_labels'] else ''}\")\n        print(f\"    Pitch distribution: KL={pitch['kl_divergence']:.4f},\"\n              f\" JS={pitch['js_divergence']:.4f}\")\n        print(f\"    Duration: {dur['gen_durations']}/{dur['orig_durations']} types\"\n              f\" ({dur['duration_coverage']:.1%})\")\n\n    return result\n", "line_count": 226, "functions": [{"name": "note_coverage", "qual": "note_coverage", "class": "", "lineno": 20, "end_lineno": 49, "doc_short": "생성된 음악이 원곡의 note 종류를 얼마나 커버하는지 측정.", "description": "생성된 음악이 원곡의 note 종류를 얼마나 커버하는지 측정.", "params": [{"name": "generated", "type": "List[Tuple[int, int, int]]", "default": "", "desc": "[(start, pitch, end), ...] 생성된 note 리스트"}, {"name": "notes_label", "type": "dict", "default": "", "desc": "(pitch, dur) -> label 매핑 (원곡의 전체 note 종류)"}], "return_type": "Dict[str, float]", "returns_desc": "{'coverage': 0~1, 'n_used': int, 'n_total': int, 'missing': set}", "recently_modified": true}, {"name": "pitch_distribution_similarity", "qual": "pitch_distribution_similarity", "class": "", "lineno": 52, "end_lineno": 100, "doc_short": "원곡과 생성곡의 pitch 빈도 분포를 비교합니다.", "description": "원곡과 생성곡의 pitch 빈도 분포를 비교합니다.\nKL-divergence가 낮을수록 유사합니다.", "params": [{"name": "generated", "type": "List[Tuple[int, int, int]]", "default": "", "desc": ""}, {"name": "original", "type": "List[Tuple[int, int, int]]", "default": "", "desc": ""}], "return_type": "Dict[str, float]", "returns_desc": "{'kl_divergence': float, 'js_divergence': float, 'common_pitches': int, 'gen_unique_pitches': int}", "recently_modified": true}, {"name": "duration_diversity", "qual": "duration_diversity", "class": "", "lineno": 103, "end_lineno": 121, "doc_short": "사용된 duration 종류와 분포를 비교합니다.", "description": "사용된 duration 종류와 분포를 비교합니다.", "params": [{"name": "generated", "type": "List[Tuple[int, int, int]]", "default": "", "desc": ""}, {"name": "original", "type": "List[Tuple[int, int, int]]", "default": "", "desc": ""}], "return_type": "Dict[str, float]", "returns_desc": "{'gen_durations': int, 'orig_durations': int, 'duration_coverage': float}", "recently_modified": true}, {"name": "transition_matrix_similarity", "qual": "transition_matrix_similarity", "class": "", "lineno": 124, "end_lineno": 178, "doc_short": "선율 진행(다음 음이 뭐가 올까)의 유사도를 측정합니다.", "description": "선율 진행(다음 음이 뭐가 올까)의 유사도를 측정합니다.\n각 곡에서 \"note A 다음에 B가 올 확률\" transition matrix를 구축하고\n두 행렬 간 JS divergence를 계산합니다.\n이것이 JS divergence(pitch 빈도)와 다른 점:\n- pitch JS: \"어떤 음이 얼마나 자주 나왔나\" (시간 순서 무시)\n- transition JS: \"어떤 음 다음에 어떤 음이 왔나\" (시간 순서 반영)", "params": [{"name": "generated", "type": "List[Tuple[int, int, int]]", "default": "", "desc": ""}, {"name": "original", "type": "List[Tuple[int, int, int]]", "default": "", "desc": ""}], "return_type": "Dict[s let curMod = null, curFn = null;

// ── Clock ────────────────────────────────────────────────────────────────────
setInterval(()=>{
  document.getElementById('sb-c').textContent =
    new Date().toLocaleTimeString('ko-KR',{hour12:false});
},1000);

// ── Tree build ───────────────────────────────────────────────────────────────
function buildTree(){
  const t=document.getElementById('tree');
  t.innerHTML='';
  for(const n of TREE){
    if(n.module){
      t.appendChild(makeModWrap(n,false));
    } else if(n.children){
      const g=document.createElement('div');
      g.className='stage-grp';
      const h=document.createElement('div');
      h.className='stage-hdr open';
      h.innerHTML=`<span>${n.icon||''}</span><span>${n.label}</span><span class="arr">▼</span>`;
      h.style.color=n.color;
      h.addEventListener('click',()=>{g.classList.toggle('closed');h.classList.toggle('open');});
      const sc=document.createElement('div');
      sc.className='sc';
      for(const c of n.children) sc.appendChild(makeModWrap(c,true));
      g.appendChild(h);g.appendChild(sc);
      t.appendChild(g);
    }
  }
}

function makeModWrap(node,indent){
  const mod=MODULES[node.module];
  const wrap=document.createElement('div');

  const item=document.createElement('div');
  item.className='mod-item'+(mod&&mod.exists?'':' dead');
  item.id='m-'+node.module;
  if(!indent) item.style.paddingLeft='12px';

  const cnt=mod?mod.functions.length:0;
  item.innerHTML=`<span style="color:${node.color};flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${node.label||node.module+'.py'}</span><span class="fc">${cnt}f</span>`;

  if(mod&&mod.exists){
    item.addEventListener('click',e=>{
      e.stopPropagation();
      selectMod(node.module);
      toggleFnList(node.module);
    });
  }

  const fl=document.createElement('div');
  fl.className='fn-list';
  fl.id='fl-'+node.module;
  if(mod&&mod.functions){
    for(const f of mod.functions){
      const fi=document.createElement('div');
      fi.className='fn-item';
      fi.dataset.mod=node.module;fi.dataset.fn=f.name;
      fi.innerHTML=`${f.recently_modified?'<span class="rdot"></span>':'<span class="gdot"></span>'}<span style="overflow:hidden;text-overflow:ellipsis">${f.name}()</span>`;
      fi.title=f.doc_short||'';
      fi.addEventListener('click',e=>{e.stopPropagation();selectMod(node.module);selectFn(node.module,f.name);});
      fl.appendChild(fi);
    }
  }
  wrap.appendChild(item);wrap.appendChild(fl);
  return wrap;
}

function toggleFnList(name){
  document.querySelectorAll('.fn-list').forEach(e=>{if(e.id!=='fl-'+name)e.classList.remove('vis');});
  const el=document.getElementById('fl-'+name);
  if(el)el.classList.toggle('vis');
}

// ── Module select ─────────────────────────────────────────────────────────────
function selectMod(name){
  if(!MODULES[name]||!MODULES[name].exists)return;
  curMod=name;curFn=null;
  const mod=MODULES[name];
  document.querySelectorAll('.mod-item').forEach(e=>e.classList.remove('sel'));
  const el=document.getElementById('m-'+name);if(el)el.classList.add('sel');
  // load code
  const cd=document.getElementById('cd');
  cd.textContent=mod.source;
  Prism.highlightElement(cd);
  // header
  document.getElementById('fn-lbl').textContent=mod.filename;
  document.getElementById('li-lbl').textContent=`${mod.line_count} lines · ${mod.functions.length} functions`;
  const hasR=mod.functions.some(f=>f.recently_modified);
  document.getElementById('rbdg').style.display=hasR?'':'none';
  // statusbar
  document.getElementById('sb-m').textContent='MODULE: '+mod.filename;
  document.getElementById('sb-f').textContent='FUNC: —';
  document.getElementById('sb-l').textContent='—';
  // doc panel
  document.getElementById('dc').innerHTML=`<div class="empty">◎ <strong style="color:var(--txtb)">${mod.filename}</strong><br>${mod.functions.length}개 함수 발견<br><br>← 함수를 클릭하세요</div>`;
}

// ── Function select ───────────────────────────────────────────────────────────
function selectFn(modName,fnName){
  if(modName!==curMod)selectMod(modName);
  curFn=fnName;
  const mod=MODULES[modName];
  const fn=mod.functions.find(f=>f.name===fnName);if(!fn)return;
  document.querySelectorAll('.fn-item').forEach(e=>e.classList.remove('sel'));
  const el=document.querySelector(`.fn-item[data-mod="${modName}"][data-fn="${fnName}"]`);
  if(el)el.classList.add('sel');
  scrollToLine(fn.lineno,fn.end_lineno,mod.line_count);
  renderDoc(fn,modName);
  document.getElementById('sb-f').textContent='FUNC: '+fn.name;
  document.getElementById('sb-l').textContent=`L${fn.lineno}–${fn.end_lineno}`;
}

function scrollToLine(start,end,total){
  const cw=document.getElementById('cw');
  const pre=cw.querySelector('pre');if(!pre)return;
  const lh=pre.scrollHeight/(total||1);
  cw.scrollTo({top:(start-4)*lh,behavior:'smooth'});
  // highlight
  document.querySelectorAll('.hi-line').forEach(e=>e.remove());
  const hl=document.createElement('div');
  hl.className='hi-line';
  hl.style.top=(start-1)*lh+'px';
  hl.style.height=(end-start+1)*lh+'px';
  pre.style.position='relative';
  pre.appendChild(hl);
}

// ── Doc render ────────────────────────────────────────────────────────────────
function renderDoc(fn,modName){
  const paramRows=fn.params.map(p=>`
    <tr>
      <td class="pn">${esc(p.name)}</td>
      <td class="pt_t">${esc(p.type||'—')}</td>
      <td class="pd">${esc(p.default||'—')}</td>
      <td class="pdc">${esc(p.desc||'')}</td>
    </tr>`).join('');

  const sigParts=fn.params.map(p=>{
    let s=p.name;
    if(p.type)s+=': '+p.type;
    if(p.default)s+=' = '+p.default;
    return s;
  });
  const sig=fn.name+'(\n  '+sigParts.join(',\n  ')+'\n)';
  const ret=fn.return_type?` → <span class="ret-t">${esc(fn.return_type)}</span>`:'';

  const rbadge=fn.recently_modified
    ?`<span style="background:var(--warn);color:#fff;font-size:9px;padding:1px 6px;border-radius:2px;margin-left:8px;letter-spacing:.5px">● 최근 수정</span>`:'';

  let html=`
    <div class="fn-name">${esc(fn.name)}()${rbadge}</div>
    <div class="fn-meta">${fn.class?fn.class+'.':''}${fn.name} &nbsp;·&nbsp; ${modName}.py &nbsp;·&nbsp; L${fn.lineno}–${fn.end_lineno}</div>
    <div class="fn-sig"><code>${esc(sig)}</code>${ret}</div>`;

  if(fn.description){
    html+=`<div class="sec">DESCRIPTION</div><div class="desc">${esc(fn.description)}</div>`;
  }

  if(fn.params.length){
    html+=`<div class="sec">PARAMETERS</div>
    <table class="pt">
      <tr><th>NAME</th><th>TYPE</th><th>DEFAULT</th><th>DESC</th></tr>
      ${paramRows}
    </table>`;
  }

  if(fn.return_type||fn.returns_desc){
    html+=`<div class="sec">RETURNS</div>
    <div class="ret-box">
      ${fn.return_type?`<div class="ret-tl">${esc(fn.return_type)}</div>`:''}
      ${fn.returns_desc?`<div class="ret-d">${esc(fn.returns_desc)}</div>`:''}
    </div>`;
  }

  document.getElementById('dc').innerHTML=html;
}

// ── Search ────────────────────────────────────────────────────────────────────
function filterFns(q){
  q=q.toLowerCase().trim();
  document.querySelectorAll('.fn-item').forEach(el=>{
    const name=(el.dataset.fn||'').toLowerCase();
    el.style.display=(!q||name.includes(q))?'':'none';
  });
  if(q)document.querySelectorAll('.fn-list').forEach(e=>e.classList.add('vis'));
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── Init ──────────────────────────────────────────────────────────────────────
buildTree();
selectMod('pipeline');
// auto-open pipeline func list
const pfl=document.getElementById('fl-pipeline');if(pfl)pfl.classList.add('vis');
</script>
